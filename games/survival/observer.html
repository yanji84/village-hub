<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survival Grid</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0c0c0c;font-family:'Courier New',monospace;color:#c8c8c8}
#app{display:flex;flex-direction:column;height:100vh}
#main{flex:1;display:flex;flex-direction:row;min-height:0}

/* Canvas area */
#map-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#111}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;cursor:crosshair}

/* Right panel */
#panel{width:300px;flex-shrink:0;display:flex;flex-direction:column;background:#0a0a0a;border-left:1px solid #1a1a1a}
#bot-info{flex-shrink:0;padding:6px 10px;border-bottom:1px solid #1a1a1a}
#bot-info h3{font-size:12px;color:#4a9;margin-bottom:3px;font-weight:700}
#bot-info .stat{font-size:10px;line-height:1.4;color:#999}
#bot-info .stat .label{color:#666;display:inline-block;width:56px}
#bot-info .stat .val{color:#c8c8c8}
#bot-info .stat .val.hp-high{color:#4caf50}
#bot-info .stat .val.hp-mid{color:#ff9800}
#bot-info .stat .val.hp-low{color:#f44336}
#bot-info .stat .val.dead{color:#555;text-decoration:line-through}
#bot-info .no-sel{color:#444;font-style:italic;font-size:11px}
#bot-list{padding:4px 10px;border-bottom:1px solid #1a1a1a;flex-shrink:0;max-height:90px;overflow-y:auto}
#bot-list h4{font-size:10px;color:#555;margin-bottom:2px;text-transform:uppercase;letter-spacing:1px}
.bl-entry{font-size:10px;padding:1px 4px;cursor:pointer;border-radius:2px;display:flex;align-items:center;gap:5px}
.bl-entry:hover{background:#1a1a1a}
.bl-entry.selected{background:#1a2a1a}
.bl-entry .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.bl-entry .bname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bl-entry .bhp{color:#666;font-size:10px}
.bl-entry.dead-entry{opacity:.4;text-decoration:line-through}

/* Log wrap */
#log-wrap{flex:1;display:flex;flex-direction:column;min-height:0}

/* Status strip */
#status-strip{flex-shrink:0;max-height:72px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:4px;padding:6px 10px;border-bottom:1px solid #1a1a1a;background:#0d0d0d}
.ss-bot{display:flex;align-items:center;gap:4px;font-size:10px;padding:2px 6px;border-radius:3px;background:#111;white-space:nowrap}
.ss-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ss-dot.danger{animation:dangerPulse 1s ease-in-out infinite}
@keyframes dangerPulse{0%,100%{box-shadow:0 0 2px #f44336}50%{box-shadow:0 0 8px #f44336,0 0 12px rgba(244,67,54,.5)}}
.ss-name{color:#bbb;font-weight:600;max-width:60px;overflow:hidden;text-overflow:ellipsis}
.ss-bars{display:flex;flex-direction:column;gap:1px;width:32px}
.ss-bar{height:4px;border-radius:1px;background:#222;overflow:hidden}
.ss-bar-fill{height:100%;transition:width .3s}
.ss-bar-fill.hp-high{background:#4caf50}
.ss-bar-fill.hp-mid{background:#ff9800}
.ss-bar-fill.hp-low{background:#f44336}
.ss-bar-fill.hunger{background:#ff9800}
.ss-directive{font-size:9px;color:#888;font-style:italic;max-width:50px;overflow:hidden;text-overflow:ellipsis}
.ss-bot.dead{opacity:.35}

/* Chat log */
#chat-wrap{flex:2;display:flex;flex-direction:column;min-height:0;border-bottom:1px solid #1a1a1a}
#chat-header{padding:4px 12px;font-size:10px;color:#555;border-bottom:1px solid #1a1a1a;text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
#chat-log{flex:1;overflow-y:auto;padding:4px 8px}
.chat-msg{padding:3px 6px;margin-bottom:3px;border-left:2px solid #555;font-size:11px;line-height:1.4;word-wrap:break-word}
.chat-name{font-weight:700;font-size:10px}
.chat-text{color:#ccc}
.chat-time{color:#444;font-size:9px;float:right;margin-left:6px}

/* Activity log */
#activity-wrap{flex:3;display:flex;flex-direction:column;min-height:0}
#activity-header{padding:4px 12px;font-size:10px;color:#555;border-bottom:1px solid #1a1a1a;text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
#activity-log{flex:1;overflow-y:auto;padding:4px 8px}
.act-entry{font-size:11px;line-height:1.5;color:#999;padding:2px 4px;word-wrap:break-word;border-left:2px solid transparent}
.act-entry.dramatic{color:#f44336;font-weight:700;border-left-color:#f44336;background:rgba(244,67,54,.08)}
.act-entry.combat{color:#e57373;border-left-color:#e55}
.act-entry.craft{color:#90caf9;border-left-color:#42a5f5}
.act-entry.food{color:#a5d6a7;border-left-color:#4caf50}
.act-entry.directive-entry{color:#fdd835;font-style:italic;border-left-color:#fdd835}

/* Tick separator */
.tick-separator{text-align:center;font-size:10px;color:#555;padding:4px 0;margin:4px 0;border-top:1px solid #1a1a1a;font-style:italic}

/* Speech bubbles */
.speech-bubble{position:absolute;background:#fff;color:#222;font:12px/1.3 -apple-system,'Segoe UI',sans-serif;padding:5px 8px;border-radius:8px;max-width:200px;pointer-events:none;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.4);transform:translate(-12px,-100%);transition:opacity .8s;word-wrap:break-word}
.speech-bubble::after{content:'';position:absolute;bottom:-5px;left:12px;border:5px solid transparent;border-top-color:#fff;border-bottom:0}
.speech-bubble .sb-name{font-weight:700;font-size:10px;display:block;margin-bottom:1px}
.speech-bubble.fade{opacity:0}

/* Bottom bar */
#bar{height:28px;background:#0d0d0d;border-top:1px solid #1a1a1a;display:flex;align-items:center;padding:0 14px;font-size:11px;color:#555;gap:16px;flex-shrink:0}
#bar .lbl{color:#4a9;font-weight:700}
#bar .phase-day{color:#ff9800}
#bar .phase-night{color:#5c6bc0}
#bar .phase-dawn{color:#ef6c00}
#bar .phase-dusk{color:#7e57c2}
.st-run{color:#4a9}.st-off{color:#a44}
#controls{margin-left:auto;display:flex;gap:10px;align-items:center}
#controls label{font-size:10px;color:#555;cursor:pointer;user-select:none}
#controls input[type=checkbox]{margin-right:3px}

/* Diplomacy panel */
#diplomacy-panel{padding:4px 10px;border-bottom:1px solid #1a1a1a;flex-shrink:0;max-height:80px;overflow-y:auto}
#diplomacy-panel h4{font-size:10px;color:#555;margin-bottom:2px;text-transform:uppercase;letter-spacing:1px}
.dip-entry{font-size:10px;line-height:1.4;padding:1px 0}
.dip-alliance{color:#4fc3f7}
.dip-proposal{color:#888;font-style:italic}
.dip-betrayal{color:#ff5722;font-weight:700}
.dip-deception{color:#ff9800;font-style:italic}
.bounty-crown{color:#fdd835}
.act-entry.alliance{color:#4fc3f7;border-left-color:#29b6f6}
.act-entry.betrayal{color:#ff5722;font-weight:700;border-left-color:#ff5722;background:rgba(255,87,34,.08)}
.act-entry.bounty{color:#fdd835;border-left-color:#fdd835}
.act-entry.deception{color:#ff9800;border-left-color:#ff9800;font-style:italic}

/* Scoreboard panel */
#scoreboard{padding:4px 10px;border-bottom:1px solid #1a1a1a;flex-shrink:0;max-height:120px;overflow-y:auto}
#scoreboard h4{font-size:10px;color:#555;margin-bottom:2px;text-transform:uppercase;letter-spacing:1px}
#scoreboard table{width:100%;border-collapse:collapse;font-size:10px}
#scoreboard td{padding:1px 4px}
#scoreboard .sb-rank{color:#555;width:16px}
#scoreboard .sb-name{color:#bbb}
#scoreboard .sb-score{text-align:right;color:#4a9;font-weight:700}
#scoreboard .sb-leader .sb-name{color:#fdd835;font-weight:700}
#scoreboard .sb-leader .sb-score{color:#fdd835}

/* Round-end overlay */
#round-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:50}
#round-overlay.show{display:flex}
#round-overlay .ro-card{background:#111;border:1px solid #333;border-radius:8px;padding:16px 28px;max-width:360px;text-align:center}
#round-overlay .ro-title{font-size:16px;color:#fdd835;font-weight:700;margin-bottom:8px}
#round-overlay .ro-winner{font-size:13px;color:#4a9;margin-bottom:10px}
#round-overlay table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px}
#round-overlay td{padding:2px 6px}
#round-overlay .ro-rank{color:#555;width:20px}
#round-overlay .ro-name{color:#ccc}
#round-overlay .ro-pts{text-align:right;color:#4a9;font-weight:700}
#round-overlay .ro-first .ro-name{color:#fdd835}
#round-overlay .ro-first .ro-pts{color:#fdd835}
#round-overlay .ro-fade{animation:roFadeIn .3s ease}
@keyframes roFadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* Tooltip */
#tooltip{position:absolute;background:rgba(10,10,10,.92);border:1px solid #2a2a2a;color:#bbb;font:11px/1.4 'Courier New',monospace;padding:4px 8px;pointer-events:none;z-index:15;display:none;max-width:200px;border-radius:2px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0a0a0a}
::-webkit-scrollbar-thumb{background:#222;border-radius:2px}

@media(max-width:700px){
  #main{flex-direction:column}
  #panel{width:100%;height:50vh;border-left:0;border-top:1px solid #1a1a1a}
  #bot-info{padding:4px 8px}
  #bot-info h3{font-size:11px;margin-bottom:2px}
  #bot-info .stat{font-size:9px;line-height:1.3}
  #bot-info .stat .label{width:46px}
  #bot-info .no-sel{font-size:9px}
  #bot-list{padding:3px 8px;max-height:60px}
  #bot-list h4{font-size:9px;margin-bottom:1px}
  .bl-entry{font-size:9px;padding:1px 3px;gap:4px}
  #status-strip{padding:3px 6px;max-height:48px;gap:3px}
  .ss-bot{padding:1px 4px;font-size:9px}
}
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <div id="map-area">
      <canvas id="c"></canvas>
      <div id="tooltip"></div>
    </div>
    <div id="panel">
      <div id="bot-info">
        <h3>Selected Bot</h3>
        <div class="no-sel">Click a bot on the map or list to inspect</div>
      </div>
      <div id="bot-list">
        <h4>Bots</h4>
      </div>
      <div id="log-wrap">
        <div id="scoreboard">
          <h4>Scoreboard</h4>
          <div id="scoreboard-body"></div>
        </div>
        <div id="diplomacy-panel">
          <h4>Diplomacy (God View)</h4>
          <div id="diplomacy-body"></div>
        </div>
        <div id="status-strip"></div>
        <div id="chat-wrap">
          <div id="chat-header">Chat</div>
          <div id="chat-log"></div>
        </div>
        <div id="activity-wrap">
          <div id="activity-header">Activity</div>
          <div id="activity-log"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="round-overlay"><div class="ro-card ro-fade" id="ro-card"></div></div>
  <div id="bar">
    <span class="lbl">Survival</span>
    <span id="round-info"></span>
    <span id="tick-info">&mdash;</span>
    <span id="phase-info"></span>
    <span id="bot-count"></span>
    <span id="countdown"></span>
    <span id="status" class="st-off">Connecting</span>
    <div id="controls">
      <label><input type="checkbox" id="follow-toggle" checked> Auto-follow</label>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
<script>
(async () => {
// ========== CONSTANTS ==========
let GRID_W = 32, GRID_H = 32;
let TILE = 8;
let CW = GRID_W * TILE;
let CH = GRID_H * TILE;

const TERRAIN_COLORS = {
  '.': '#9ccc65', // plains
  'T': '#388e3c', // forest
  '^': '#795548', // mountain
  '~': '#42a5f5', // water
  'O': '#616161', // cave
  '#': '#9e9e9e', // ruins
};

const TERRAIN_NAMES = {
  '.': 'Plains', 'T': 'Forest', '^': 'Mountain',
  '~': 'Water', 'O': 'Cave', '#': 'Ruins',
};

const PHASE_TINTS = {
  'day':     { r:0,   g:0,   b:0,   a:0    },
  'dawn':    { r:50,  g:30,  b:10,  a:0.10 },
  'morning': { r:40,  g:30,  b:10,  a:0.06 },
  'dusk':    { r:40,  g:20,  b:50,  a:0.15 },
  'evening': { r:30,  g:15,  b:50,  a:0.20 },
  'night':   { r:10,  g:10,  b:40,  a:0.35 },
};

const BOT_COLORS = [
  '#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6',
  '#1abc9c','#e67e22','#e91e63','#00bcd4','#8bc34a',
  '#ff5722','#607d8b','#cddc39','#ff7043','#26c6da',
  '#ab47bc',
];

// ========== PIXI SETUP ==========
const cv = document.getElementById('c');

// Set nearest-neighbor scaling for pixel art
if (PIXI.TextureSource && PIXI.TextureSource.defaultOptions) {
  PIXI.TextureSource.defaultOptions.scaleMode = 'nearest';
}

const app = new PIXI.Application();
await app.init({
  canvas: cv,
  width: CW,
  height: CH,
  background: 0x111111,
  antialias: false,
  resolution: 1,
  autoDensity: false,
});

// Stage containers
const worldContainer = new PIXI.Container();
const terrainLayer = new PIXI.Container();
const effectsLayer = new PIXI.Container();
const botLayer = new PIXI.Container();
botLayer.sortableChildren = true;
const overlayContainer = new PIXI.Container();

worldContainer.addChild(terrainLayer, effectsLayer, botLayer);
app.stage.addChild(worldContainer, overlayContainer);

// Day/night overlay (covers viewport, not world)
const dayNightOverlay = new PIXI.Graphics();
overlayContainer.addChild(dayNightOverlay);

function resize() {
  const wrap = document.getElementById('map-area');
  const scale = Math.min(wrap.clientWidth / CW, wrap.clientHeight / CH, 2);
  cv.style.width = (CW * scale) + 'px';
  cv.style.height = (CH * scale) + 'px';
}
addEventListener('resize', resize);
resize();

// ========== STATE ==========
let terrain = '';
let worldW = GRID_W, worldH = GRID_H;
let bots = {};
let tick = 0;
let dayPhase = '';
let online = false;
let selectedBot = null;
let autoFollow = true;
let cameraX = 0, cameraY = 0;
let colorIndex = 0;
let botColorMap = {};
let frame = 0;
let nextTickAt = 0;
let tickIntervalMs = 60000;
let resourceTiles = new Set();
let dragging = false;
let dragStartX = 0, dragStartY = 0;
let dragCamStartX = 0, dragCamStartY = 0;
let roundNumber = 0;
let roundTicksRemaining = 0;
let roundScores = {};
let roundOverlayTimer = null;
let dipAlliances = {};
let dipProposals = {};
let dipBetrayals = [];
let bountyBot = null;

// PIXI-specific state
let terrainSprite = null;
let botPixiObjects = {};
let waterShimmers = [];
const charTextureCache = {};

// ========== VISUAL POLISH STATE ==========
let shakeTimer = 0;
let shakeIntensity = 0;
let zoom = 1.0;
let targetZoom = 1.0;
let cameraTargetX = 0;
let cameraTargetY = 0;

// ========== HELPERS ==========
function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function hm() {
  return new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
}

function getBotColor(botId) {
  if (!botColorMap[botId]) {
    botColorMap[botId] = BOT_COLORS[colorIndex % BOT_COLORS.length];
    colorIndex++;
  }
  return botColorMap[botId];
}

function itemLabel(id) {
  if (!id) return '???';
  return String(id).replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function terrainAt(x, y) {
  if (x < 0 || x >= worldW || y < 0 || y >= worldH) return '.';
  return terrain[y * worldW + x] || '.';
}

function hexToRgb(hex) {
  return {
    r: parseInt(hex.slice(1, 3), 16),
    g: parseInt(hex.slice(3, 5), 16),
    b: parseInt(hex.slice(5, 7), 16),
  };
}

function hexToInt(hex) {
  return parseInt(hex.slice(1), 16);
}

// ========== CHARACTER SPRITE GENERATION ==========
const ANIM_POSES = ['idle', 'walk', 'attack', 'gather', 'hurt', 'rest', 'flee', 'hungry'];

function getCharAnims(color) {
  if (charTextureCache[color]) return charTextureCache[color];
  const anims = {};
  for (const pose of ANIM_POSES) {
    anims[pose] = [];
    for (let f = 0; f < 2; f++) {
      const c = document.createElement('canvas');
      c.width = 16; c.height = 16;
      const ctx = c.getContext('2d');
      drawCharPixels(ctx, color, f, pose);
      anims[pose].push(PIXI.Texture.from(c));
    }
  }
  charTextureCache[color] = anims;
  return anims;
}

function drawCharPixels(ctx, hexColor, frame, pose) {
  const { r, g, b } = hexToRgb(hexColor);
  const hair = `rgb(${Math.max(0, r - 80)},${Math.max(0, g - 80)},${Math.max(0, b - 80)})`;
  const bodyLight = `rgb(${Math.min(255, r + 40)},${Math.min(255, g + 40)},${Math.min(255, b + 40)})`;
  const armShade = `rgb(${Math.max(0, r - 25)},${Math.max(0, g - 25)},${Math.max(0, b - 25)})`;
  const skin = '#f0c8a0';
  const eye = '#1a1a2e';
  const pants = '#3a3a5c';
  const boot = '#4a3728';

  ctx.clearRect(0, 0, 16, 16);

  // Shadow (always at ground level)
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(8, 15, 4, 1.5, 0, 0, Math.PI * 2);
  ctx.fill();

  switch (pose) {
    case 'idle': default: {
      const y = frame === 1 ? -1 : 0;
      drawHead(ctx, 5, 1 + y, hair, skin, eye);
      drawBody(ctx, 4, 7 + y, hexColor, bodyLight);
      drawArms(ctx, 3, 8 + y, 12, 8 + y, armShade, skin);
      drawLegs(ctx, 5, 11 + y, 9, 11 + y, pants, boot);
      break;
    }
    case 'walk': {
      const y = frame === 1 ? -1 : 0;
      const f = frame === 0 ? 1 : -1;
      drawHead(ctx, 5, 1 + y, hair, skin, eye);
      drawBody(ctx, 4, 7 + y, hexColor, bodyLight);
      // Arms swing opposite to legs
      drawArms(ctx, 3, 8 + y - f, 12, 8 + y + f, armShade, skin);
      // Legs stride
      drawLeg(ctx, 5 - f, 11 + y, pants, boot, 4 - f);
      drawLeg(ctx, 9 + f, 11 + y, pants, boot, 9 + f);
      break;
    }
    case 'attack': {
      const y = frame === 0 ? 0 : -1;
      const lean = frame === 1 ? 1 : 0;
      drawHead(ctx, 5 + lean, 1 + y, hair, skin, eye);
      drawBody(ctx, 4 + lean, 7 + y, hexColor, bodyLight);
      // Left arm normal, right arm raised (frame 0) or slashing (frame 1)
      ctx.fillStyle = armShade;
      ctx.fillRect(3 + lean, 8 + y, 1, 2);
      ctx.fillStyle = skin;
      ctx.fillRect(3 + lean, 10 + y, 1, 1);
      if (frame === 0) {
        // Right arm raised above head
        ctx.fillStyle = armShade;
        ctx.fillRect(12 + lean, 3 + y, 1, 3);
        ctx.fillStyle = skin;
        ctx.fillRect(12 + lean, 2 + y, 1, 1);
        // Weapon glint
        ctx.fillStyle = '#c0c0c0';
        ctx.fillRect(13 + lean, 1 + y, 1, 2);
        ctx.fillRect(12 + lean, 0 + y, 1, 1);
      } else {
        // Right arm thrust forward
        ctx.fillStyle = armShade;
        ctx.fillRect(13 + lean, 7 + y, 2, 1);
        ctx.fillStyle = skin;
        ctx.fillRect(14 + lean, 7 + y, 1, 1);
        // Weapon slash
        ctx.fillStyle = '#c0c0c0';
        ctx.fillRect(15, 6 + y, 1, 1);
        ctx.fillRect(14, 8 + y, 1, 1);
      }
      // Legs — lunge on strike
      drawLeg(ctx, frame === 1 ? 4 : 5, 11 + y, pants, boot, frame === 1 ? 3 : 4);
      drawLeg(ctx, frame === 1 ? 10 : 9, 11 + y, pants, boot, frame === 1 ? 10 : 9);
      break;
    }
    case 'gather': {
      // Crouched, arms reaching down
      const y = 3;
      drawHead(ctx, 5, y - 1, hair, skin, eye);
      // Shorter body (crouched)
      ctx.fillStyle = hexColor;
      ctx.fillRect(4, y + 5, 8, 3);
      ctx.fillStyle = bodyLight;
      ctx.fillRect(5, y + 5, 3, 2);
      // Arms reaching to ground
      ctx.fillStyle = armShade;
      ctx.fillRect(3, y + 6, 1, 3);
      ctx.fillRect(12, y + 6, 1, 3);
      ctx.fillStyle = skin;
      ctx.fillRect(3, y + 9, 1, 1);
      ctx.fillRect(12, y + 9, 1, 1);
      // Sparkle at hands (gathering)
      if (frame === 1) {
        ctx.fillStyle = '#ffe040';
        ctx.fillRect(2, y + 9, 1, 1);
        ctx.fillRect(13, y + 9, 1, 1);
      }
      // Legs wide, crouched
      ctx.fillStyle = pants;
      ctx.fillRect(4, y + 8, 2, 2);
      ctx.fillRect(10, y + 8, 2, 2);
      ctx.fillStyle = boot;
      ctx.fillRect(3, y + 10, 3, 1);
      ctx.fillRect(10, y + 10, 3, 1);
      break;
    }
    case 'hurt': {
      // Knocked back, red flash
      const lean = frame === 0 ? -2 : -1;
      const y = frame === 0 ? 0 : -1;
      drawHead(ctx, 5 + lean, 1 + y, hair, skin, eye);
      drawBody(ctx, 4 + lean, 7 + y, hexColor, bodyLight);
      // Arms flung out
      ctx.fillStyle = armShade;
      ctx.fillRect(2 + lean, 7 + y, 1, 2);
      ctx.fillRect(13 + lean, 7 + y, 1, 2);
      ctx.fillStyle = skin;
      ctx.fillRect(1 + lean, 7 + y, 1, 1);
      ctx.fillRect(14 + lean, 7 + y, 1, 1);
      drawLegs(ctx, 5 + lean, 11 + y, 9 + lean, 11 + y, pants, boot);
      // Red damage flash
      ctx.fillStyle = 'rgba(255,40,40,0.35)';
      ctx.fillRect(0, 0, 16, 16);
      // Hit spark
      ctx.fillStyle = '#fff';
      if (frame === 0) {
        ctx.fillRect(11, 4, 1, 1);
        ctx.fillRect(13, 5, 1, 1);
        ctx.fillRect(12, 6, 1, 1);
      }
      break;
    }
    case 'rest': {
      // Sitting on ground
      // Head lower
      drawHead(ctx, 5, 5, hair, skin, eye);
      // Body short (sitting)
      ctx.fillStyle = hexColor;
      ctx.fillRect(4, 11, 8, 2);
      ctx.fillStyle = bodyLight;
      ctx.fillRect(5, 11, 3, 1);
      // Arms resting at sides
      ctx.fillStyle = armShade;
      ctx.fillRect(3, 11, 1, 2);
      ctx.fillRect(12, 11, 1, 2);
      ctx.fillStyle = skin;
      ctx.fillRect(3, 13, 1, 1);
      ctx.fillRect(12, 13, 1, 1);
      // Legs folded in front
      ctx.fillStyle = pants;
      ctx.fillRect(4, 13, 4, 1);
      ctx.fillRect(8, 13, 4, 1);
      ctx.fillStyle = boot;
      ctx.fillRect(3, 13, 1, 1);
      ctx.fillRect(12, 13, 1, 1);
      // Floating Z's
      ctx.fillStyle = '#aaccff';
      const zy = frame === 1 ? -1 : 0;
      ctx.fillRect(12, 2 + zy, 2, 1);
      ctx.fillRect(13, 3 + zy, 1, 1);
      ctx.fillRect(12, 4 + zy, 2, 1);
      if (frame === 1) {
        ctx.fillStyle = 'rgba(170,204,255,0.5)';
        ctx.fillRect(14, 0, 1, 1);
        ctx.fillRect(13, 1, 2, 1);
      }
      break;
    }
    case 'flee': {
      // Running fast — big stride, leaned forward
      const y = frame === 1 ? -1 : 0;
      const lean = 2;
      drawHead(ctx, 5 + lean, 1 + y, hair, skin, eye);
      drawBody(ctx, 4 + lean, 7 + y, hexColor, bodyLight);
      // Arms pumping hard
      const f = frame === 0 ? 1 : -1;
      ctx.fillStyle = armShade;
      ctx.fillRect(3 + lean, 7 + y - f * 2, 1, 2);
      ctx.fillRect(12 + lean, 7 + y + f * 2, 1, 2);
      ctx.fillStyle = skin;
      ctx.fillRect(3 + lean, 9 + y - f * 2, 1, 1);
      ctx.fillRect(12 + lean, 9 + y + f * 2, 1, 1);
      // Legs in big stride
      drawLeg(ctx, 5 + lean - f * 2, 11 + y, pants, boot, 4 + lean - f * 2);
      drawLeg(ctx, 9 + lean + f * 2, 11 + y, pants, boot, 9 + lean + f * 2);
      // Speed lines
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(0, 6 + y, 3 + lean - 1, 1);
      ctx.fillRect(0, 10 + y, 2 + lean - 1, 1);
      break;
    }
    case 'hungry': {
      // Slouched, droopy — slower bob
      const y = frame === 1 ? 1 : 2;
      drawHead(ctx, 5, y, hair, skin, eye);
      // Body slightly slumped
      ctx.fillStyle = hexColor;
      ctx.fillRect(4, 6 + y, 8, 3);
      ctx.fillStyle = bodyLight;
      ctx.fillRect(5, 6 + y, 3, 2);
      // Arms hang low
      ctx.fillStyle = armShade;
      ctx.fillRect(3, 7 + y, 1, 3);
      ctx.fillRect(12, 7 + y, 1, 3);
      ctx.fillStyle = skin;
      ctx.fillRect(3, 10 + y, 1, 1);
      ctx.fillRect(12, 10 + y, 1, 1);
      // Legs closer together (shuffling)
      ctx.fillStyle = pants;
      ctx.fillRect(6, 9 + y, 2, 2);
      ctx.fillRect(8, 9 + y, 2, 2);
      ctx.fillStyle = boot;
      ctx.fillRect(5, 11 + y, 3, 1);
      ctx.fillRect(8, 11 + y, 3, 1);
      // Hunger swirl above head
      ctx.fillStyle = 'rgba(255,160,40,0.6)';
      ctx.fillRect(10, y - 2, 1, 1);
      ctx.fillRect(11, y - 1, 1, 1);
      ctx.fillRect(10, y, 1, 1);
      break;
    }
  }
}

// --- shared drawing helpers for character parts ---
function drawHead(ctx, x, y, hair, skin, eye) {
  ctx.fillStyle = hair;
  ctx.fillRect(x, y, 6, 3);
  ctx.fillRect(x - 1, y + 1, 8, 2);
  ctx.fillStyle = skin;
  ctx.fillRect(x, y + 3, 6, 3);
  ctx.fillStyle = eye;
  ctx.fillRect(x + 1, y + 4, 1, 1);
  ctx.fillRect(x + 4, y + 4, 1, 1);
  ctx.fillStyle = '#d4a080';
  ctx.fillRect(x + 2, y + 5, 2, 1);
}

function drawBody(ctx, x, y, color, highlight) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 8, 4);
  ctx.fillStyle = highlight;
  ctx.fillRect(x + 1, y, 3, 3);
}

function drawArms(ctx, lx, ly, rx, ry, shade, skin) {
  ctx.fillStyle = shade;
  ctx.fillRect(lx, ly, 1, 2);
  ctx.fillRect(rx, ry, 1, 2);
  ctx.fillStyle = skin;
  ctx.fillRect(lx, ly + 2, 1, 1);
  ctx.fillRect(rx, ry + 2, 1, 1);
}

function drawLegs(ctx, lx, ly, rx, ry, pants, boot) {
  drawLeg(ctx, lx, ly, pants, boot, lx - 1);
  drawLeg(ctx, rx, ry, pants, boot, rx);
}

function drawLeg(ctx, x, y, pants, boot, bootX) {
  ctx.fillStyle = pants;
  ctx.fillRect(x, y, 2, 2);
  ctx.fillStyle = boot;
  ctx.fillRect(bootX, y + 2, 3, 1);
}

// ========== TERRAIN TILE GENERATION (16x16 pixel art) ==========
const tileTextureCache = {};

// Generate a single 16x16 terrain tile on an offscreen canvas
function generateTile(type, variant) {
  const c = document.createElement('canvas');
  c.width = 16; c.height = 16;
  const g = c.getContext('2d');
  const v = variant % 4; // 4 variations per type

  switch (type) {
    case '.': drawPlainsTile(g, v); break;
    case 'T': drawForestTile(g, v); break;
    case '^': drawMountainTile(g, v); break;
    case '~': drawWaterTile(g, v); break;
    case 'O': drawCaveTile(g, v); break;
    case '#': drawRuinsTile(g, v); break;
    default: drawPlainsTile(g, v); break;
  }
  return c;
}

function drawPlainsTile(g, v) {
  // Base grass
  g.fillStyle = '#7ec850';
  g.fillRect(0, 0, 16, 16);
  // Lighter patches
  g.fillStyle = '#8ed860';
  if (v === 0) { g.fillRect(2, 3, 3, 2); g.fillRect(9, 10, 4, 3); }
  if (v === 1) { g.fillRect(6, 1, 4, 2); g.fillRect(1, 11, 3, 2); }
  if (v === 2) { g.fillRect(10, 2, 3, 3); g.fillRect(3, 8, 2, 3); }
  if (v === 3) { g.fillRect(0, 5, 4, 2); g.fillRect(8, 12, 5, 2); }
  // Darker grass tufts
  g.fillStyle = '#6ab842';
  if (v < 2) { g.fillRect(5, 7, 1, 2); g.fillRect(12, 4, 1, 2); }
  if (v >= 2) { g.fillRect(3, 13, 1, 2); g.fillRect(11, 1, 1, 2); }
  // Tiny flower or pebble
  if (v === 0) { g.fillStyle = '#f0e060'; g.fillRect(7, 5, 1, 1); }
  if (v === 2) { g.fillStyle = '#e87070'; g.fillRect(13, 9, 1, 1); }
  if (v === 3) { g.fillStyle = '#a0a090'; g.fillRect(2, 6, 1, 1); }
}

function drawForestTile(g, v) {
  // Ground
  g.fillStyle = '#4a7a30';
  g.fillRect(0, 0, 16, 16);
  g.fillStyle = '#3e6828';
  g.fillRect(0, 12, 16, 4);
  // Trunk
  g.fillStyle = '#6b4226';
  const tx = v < 2 ? 6 : 7;
  g.fillRect(tx, 8, 2, 6);
  g.fillRect(tx, 14, 3, 2);
  // Canopy (layered for depth)
  g.fillStyle = '#1b6020';
  g.fillRect(tx - 4, 3, 10, 6);
  g.fillStyle = '#2e8030';
  g.fillRect(tx - 3, 2, 8, 5);
  g.fillStyle = '#3a9a3a';
  g.fillRect(tx - 2, 1, 6, 3);
  // Highlights on canopy
  g.fillStyle = '#50b050';
  if (v === 0) { g.fillRect(tx - 1, 2, 2, 1); g.fillRect(tx + 2, 4, 2, 1); }
  if (v === 1) { g.fillRect(tx, 3, 3, 1); }
  if (v === 2) { g.fillRect(tx - 2, 2, 2, 1); g.fillRect(tx + 1, 5, 2, 1); }
  if (v === 3) { g.fillRect(tx - 1, 1, 2, 1); g.fillRect(tx + 3, 3, 1, 1); }
  // Shadow at base
  g.fillStyle = 'rgba(0,0,0,0.15)';
  g.fillRect(tx - 2, 13, 7, 2);
}

function drawMountainTile(g, v) {
  // Base rocky ground
  g.fillStyle = '#8b7355';
  g.fillRect(0, 0, 16, 16);
  g.fillStyle = '#7a6348';
  g.fillRect(0, 10, 16, 6);
  // Mountain peak
  g.fillStyle = '#9e8e70';
  g.fillRect(4, 4, 8, 12);
  g.fillRect(5, 2, 6, 2);
  g.fillRect(6, 1, 4, 1);
  g.fillRect(7, 0, 2, 1);
  // Snow cap
  g.fillStyle = '#e8e0d8';
  g.fillRect(7, 0, 2, 1);
  g.fillRect(6, 1, 4, 1);
  g.fillStyle = '#d0c8c0';
  g.fillRect(6, 2, 4, 1);
  // Rocky detail
  g.fillStyle = '#6e5a42';
  if (v === 0) { g.fillRect(5, 6, 2, 1); g.fillRect(9, 8, 2, 2); }
  if (v === 1) { g.fillRect(6, 5, 1, 2); g.fillRect(10, 7, 1, 3); }
  if (v === 2) { g.fillRect(8, 4, 2, 1); g.fillRect(5, 9, 3, 1); }
  if (v === 3) { g.fillRect(7, 6, 3, 1); g.fillRect(4, 10, 2, 1); }
  // Shadow side
  g.fillStyle = 'rgba(0,0,0,0.12)';
  g.fillRect(4, 4, 2, 10);
}

function drawWaterTile(g, v) {
  // Deep water base
  g.fillStyle = '#2878b8';
  g.fillRect(0, 0, 16, 16);
  // Mid water
  g.fillStyle = '#3088c8';
  g.fillRect(0, 4, 16, 8);
  // Lighter patches
  g.fillStyle = '#48a0d8';
  if (v === 0) { g.fillRect(1, 2, 6, 3); g.fillRect(8, 9, 5, 3); }
  if (v === 1) { g.fillRect(3, 6, 7, 2); g.fillRect(0, 12, 4, 2); }
  if (v === 2) { g.fillRect(5, 0, 6, 3); g.fillRect(2, 10, 5, 3); }
  if (v === 3) { g.fillRect(0, 3, 5, 3); g.fillRect(9, 7, 6, 3); }
  // Wave highlights
  g.fillStyle = '#68c0e8';
  const wy = v * 3 + 2;
  g.fillRect(1, wy % 14, 3, 1);
  g.fillRect(7, (wy + 5) % 14, 4, 1);
  g.fillRect(12, (wy + 9) % 14, 2, 1);
  // Sparkle
  g.fillStyle = 'rgba(255,255,255,0.25)';
  g.fillRect(3 + v * 3, 4 + v, 1, 1);
}

function drawCaveTile(g, v) {
  // Dark stone ground
  g.fillStyle = '#484848';
  g.fillRect(0, 0, 16, 16);
  // Darker patches
  g.fillStyle = '#383838';
  g.fillRect(2, 2, 12, 12);
  g.fillStyle = '#2a2a2a';
  g.fillRect(4, 4, 8, 8);
  // Cave mouth / dark center
  g.fillStyle = '#1a1a1a';
  g.fillRect(5, 5, 6, 6);
  // Stone edges
  g.fillStyle = '#5a5a5a';
  g.fillRect(3, 2, 2, 1); g.fillRect(11, 2, 2, 1);
  g.fillRect(2, 4, 1, 2); g.fillRect(13, 5, 1, 2);
  g.fillRect(3, 12, 3, 1); g.fillRect(10, 13, 3, 1);
  // Variant details
  if (v === 0) { g.fillStyle = '#606060'; g.fillRect(1, 1, 1, 1); g.fillRect(14, 14, 1, 1); }
  if (v === 1) { g.fillStyle = '#505050'; g.fillRect(1, 8, 1, 2); g.fillRect(14, 3, 1, 2); }
  if (v === 2) { g.fillStyle = '#555'; g.fillRect(0, 14, 2, 2); g.fillRect(14, 0, 2, 2); }
  // Faint glow from inside
  g.fillStyle = 'rgba(100,80,60,0.15)';
  g.fillRect(6, 6, 4, 4);
}

function drawRuinsTile(g, v) {
  // Overgrown ground
  g.fillStyle = '#6a8a48';
  g.fillRect(0, 0, 16, 16);
  g.fillStyle = '#5a7a3a';
  g.fillRect(0, 0, 16, 4);
  // Stone blocks
  g.fillStyle = '#a0a098';
  if (v === 0) {
    g.fillRect(1, 10, 4, 5); g.fillRect(2, 8, 3, 2);
    g.fillRect(10, 6, 5, 3); g.fillRect(11, 4, 3, 2);
  } else if (v === 1) {
    g.fillRect(0, 8, 6, 3); g.fillRect(8, 11, 7, 4);
    g.fillRect(3, 3, 2, 4);
  } else if (v === 2) {
    g.fillRect(2, 5, 3, 8); g.fillRect(9, 2, 5, 4);
    g.fillRect(10, 10, 4, 5);
  } else {
    g.fillRect(0, 11, 5, 4); g.fillRect(6, 7, 4, 6);
    g.fillRect(12, 3, 3, 5);
  }
  // Stone cracks / detail
  g.fillStyle = '#888880';
  g.fillRect(2, 12, 2, 1); g.fillRect(11, 8, 1, 2);
  // Moss on stones
  g.fillStyle = '#5a9040';
  if (v === 0) { g.fillRect(1, 10, 2, 1); g.fillRect(10, 6, 2, 1); }
  if (v === 1) { g.fillRect(0, 8, 3, 1); g.fillRect(8, 11, 2, 1); }
  if (v === 2) { g.fillRect(2, 5, 1, 2); g.fillRect(9, 2, 2, 1); }
  if (v === 3) { g.fillRect(6, 7, 2, 1); g.fillRect(12, 3, 1, 2); }
  // Scattered pebbles
  g.fillStyle = '#b0a890';
  g.fillRect(7 + v, 14, 1, 1);
  g.fillRect(13 - v, 1, 1, 1);
}

// Get cached tile texture for a terrain type + position-based variant
function getTileTexture(type, x, y) {
  const variant = ((x * 7 + y * 13) & 0x7fffffff) % 4;
  const key = type + variant;
  if (tileTextureCache[key]) return tileTextureCache[key];
  const canvas = generateTile(type, variant);
  const tex = PIXI.Texture.from(canvas);
  tileTextureCache[key] = tex;
  return tex;
}

// ========== TERRAIN RENDERING ==========
function prerenderTerrain() {
  if (!terrain) return;

  // Build terrain using individual PIXI sprites per tile
  terrainLayer.removeChildren();
  if (terrainSprite) { terrainSprite.destroy(); terrainSprite = null; }

  const tileContainer = new PIXI.Container();
  for (let y = 0; y < worldH; y++) {
    for (let x = 0; x < worldW; x++) {
      const ch = terrainAt(x, y);
      const tex = getTileTexture(ch, x, y);
      const spr = new PIXI.Sprite(tex);
      spr.position.set(x * TILE, y * TILE);
      spr.width = TILE;
      spr.height = TILE;
      tileContainer.addChild(spr);
    }
  }

  // Resource tile overlays (glowing yellow markers)
  for (const key of resourceTiles) {
    const [rx, ry] = key.split(',').map(Number);
    const res = new PIXI.Graphics();
    const rs = TILE / 8;
    // Glow
    res.rect(rx * TILE + 2 * rs, ry * TILE + 2 * rs, 4 * rs, 4 * rs);
    res.fill({ color: 0xfdd835, alpha: 0.3 });
    // Dot
    res.rect(rx * TILE + 3 * rs, ry * TILE + 3 * rs, 2 * rs, 2 * rs);
    res.fill({ color: 0xfdd835, alpha: 1 });
    tileContainer.addChild(res);
  }

  terrainSprite = tileContainer;
  terrainLayer.addChild(tileContainer);

  // Recreate water shimmers
  createWaterShimmers();
}

function createWaterShimmers() {
  for (const s of waterShimmers) {
    if (s.parent) s.parent.removeChild(s);
    s.destroy();
  }
  waterShimmers = [];

  for (let y = 0; y < worldH; y++) {
    for (let x = 0; x < worldW; x++) {
      if (terrainAt(x, y) === '~') {
        const shimmer = new PIXI.Graphics();
        const ws = TILE / 8;
        shimmer.rect(0, 0, Math.max(1, 3 * ws), Math.max(1, ws));
        shimmer.fill({ color: 0xffffff, alpha: 1 });
        shimmer.position.set(x * TILE + ws, y * TILE + 3 * ws);
        shimmer.alpha = 0;
        shimmer._wx = x;
        shimmer._wy = y;
        effectsLayer.addChild(shimmer);
        waterShimmers.push(shimmer);
      }
    }
  }
}

// ========== BOT PIXI MANAGEMENT ==========
function getOrCreateBotVisuals(botId) {
  if (botPixiObjects[botId]) return botPixiObjects[botId];

  const color = getBotColor(botId);
  const container = new PIXI.Container();

  // Selection ring (redrawn each frame for pulsing glow)
  const ring = new PIXI.Graphics();
  ring.visible = false;
  ring.zIndex = 0;

  // Character sprite (with all animation poses)
  const anims = getCharAnims(color);
  const body = new PIXI.Sprite(anims.idle[0]);
  body.width = TILE;
  body.height = TILE;
  body._anims = anims;
  body._pose = 'idle';
  body._frameIdx = 0;
  body._frameTimer = Math.floor(Math.random() * 30);
  body._hurtTimer = 0;
  body._prevHealth = -1;
  body.zIndex = 2;

  // Death X
  const deathX = new PIXI.Graphics();
  const ds = TILE * 0.25;
  deathX.moveTo(TILE / 2 - ds, TILE / 2 - ds);
  deathX.lineTo(TILE / 2 + ds, TILE / 2 + ds);
  deathX.stroke({ color: 0x555555, width: Math.max(1, TILE / 6) });
  deathX.moveTo(TILE / 2 + ds, TILE / 2 - ds);
  deathX.lineTo(TILE / 2 - ds, TILE / 2 + ds);
  deathX.stroke({ color: 0x555555, width: Math.max(1, TILE / 6) });
  deathX.visible = false;
  deathX.zIndex = 2;

  // HP bar background
  const barH = Math.max(2, Math.round(TILE / 8));
  const barY = -barH - 1;
  const hpBg = new PIXI.Graphics();
  hpBg.rect(0, barY, TILE, barH);
  hpBg.fill(0x333333);
  hpBg.zIndex = 3;

  // HP bar fill (redrawn each frame)
  const hpFill = new PIXI.Graphics();
  hpFill.zIndex = 4;

  // Name label
  const textRes = Math.max(2, Math.ceil(window.devicePixelRatio || 1));
  const fontSize = Math.max(8, Math.round(TILE * 0.45));
  const nameText = new PIXI.Text({
    text: '',
    style: {
      fontFamily: 'Courier New',
      fontSize: fontSize,
      fill: 0xcccccc,
      stroke: { color: 0x000000, width: 3 },
    },
    resolution: textRes,
  });
  nameText.anchor.set(0.5, 0);
  nameText.position.set(TILE / 2, TILE + 1);
  nameText.zIndex = 5;

  // Directive label
  const dirFontSize = Math.max(7, Math.round(TILE * 0.35));
  const dirText = new PIXI.Text({
    text: '',
    style: {
      fontFamily: 'Courier New',
      fontSize: dirFontSize,
      fill: 0xfdd835,
      stroke: { color: 0x000000, width: 3 },
    },
    resolution: textRes,
  });
  dirText.anchor.set(0.5, 1);
  dirText.position.set(TILE / 2, barY - 1);
  dirText.visible = false;
  dirText.zIndex = 5;

  // Thinking dot
  const thinkDot = new PIXI.Graphics();
  thinkDot.circle(TILE - 1, 1, Math.max(2, TILE * 0.12));
  thinkDot.fill(0x64c8ff);
  thinkDot.visible = false;
  thinkDot.zIndex = 6;

  container.addChild(ring, body, deathX, hpBg, hpFill, nameText, dirText, thinkDot);
  container.scale.set(0);
  botLayer.addChild(container);

  const obj = { container, ring, body, deathX, hpBg, hpFill, nameText, dirText, thinkDot, _displayedHp: -1, _spawnTimer: 15, _deathTimer: 0 };
  botPixiObjects[botId] = obj;
  return obj;
}

function updateBotVisuals(botId, bot) {
  const v = getOrCreateBotVisuals(botId);
  const alive = bot.alive !== false;
  const isSelected = selectedBot === botId;
  const isBounty = bountyBot === botId;

  // Position from lerped coordinates
  const rx = bot.renderX !== undefined ? bot.renderX : bot.x;
  const ry = bot.renderY !== undefined ? bot.renderY : bot.y;
  v.container.position.set(rx * TILE, ry * TILE);

  // Spawn animation
  if (v._spawnTimer > 0) {
    if (!alive) {
      v._spawnTimer = 0;
      v.container.scale.set(1);
    } else {
      v._spawnTimer--;
      const t = 1 - v._spawnTimer / 15;
      const scale = t < 0.7 ? t / 0.7 * 1.1 : 1.1 - (t - 0.7) / 0.3 * 0.1;
      v.container.scale.set(scale);
    }
  }

  // Selection ring — pulsing concentric glow
  v.ring.visible = isSelected;
  if (isSelected) {
    v.ring.clear();
    const pulse = Math.sin(frame * 0.08) * 0.15 + 0.85;
    for (let i = 0; i < 3; i++) {
      const r = TILE * (0.65 + i * 0.15);
      const a = (0.6 - i * 0.2) * pulse;
      v.ring.circle(TILE / 2, TILE / 2, r);
      v.ring.stroke({ color: 0xffffff, width: Math.max(1, TILE / 10), alpha: a });
    }
  }

  // Alive/dead toggle with death animation
  if (!alive && v._deathTimer === 0 && v.body.visible && v.body.alpha > 0.5) {
    v._deathTimer = 20;
  }
  if (v._deathTimer > 0) {
    v._deathTimer--;
    const t = v._deathTimer / 20;
    v.body.alpha = t;
    v.deathX.alpha = 1 - t;
    v.body.visible = true;
    v.deathX.visible = true;
  } else {
    v.body.visible = alive;
    v.body.alpha = alive ? 1 : 0;
    v.deathX.visible = !alive;
    v.deathX.alpha = !alive ? 1 : 0;
  }
  v.hpBg.visible = alive;
  v.hpFill.visible = alive;

  if (alive) {
    // Detect damage → trigger hurt animation + floating number
    if (v.body._prevHealth >= 0 && bot.health < v.body._prevHealth) {
      v.body._hurtTimer = 24;
      const dmg = v.body._prevHealth - bot.health;
      if (typeof spawnFloatingText === 'function') spawnFloatingText(rx * TILE + TILE / 2, ry * TILE - TILE / 2, '-' + dmg, 0xff4444);
    } else if (v.body._prevHealth >= 0 && bot.health > v.body._prevHealth) {
      const heal = bot.health - v.body._prevHealth;
      if (typeof spawnFloatingText === 'function') spawnFloatingText(rx * TILE + TILE / 2, ry * TILE - TILE / 2, '+' + heal, 0x4caf50);
    }
    v.body._prevHealth = bot.health;
    if (v.body._hurtTimer > 0) v.body._hurtTimer--;

    // Determine target animation pose
    const intent = bot.directive?.intent || '';
    const isMoving = bot.renderX !== undefined &&
      (Math.abs(bot.x - bot.renderX) > 0.08 || Math.abs(bot.y - bot.renderY) > 0.08);
    let targetPose = 'idle';
    if (v.body._hurtTimer > 0) {
      targetPose = 'hurt';
    } else if (intent === 'flee') {
      targetPose = 'flee';
    } else if (intent === 'hunt' || intent === 'attack') {
      targetPose = isMoving ? 'walk' : 'attack';
    } else if (intent === 'gather' || intent === 'eat' || intent === 'craft') {
      targetPose = isMoving ? 'walk' : 'gather';
    } else if (intent === 'rest' || intent === 'heal') {
      targetPose = isMoving ? 'walk' : 'rest';
    } else if (isMoving) {
      targetPose = 'walk';
    } else if (bot.hunger >= 70) {
      targetPose = 'hungry';
    }

    // Switch pose — reset frame on change
    if (v.body._pose !== targetPose) {
      v.body._pose = targetPose;
      v.body._frameIdx = 0;
      v.body._frameTimer = 0;
    }

    // Animate within pose
    const speed = targetPose === 'flee' ? 12 : targetPose === 'walk' ? 16 :
                  targetPose === 'attack' ? 18 : targetPose === 'hurt' ? 12 : 35;
    v.body._frameTimer++;
    if (v.body._frameTimer >= speed) {
      v.body._frameTimer = 0;
      const frames = v.body._anims[targetPose];
      v.body._frameIdx = (v.body._frameIdx + 1) % frames.length;
    }
    v.body.texture = v.body._anims[v.body._pose][v.body._frameIdx];

    // HP bar fill (smooth lerp)
    const maxHp = bot.maxHealth || 100;
    const hpRatio = Math.max(0, (bot.health || 0) / maxHp);
    if (v._displayedHp < 0) v._displayedHp = hpRatio;
    v._displayedHp += (hpRatio - v._displayedHp) * 0.1;
    const barH = Math.max(2, Math.round(TILE / 8));
    const barY = -barH - 1;
    v.hpFill.clear();
    if (v._displayedHp > 0.001) {
      const hpColor = v._displayedHp > 0.5 ? 0x4caf50 : v._displayedHp > 0.25 ? 0xff9800 : 0xf44336;
      v.hpFill.rect(0, barY, TILE * v._displayedHp, barH);
      v.hpFill.fill(hpColor);
    }
  }

  // Name label
  const nameStr = (isBounty ? '\ud83d\udc51 ' : '') + (bot.displayName || botId);
  if (v.nameText.text !== nameStr) v.nameText.text = nameStr;
  const nameColor = isBounty ? '#fdd835' : isSelected ? '#ffffff' : '#cccccc';
  if (v.nameText.style.fill !== nameColor) v.nameText.style.fill = nameColor;

  // Directive label
  if (bot.directive && bot.directive.intent && bot.directive.intent !== 'idle') {
    const dirStr = bot.directive.intent;
    if (v.dirText.text !== dirStr) v.dirText.text = dirStr;
    v.dirText.visible = true;
  } else {
    v.dirText.visible = false;
  }

  // Thinking dot
  if (bot.thinking) {
    v.thinkDot.alpha = Math.sin(frame * 0.15) * 0.4 + 0.6;
    v.thinkDot.visible = true;
  } else {
    v.thinkDot.visible = false;
  }
}

function cleanupBotVisuals() {
  for (const id of Object.keys(botPixiObjects)) {
    if (!bots[id]) {
      const v = botPixiObjects[id];
      botLayer.removeChild(v.container);
      v.container.destroy({ children: true });
      delete botPixiObjects[id];
    }
  }
}

function resetPixiWorld() {
  // Clear terrain
  terrainLayer.removeChildren();
  if (terrainSprite) { terrainSprite.destroy({ children: true }); terrainSprite = null; }

  // Clear bots
  botLayer.removeChildren();
  for (const v of Object.values(botPixiObjects)) {
    v.container.destroy({ children: true });
  }
  botPixiObjects = {};

  // Clear effects
  for (const s of waterShimmers) s.destroy();
  waterShimmers = [];
  effectsLayer.removeChildren();

  // Re-add visual effects systems
  if (typeof particleGfx !== 'undefined') {
    effectsLayer.addChild(particleGfx);
    particleGfx.clear();
    for (const p of particles) p.active = false;
  }
  if (typeof floatingTexts !== 'undefined') {
    for (const ft of floatingTexts) { ft.visible = false; ft._life = 0; effectsLayer.addChild(ft); }
  }

  // Clear texture caches (TILE may have changed)
  for (const key of Object.keys(charTextureCache)) {
    const anims = charTextureCache[key];
    for (const pose of Object.values(anims)) {
      for (const tex of pose) tex.destroy();
    }
    delete charTextureCache[key];
  }
  for (const key of Object.keys(tileTextureCache)) {
    tileTextureCache[key].destroy();
    delete tileTextureCache[key];
  }
}

// ========== PARTICLE SYSTEM ==========
const particles = [];
const PARTICLE_POOL_SIZE = 200;
for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
  particles.push({ active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 0, color: 0xffffff, size: 2, gravity: 0 });
}
const particleGfx = new PIXI.Graphics();
effectsLayer.addChild(particleGfx);

function emitParticles(worldX, worldY, count, config) {
  const { colors, speedMin = 0.3, speedMax = 1.5, sizeMin = 1, sizeMax = 3, lifeMin = 20, lifeMax = 40, gravity = 0.03, spread = Math.PI * 2 } = config;
  let spawned = 0;
  for (const p of particles) {
    if (spawned >= count) break;
    if (p.active) continue;
    const angle = Math.random() * spread - spread / 2 + (config.baseAngle || -Math.PI / 2);
    const speed = speedMin + Math.random() * (speedMax - speedMin);
    p.x = worldX + (Math.random() - 0.5) * 4;
    p.y = worldY + (Math.random() - 0.5) * 4;
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    p.gravity = gravity;
    p.life = lifeMin + Math.random() * (lifeMax - lifeMin);
    p.maxLife = p.life;
    p.color = colors[Math.floor(Math.random() * colors.length)];
    p.size = sizeMin + Math.random() * (sizeMax - sizeMin);
    p.active = true;
    spawned++;
  }
}

function updateParticles() {
  particleGfx.clear();
  for (const p of particles) {
    if (!p.active) continue;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.life--;
    if (p.life <= 0) { p.active = false; continue; }
    const alpha = Math.min(1, p.life / p.maxLife * 2);
    const s = p.size * (0.5 + 0.5 * p.life / p.maxLife);
    particleGfx.rect(p.x - s / 2, p.y - s / 2, s, s);
    particleGfx.fill({ color: p.color, alpha });
  }
}

// ========== FLOATING DAMAGE/HEAL NUMBERS ==========
const floatingTexts = [];
const FLOAT_TEXT_POOL_SIZE = 12;
for (let i = 0; i < FLOAT_TEXT_POOL_SIZE; i++) {
  const textRes = Math.max(2, Math.ceil(window.devicePixelRatio || 1));
  const ft = new PIXI.Text({ text: '', style: { fontFamily: 'Courier New', fontSize: 10, fontWeight: 'bold', fill: 0xff4444, stroke: { color: 0x000000, width: 3 } }, resolution: textRes });
  ft.anchor.set(0.5, 0.5);
  ft.visible = false;
  ft._life = 0;
  ft._maxLife = 0;
  ft._vy = 0;
  effectsLayer.addChild(ft);
  floatingTexts.push(ft);
}

function spawnFloatingText(worldX, worldY, text, color) {
  for (const ft of floatingTexts) {
    if (ft.visible) continue;
    ft.text = text;
    ft.style.fill = color;
    ft.position.set(worldX, worldY);
    ft._vy = -0.6;
    ft._life = 40;
    ft._maxLife = 40;
    ft.alpha = 1;
    ft.visible = true;
    return;
  }
}

function updateFloatingTexts() {
  for (const ft of floatingTexts) {
    if (!ft.visible) continue;
    ft.position.y += ft._vy;
    ft._vy *= 0.97;
    ft._life--;
    ft.alpha = Math.max(0, ft._life / ft._maxLife);
    if (ft._life <= 0) ft.visible = false;
  }
}

// ========== SCREEN SHAKE ==========
function triggerShake(intensity, duration) {
  shakeIntensity = intensity;
  shakeTimer = duration;
}

// ========== DAY/NIGHT TINT ==========
function applyDayNightTint() {
  dayNightOverlay.clear();
  const p = (dayPhase || 'day').toLowerCase();
  let tint = PHASE_TINTS[p];
  if (!tint) {
    for (const [key, val] of Object.entries(PHASE_TINTS)) {
      if (p.includes(key)) { tint = val; break; }
    }
  }
  if (!tint || tint.a === 0) return;
  const color = (tint.r << 16) | (tint.g << 8) | tint.b;
  // Radial vignette: concentric rects, edges darkest, center nearly clear
  const rings = 6;
  const layerAlpha = tint.a * 1.5 / rings;
  for (let i = 0; i < rings; i++) {
    const t = i / rings;
    const mx = CW * 0.4 * t;
    const my = CH * 0.4 * t;
    dayNightOverlay.rect(mx, my, CW - mx * 2, CH - my * 2);
    dayNightOverlay.fill({ color, alpha: layerAlpha });
  }
}

// ========== POSITION INTERPOLATION ==========
function lerpBots() {
  const speed = 0.15;
  for (const bot of Object.values(bots)) {
    if (bot.renderX === undefined) { bot.renderX = bot.x; bot.renderY = bot.y; }
    const dx = bot.x - bot.renderX;
    const dy = bot.y - bot.renderY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
      bot.renderX = bot.x;
      bot.renderY = bot.y;
    } else {
      bot.renderX += dx * speed;
      bot.renderY += dy * speed;
    }
  }
}

// ========== CAMERA ==========
function updateCamera() {
  if (autoFollow && selectedBot && bots[selectedBot]) {
    const bot = bots[selectedBot];
    const rx = bot.renderX !== undefined ? bot.renderX : bot.x;
    const ry = bot.renderY !== undefined ? bot.renderY : bot.y;
    cameraTargetX = rx * TILE + TILE / 2 - CW / (2 * zoom);
    cameraTargetY = ry * TILE + TILE / 2 - CH / (2 * zoom);
    // Smooth easing toward target
    cameraX += (cameraTargetX - cameraX) * 0.08;
    cameraY += (cameraTargetY - cameraY) * 0.08;
    clampCamera();
  }
  worldContainer.position.set(-cameraX, -cameraY);
}

function clampCamera() {
  const viewW = CW / zoom;
  const viewH = CH / zoom;
  const maxX = worldW * TILE - viewW;
  const maxY = worldH * TILE - viewH;
  cameraX = Math.max(0, Math.min(cameraX, maxX));
  cameraY = Math.max(0, Math.min(cameraY, maxY));
}

// ========== GAME LOOP (PIXI Ticker) ==========
app.ticker.add(() => {
  frame++;

  // Smooth zoom
  zoom += (targetZoom - zoom) * 0.12;
  worldContainer.scale.set(zoom);

  // Interpolate bot positions
  lerpBots();

  // Update bot visuals sorted by Y for z-order
  const sortedBots = Object.values(bots).sort((a, b) => (a.renderY || a.y) - (b.renderY || b.y));
  let zIdx = 0;
  for (const bot of sortedBots) {
    updateBotVisuals(bot._id, bot);
    const v = botPixiObjects[bot._id];
    if (v) v.container.zIndex = zIdx++;
  }

  // Particles
  updateParticles();

  // Floating texts
  updateFloatingTexts();

  // Animated water shimmer
  for (const s of waterShimmers) {
    const phase = (frame + s._wx * 3 + s._wy * 7) % 30;
    if (phase < 8) {
      s.alpha = 0.06 + Math.sin(frame * 0.08 + s._wx) * 0.04;
      const ws = TILE / 8;
      s.position.x = s._wx * TILE + ((frame + s._wx * 5) % Math.max(1, Math.ceil(5 * ws)));
    } else {
      s.alpha = 0;
    }
  }

  // Day/night tint
  applyDayNightTint();

  // Camera
  updateCamera();

  // Screen shake (applied after camera)
  if (shakeTimer > 0) {
    const decay = shakeTimer / 15;
    const sx = (Math.random() - 0.5) * shakeIntensity * decay * 2;
    const sy = (Math.random() - 0.5) * shakeIntensity * decay * 2;
    worldContainer.position.x += sx;
    worldContainer.position.y += sy;
    shakeTimer--;
  }

  // Speech bubbles
  positionSpeechBubbles();
});

// Deception detection: compare bot's say message to their directive (observer-only)
function detectDeception(botId, message) {
  const bot = bots[botId];
  if (!bot || !bot.directive) return null;
  const msg = (message || '').toUpperCase();
  const intent = bot.directive.intent;
  const target = bot.directive.target;

  if (intent === 'hunt' && target) {
    if (msg.includes('ALLIANCE') && msg.includes(target.toUpperCase())) {
      return `directive: hunt ${target}`;
    }
    if (msg.includes('PEACE') || msg.includes('FRIEND') || msg.includes('WON\'T ATTACK') || msg.includes('TRUST')) {
      return `directive: hunt ${target}`;
    }
  }
  return null;
}

function showRoundEndOverlay(d) {
  const overlay = document.getElementById('round-overlay');
  const card = document.getElementById('ro-card');
  const winnerName = d.winnerDisplayName || d.winner || 'Nobody';
  let html = `<div class="ro-title">Round ${d.round} Complete!</div>`;
  html += `<div class="ro-winner">Winner: ${esc(winnerName)}</div>`;
  if (d.scoreboard && d.scoreboard.length > 0) {
    html += '<table>';
    d.scoreboard.forEach((s, i) => {
      const cls = i === 0 ? ' class="ro-first"' : '';
      html += `<tr${cls}>`;
      html += `<td class="ro-rank">${i + 1}.</td>`;
      html += `<td class="ro-name">${esc(s.displayName || s.bot)}</td>`;
      html += `<td class="ro-pts">${s.score}</td>`;
      html += '</tr>';
    });
    html += '</table>';
  }
  card.innerHTML = html;
  overlay.classList.add('show');
  if (roundOverlayTimer) clearTimeout(roundOverlayTimer);
  roundOverlayTimer = setTimeout(() => {
    overlay.classList.remove('show');
    roundOverlayTimer = null;
  }, 8000);
}

// ========== SPEECH BUBBLES ==========
const speechQueue = [];
let speechTimer = null;
const speechDom = {};
const SPEECH_SHOW_MS = 12000;
const SPEECH_FADE_MS = 800;
const SPEECH_STAGGER_MS = 3000;

function queueSpeechBubble(botId, text) {
  speechQueue.push({ botId, text });
  if (!speechTimer) drainSpeechQueue();
}

function drainSpeechQueue() {
  if (speechQueue.length === 0) { speechTimer = null; return; }
  const { botId, text } = speechQueue.shift();
  showSpeechBubble(botId, text);
  speechTimer = setTimeout(drainSpeechQueue, SPEECH_STAGGER_MS);
}

function showSpeechBubble(botId, text) {
  removeSpeechBubble(botId);
  const bot = bots[botId];
  if (!bot) return;
  const txt = text.length > 80 ? text.slice(0, 80) + '\u2026' : text;
  const color = getBotColor(botId);
  const el = document.createElement('div');
  el.className = 'speech-bubble';
  el.innerHTML = `<span class="sb-name" style="color:${color}">${esc(bot.displayName || botId)}</span>${esc(txt)}`;
  document.getElementById('map-area').appendChild(el);
  speechDom[botId] = { el };
  setTimeout(() => el.classList.add('fade'), SPEECH_SHOW_MS - SPEECH_FADE_MS);
  setTimeout(() => removeSpeechBubble(botId), SPEECH_SHOW_MS);
}

function removeSpeechBubble(botId) {
  if (speechDom[botId]) { speechDom[botId].el.remove(); delete speechDom[botId]; }
}

function positionSpeechBubbles() {
  const cr = cv.getBoundingClientRect();
  const wr = document.getElementById('map-area').getBoundingClientRect();
  const sx = cr.width / CW, sy = cr.height / CH;
  const ox = cr.left - wr.left, oy = cr.top - wr.top;
  for (const [botId, b] of Object.entries(speechDom)) {
    const bot = bots[botId];
    if (!bot) continue;
    const rx = bot.renderX !== undefined ? bot.renderX : bot.x;
    const ry = bot.renderY !== undefined ? bot.renderY : bot.y;
    const screenX = (rx * TILE - cameraX) * zoom * sx + ox;
    const screenY = ((ry * TILE - cameraY) - TILE) * zoom * sy + oy;
    b.el.style.left = screenX + 'px';
    b.el.style.top = screenY + 'px';
  }
}

// ========== NARRATIVE EVENT FORMATTER ==========
const INTENT_EMOJI = {
  gather: '\u26cf\ufe0f', craft: '\u2694\ufe0f', eat: '\ud83c\udf4e', attack: '\u2694\ufe0f',
  defend: '\ud83d\udee1\ufe0f', explore: '\ud83d\udd0d', build: '\ud83c\udfd7\ufe0f',
  rest: '\ud83d\udca4', heal: '\u2764\ufe0f', hunt: '\ud83c\udfaf', flee: '\ud83c\udfc3',
  rescue: '\ud83d\ude91', trade: '\ud83e\udd1d',
};

function formatNarrativeEvent(d) {
  const name = esc(d.displayName || d.bot || '?');
  const action = d.action || '';
  const time = hm();

  switch (action) {
    case 'move':
      return { target: 'skip' };

    case 'say': {
      const deception = d.bot ? detectDeception(d.bot, d.message) : null;
      const deceptionTag = deception ? ` <span class="dip-deception">\ud83c\udfad DECEPTION (${esc(deception)})</span>` : '';
      return {
        target: 'chat',
        html: `<span class="chat-time">${time}</span><span class="chat-name">${name}</span> ${esc(d.message || '')}${deceptionTag}`,
        color: getBotColor(d.bot),
      };
    }

    case 'gather': {
      const items = d.items
        ? d.items.map(i => `${i.qty} ${itemLabel(i.item)}`).join(', ')
        : (d.qty ? d.qty + ' ' : '') + itemLabel(d.resource || d.item);
      return { target: 'activity', html: `\u26cf\ufe0f ${name} found ${items}`, cssClass: '' };
    }

    case 'craft':
      return { target: 'activity', html: `\u2694\ufe0f ${name} crafted ${itemLabel(d.item)}!`, cssClass: 'craft' };

    case 'eat':
      return { target: 'activity', html: `\ud83c\udf4e ${name} ate ${itemLabel(d.item || 'food')}${d.restored ? ' (+' + d.restored + ' hunger)' : ''}`, cssClass: 'food' };

    case 'attack':
      return { target: 'activity', html: `\u2694\ufe0f ${name} attacks ${esc(d.target || '?')}${d.damage ? ' for ' + d.damage + ' damage' : ''}`, cssClass: 'combat' };

    case 'die':
    case 'death':
      return { target: 'activity', html: `\ud83d\udc80 ${name} has fallen!${d.cause ? ' (' + esc(d.cause) + ')' : ''}`, cssClass: 'dramatic' };

    case 'respawn':
      return { target: 'activity', html: `\u26a1 ${name} respawned at (${d.x},${d.y})`, cssClass: '' };

    case 'damage':
      return { target: 'activity', html: `\ud83d\udca5 ${name} took ${d.damage || '?'} damage${d.source ? ' from ' + esc(d.source) : ''}`, cssClass: 'combat' };

    case 'heal':
      return { target: 'activity', html: `\u2764\ufe0f ${name} healed for ${d.amount || '?'} HP`, cssClass: 'food' };

    case 'directive': {
      const emoji = INTENT_EMOJI[d.intent] || '\ud83d\udd0d';
      const strategyHtml = d.strategy ? `<br><span style="color:#ff9800;font-style:italic;font-size:10px">\ud83e\udde0 ${esc(d.strategy)}</span>` : '';
      return { target: 'activity', html: `${emoji} ${name} \u2192 ${esc(d.intent || '?')}${d.target ? ' ' + esc(d.target) : ''}${strategyHtml}`, cssClass: 'directive-entry' };
    }

    case 'equip':
      return { target: 'activity', html: `\ud83d\udee1\ufe0f ${name} equipped ${itemLabel(d.item)}`, cssClass: 'craft' };

    case 'build':
      return { target: 'activity', html: `\ud83c\udfd7\ufe0f ${name} built ${itemLabel(d.structure || d.item)}`, cssClass: 'craft' };

    case 'rest':
      return { target: 'activity', html: `\ud83d\udca4 ${name} rested${d.restored ? ' (+' + d.restored + ' HP)' : ''}`, cssClass: 'food' };

    case 'pickup':
      return { target: 'activity', html: `\u26cf\ufe0f ${name} picked up ${itemLabel(d.item)}`, cssClass: '' };

    case 'drop':
      return { target: 'activity', html: `\ud83d\udce6 ${name} dropped ${itemLabel(d.item)}`, cssClass: '' };

    case 'defend':
      return { target: 'activity', html: `\ud83d\udee1\ufe0f ${name} defended${d.blocked ? ' (blocked ' + d.blocked + ')' : ''}`, cssClass: 'combat' };

    case 'interact':
      return { target: 'activity', html: `\ud83e\udd1d ${name} interacted with ${esc(d.target || '?')}`, cssClass: '' };

    case 'explore':
    case 'idle':
    case 'alliance_bonus':
      return { target: 'skip' };

    case 'alliance_proposed':
      return { target: 'activity', html: `\ud83e\udd1d ${name} proposed alliance with ${esc(d.target || '?')}`, cssClass: 'alliance' };

    case 'alliance_formed':
      return { target: 'activity', html: `\u2694\ufe0f Alliance formed: ${name} \u2194 ${esc(d.ally || '?')}`, cssClass: 'alliance' };

    case 'alliance_broken':
      return { target: 'activity', html: `\ud83d\udd17 Alliance broken: ${name} \u2194 ${esc(d.ally || '?')} (${esc(d.reason || '?')})`, cssClass: d.reason === 'betrayal' ? 'betrayal' : '' };

    case 'betrayal':
      return { target: 'activity', html: `\ud83d\udde1\ufe0f BETRAYAL! ${name} betrayed ${esc(d.victim || '?')}!`, cssClass: 'betrayal' };

    case 'bounty_kill':
      return { target: 'activity', html: `\ud83d\udc51 BOUNTY KILL! ${name} took down the leader ${esc(d.target || '?')}!`, cssClass: 'bounty' };

    default:
      if (!action) return { target: 'skip' };
      return { target: 'activity', html: `${name} ${esc(action)}${d.detail ? ' \u2014 ' + esc(d.detail) : ''}`, cssClass: '' };
  }
}

function routeNarrativeEvent(d) {
  const ev = formatNarrativeEvent(d);
  if (ev.target === 'chat') {
    addChat(ev.html, ev.color);
    if (d.bot) queueSpeechBubble(d.bot, d.message || '');
  } else if (ev.target === 'activity') {
    addActivity(ev.html, ev.cssClass);
  }
}

// ========== UI: BOTTOM BAR ==========
function updateBar() {
  const tickEl = document.getElementById('tick-info');
  const phaseEl = document.getElementById('phase-info');
  const countEl = document.getElementById('bot-count');
  const cdEl = document.getElementById('countdown');
  const stEl = document.getElementById('status');
  const roundEl = document.getElementById('round-info');

  tickEl.textContent = tick > 0 ? 'Tick ' + tick : '--';

  if (roundNumber > 0) {
    roundEl.textContent = `Round ${roundNumber} | ${roundTicksRemaining} ticks left`;
    roundEl.style.color = '#fdd835';
  } else {
    roundEl.textContent = '';
  }

  if (dayPhase) {
    const p = dayPhase.toLowerCase();
    let cls = 'phase-day';
    if (p.includes('night')) cls = 'phase-night';
    else if (p.includes('dawn') || p.includes('morning')) cls = 'phase-dawn';
    else if (p.includes('dusk') || p.includes('evening')) cls = 'phase-dusk';
    phaseEl.innerHTML = `<span class="${cls}">${esc(dayPhase)}</span>`;
  } else {
    phaseEl.textContent = '';
  }

  const alive = Object.values(bots).filter(b => b.alive !== false).length;
  const total = Object.keys(bots).length;
  countEl.textContent = `Bots: ${alive}/${total}`;

  if (nextTickAt) {
    const remaining = Math.max(0, Math.ceil((nextTickAt - Date.now()) / 1000));
    cdEl.textContent = 'Next: ' + remaining + 's';
  } else {
    cdEl.textContent = '';
  }

  if (online) {
    stEl.textContent = 'Connected';
    stEl.className = 'st-run';
  } else {
    stEl.textContent = 'Disconnected';
    stEl.className = 'st-off';
  }
}

// ========== MOUSE INTERACTION ==========
function canvasToGrid(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  const scaleX = CW / rect.width;
  const scaleY = CH / rect.height;
  const cx = (clientX - rect.left) * scaleX / zoom + cameraX;
  const cy = (clientY - rect.top) * scaleY / zoom + cameraY;
  return {
    gx: Math.floor(cx / TILE),
    gy: Math.floor(cy / TILE),
    px: cx,
    py: cy,
  };
}

function findBotAt(gx, gy) {
  let closest = null;
  let closestDist = 3;
  for (const bot of Object.values(bots)) {
    const dx = bot.x - gx;
    const dy = bot.y - gy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < closestDist) {
      closestDist = dist;
      closest = bot;
    }
  }
  return closest;
}

cv.addEventListener('mousedown', (e) => {
  if (e.button === 0) {
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragCamStartX = cameraX;
    dragCamStartY = cameraY;
  }
});

cv.addEventListener('mousemove', (e) => {
  if (dragging) {
    const rect = cv.getBoundingClientRect();
    const scaleX = CW / rect.width / zoom;
    const scaleY = CH / rect.height / zoom;
    const dx = (e.clientX - dragStartX) * scaleX;
    const dy = (e.clientY - dragStartY) * scaleY;
    cameraX = dragCamStartX - dx;
    cameraY = dragCamStartY - dy;
    cameraTargetX = cameraX;
    cameraTargetY = cameraY;
    clampCamera();
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
      autoFollow = false;
      document.getElementById('follow-toggle').checked = false;
    }
  }

  // Tooltip
  const pos = canvasToGrid(e.clientX, e.clientY);
  const tooltip = document.getElementById('tooltip');
  if (pos.gx >= 0 && pos.gx < worldW && pos.gy >= 0 && pos.gy < worldH) {
    const tChar = terrainAt(pos.gx, pos.gy);
    const tName = TERRAIN_NAMES[tChar] || 'Unknown';
    const bot = findBotAt(pos.gx, pos.gy);
    let text = `(${pos.gx},${pos.gy}) ${tName}`;
    if (resourceTiles.has(pos.gx + ',' + pos.gy)) text += ' [Resource]';
    if (bot) text += `\n${bot.displayName || bot._id} HP:${bot.health}`;
    tooltip.textContent = text;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX - document.getElementById('map-area').getBoundingClientRect().left + 12) + 'px';
    tooltip.style.top = (e.clientY - document.getElementById('map-area').getBoundingClientRect().top - 10) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
});

cv.addEventListener('mouseup', (e) => {
  if (dragging) {
    const dx = Math.abs(e.clientX - dragStartX);
    const dy = Math.abs(e.clientY - dragStartY);
    if (dx < 4 && dy < 4) {
      const pos = canvasToGrid(e.clientX, e.clientY);
      const bot = findBotAt(pos.gx, pos.gy);
      if (bot) {
        selectedBot = bot._id;
        autoFollow = document.getElementById('follow-toggle').checked;
      } else {
        selectedBot = null;
      }
      renderBotInfo();
      renderBotList();
    }
    dragging = false;
  }
});

cv.addEventListener('mouseleave', () => {
  dragging = false;
  document.getElementById('tooltip').style.display = 'none';
});

// Mousewheel zoom
cv.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = -Math.sign(e.deltaY) * 0.15;
  targetZoom = Math.max(0.5, Math.min(3.0, targetZoom + delta));
}, { passive: false });

document.getElementById('follow-toggle').addEventListener('change', (e) => {
  autoFollow = e.target.checked;
});

// ========== PROCESS INIT ==========
function processInit(d) {
  tick = d.tick || 0;
  dayPhase = d.dayPhase || d.phase || '';
  if (d.world) {
    worldW = d.world.width || GRID_W;
    worldH = d.world.height || GRID_H;
    GRID_W = worldW;
    GRID_H = worldH;
    TILE = Math.max(4, Math.floor(512 / Math.max(GRID_W, GRID_H)));
    CW = GRID_W * TILE;
    CH = GRID_H * TILE;
    app.renderer.resize(CW, CH);
    resize();
    resetPixiWorld();
  }

  // Parse terrain
  if (d.terrain) {
    terrain = d.terrain;
    prerenderTerrain();
  }

  // Parse resource tiles
  if (d.resources) {
    resourceTiles.clear();
    for (const r of d.resources) {
      if (r.x !== undefined && r.y !== undefined) {
        resourceTiles.add(r.x + ',' + r.y);
      }
    }
    if (terrain) prerenderTerrain();
  }

  // Parse bots
  if (d.bots) {
    bots = {};
    if (Array.isArray(d.bots)) {
      for (const b of d.bots) {
        const id = b.name || b.id || b.bot;
        if (!id) continue;
        bots[id] = {
          _id: id,
          x: b.x || 0,
          y: b.y || 0,
          health: b.health !== undefined ? b.health : 100,
          maxHealth: b.maxHealth || 100,
          hunger: b.hunger !== undefined ? b.hunger : 0,
          alive: b.alive !== false,
          displayName: b.displayName || id,
          equipment: b.equipment || {},
          inventory: b.inventory || [],
        };
      }
    } else {
      for (const [id, b] of Object.entries(d.bots)) {
        bots[id] = {
          _id: id,
          x: b.x || 0,
          y: b.y || 0,
          health: b.health !== undefined ? b.health : 100,
          maxHealth: b.maxHealth || 100,
          hunger: b.hunger !== undefined ? b.hunger : 0,
          alive: b.alive !== false,
          displayName: b.displayName || id,
          equipment: b.equipment || {},
          inventory: b.inventory || [],
        };
      }
    }
    cleanupBotVisuals();
  }

  // Process recent events for the log
  if (d.recentEvents && Array.isArray(d.recentEvents)) {
    for (const ev of d.recentEvents) {
      routeNarrativeEvent(ev);
    }
  }

  // Round data
  if (d.round) {
    roundNumber = d.round.number || 0;
    roundTicksRemaining = d.round.ticksRemaining || 0;
    roundScores = d.round.scores || {};
  }

  // Diplomacy data
  if (d.diplomacy) {
    dipAlliances = d.diplomacy.alliances || {};
    dipProposals = d.diplomacy.proposals || {};
    dipBetrayals = d.diplomacy.betrayals || [];
    bountyBot = d.diplomacy.bountyBot || null;
  }

  // Select first alive bot if none selected
  if (!selectedBot) {
    const first = Object.values(bots).find(b => b.alive !== false);
    if (first) selectedBot = first._id;
  }

  online = true;
  renderBotInfo();
  renderBotList();
  renderStatusStrip();
  renderScoreboard();
  renderDiplomacyPanel();
  updateBar();

  addActivity(`Connected to survival grid (${worldW}\u00d7${worldH}, ${Object.keys(bots).length} bots)`, '');
}

// ========== PROCESS SURVIVAL EVENT ==========
function processSurvivalEvent(d) {
  const botId = d.bot;
  if (botId && bots[botId]) {
    const bot = bots[botId];
    if (d.x !== undefined) bot.x = d.x;
    if (d.y !== undefined) bot.y = d.y;
    if (d.health !== undefined) bot.health = d.health;
    if (d.hunger !== undefined) bot.hunger = d.hunger;
    if (d.alive !== undefined) bot.alive = d.alive;
    if (d.equipment) bot.equipment = d.equipment;
    if (d.inventory) bot.inventory = d.inventory;
    if (d.displayName) bot.displayName = d.displayName;

    if (d.action === 'die') bot.alive = false;
    if (d.action === 'respawn') bot.alive = true;
  } else if (botId && !bots[botId]) {
    bots[botId] = {
      _id: botId,
      x: d.x || 0,
      y: d.y || 0,
      health: d.health !== undefined ? d.health : 100,
      maxHealth: d.maxHealth || 100,
      hunger: d.hunger !== undefined ? d.hunger : 0,
      alive: d.alive !== false,
      displayName: d.displayName || botId,
      equipment: d.equipment || {},
      inventory: d.inventory || [],
    };
  }

  // Update resource tiles
  if (d.action === 'gather' && d.x !== undefined && d.y !== undefined) {
    if (d.depleted) {
      resourceTiles.delete(d.x + ',' + d.y);
      if (terrain) prerenderTerrain();
    }
  }

  routeNarrativeEvent(d);

  // Particle effects
  if (d.bot && bots[d.bot]) {
    const b = bots[d.bot];
    const px = (b.renderX !== undefined ? b.renderX : b.x) * TILE + TILE / 2;
    const py = (b.renderY !== undefined ? b.renderY : b.y) * TILE + TILE / 2;
    if (d.action === 'attack') {
      const target = d.target && bots[d.target];
      const tx = target ? (target.renderX !== undefined ? target.renderX : target.x) * TILE + TILE / 2 : px;
      const ty = target ? (target.renderY !== undefined ? target.renderY : target.y) * TILE + TILE / 2 : py;
      emitParticles(tx, ty, 10, { colors: [0xff6600, 0xff3300, 0xffaa00, 0xff0000], speedMin: 0.5, speedMax: 2.0, lifeMin: 15, lifeMax: 30 });
    } else if (d.action === 'die' || d.action === 'death') {
      emitParticles(px, py, 18, { colors: [0xffffff, 0xcccccc, 0x999999, 0xaaaaaa], speedMin: 0.5, speedMax: 2.5, sizeMin: 1, sizeMax: 4, lifeMin: 25, lifeMax: 45 });
      triggerShake(3, 15);
    } else if (d.action === 'gather') {
      emitParticles(px, py, 6, { colors: [0xfdd835, 0xffe082, 0xffcc00], speedMin: 0.2, speedMax: 0.8, lifeMin: 20, lifeMax: 35, gravity: -0.02, baseAngle: -Math.PI / 2, spread: Math.PI / 3 });
    } else if (d.action === 'craft') {
      emitParticles(px, py, 8, { colors: [0x42a5f5, 0x64b5f6, 0x1e88e5, 0x90caf9], speedMin: 0.3, speedMax: 1.2, lifeMin: 20, lifeMax: 35, gravity: -0.03, baseAngle: -Math.PI / 2, spread: Math.PI / 2 });
    } else if (d.action === 'eat' || d.action === 'heal') {
      emitParticles(px, py, 4, { colors: [0x4caf50, 0x66bb6a, 0x81c784], speedMin: 0.2, speedMax: 0.6, lifeMin: 25, lifeMax: 40, gravity: -0.04, baseAngle: -Math.PI / 2, spread: Math.PI / 4 });
    }
  }

  renderBotInfo();
  renderBotList();
  renderStatusStrip();
}

// ========== PROCESS TICK ==========
function processTick(d) {
  tick = d.tick || tick;
  dayPhase = d.dayPhase || d.phase || dayPhase;
  if (d.nextTickAt) nextTickAt = d.nextTickAt;
  if (d.tickIntervalMs) tickIntervalMs = d.tickIntervalMs;

  // Update all bot states
  if (d.botStates) {
    if (Array.isArray(d.botStates)) {
      for (const bs of d.botStates) {
        const id = bs.name || bs.id || bs.bot;
        if (!id) continue;
        if (bots[id]) {
          if (bs.x !== undefined) bots[id].x = bs.x;
          if (bs.y !== undefined) bots[id].y = bs.y;
          if (bs.health !== undefined) bots[id].health = bs.health;
          if (bs.hunger !== undefined) bots[id].hunger = bs.hunger;
          if (bs.alive !== undefined) bots[id].alive = bs.alive;
          if (bs.equipment) bots[id].equipment = bs.equipment;
          if (bs.inventory) bots[id].inventory = bs.inventory;
          if (bs.displayName) bots[id].displayName = bs.displayName;
          if (bs.directive) bots[id].directive = bs.directive;
        } else {
          bots[id] = {
            _id: id,
            x: bs.x || 0,
            y: bs.y || 0,
            health: bs.health !== undefined ? bs.health : 100,
            maxHealth: bs.maxHealth || 100,
            hunger: bs.hunger !== undefined ? bs.hunger : 0,
            alive: bs.alive !== false,
            displayName: bs.displayName || id,
            equipment: bs.equipment || {},
            inventory: bs.inventory || [],
            directive: bs.directive || null,
          };
        }
      }
    } else {
      for (const [id, bs] of Object.entries(d.botStates)) {
        if (bots[id]) {
          if (bs.x !== undefined) bots[id].x = bs.x;
          if (bs.y !== undefined) bots[id].y = bs.y;
          if (bs.health !== undefined) bots[id].health = bs.health;
          if (bs.hunger !== undefined) bots[id].hunger = bs.hunger;
          if (bs.alive !== undefined) bots[id].alive = bs.alive;
          if (bs.equipment) bots[id].equipment = bs.equipment;
          if (bs.inventory) bots[id].inventory = bs.inventory;
          if (bs.displayName) bots[id].displayName = bs.displayName;
          if (bs.directive) bots[id].directive = bs.directive;
        } else {
          bots[id] = {
            _id: id,
            x: bs.x || 0,
            y: bs.y || 0,
            health: bs.health !== undefined ? bs.health : 100,
            maxHealth: bs.maxHealth || 100,
            hunger: bs.hunger !== undefined ? bs.hunger : 0,
            alive: bs.alive !== false,
            displayName: bs.displayName || id,
            equipment: bs.equipment || {},
            inventory: bs.inventory || [],
            directive: bs.directive || null,
          };
        }
      }
    }
    cleanupBotVisuals();
  }

  // Incremental resource updates from tick
  if (d.resourceChanges) {
    let changed = false;
    if (d.resourceChanges.depleted) {
      for (const r of d.resourceChanges.depleted) {
        resourceTiles.delete(r.x + ',' + r.y);
        changed = true;
      }
    }
    if (d.resourceChanges.respawned) {
      for (const r of d.resourceChanges.respawned) {
        resourceTiles.add(r.x + ',' + r.y);
        changed = true;
      }
    }
    if (changed && terrain) prerenderTerrain();
  }
  // Full resource sync (reconnect)
  if (d.resources) {
    resourceTiles.clear();
    for (const r of d.resources) {
      if (r.x !== undefined && r.y !== undefined) {
        resourceTiles.add(r.x + ',' + r.y);
      }
    }
    if (terrain) prerenderTerrain();
  }

  // Round data
  if (d.round) {
    roundNumber = d.round.number || roundNumber;
    roundTicksRemaining = d.round.ticksRemaining !== undefined ? d.round.ticksRemaining : roundTicksRemaining;
    roundScores = d.round.scores || roundScores;
  }

  // Diplomacy data
  if (d.diplomacy) {
    dipAlliances = d.diplomacy.alliances || {};
    dipProposals = d.diplomacy.proposals || {};
    dipBetrayals = d.diplomacy.betrayals || [];
    bountyBot = d.diplomacy.bountyBot || null;
  }

  // Narrative tick separator with bot status hints
  const aliveBots = Object.values(bots).filter(b => b.alive !== false);
  const total = Object.keys(bots).length;
  const hints = aliveBots.slice(0, 4).map(b => {
    const maxHp = b.maxHealth || 100;
    const hpRatio = b.health / maxHp;
    const parts = [esc(b.displayName || b._id)];
    if (hpRatio <= 0.25) parts.push('LOW HP');
    else if (b.hunger >= 80) parts.push('HUNGRY');
    if (b.directive && b.directive.intent) parts.push(b.directive.intent + (b.directive.target ? ' ' + b.directive.target : ''));
    return parts.join(': ');
  }).join(' | ');
  addTickSeparator(`Tick ${tick} \u2014 ${dayPhase} \u2014 ${aliveBots.length}/${total} alive${hints ? ' \u2014 ' + hints : ''}`);

  renderBotInfo();
  renderBotList();
  renderStatusStrip();
  renderScoreboard();
  renderDiplomacyPanel();
  updateBar();
}

// ========== PROCESS FAST TICK (autopilot position updates) ==========
function processFastTick(d) {
  if (!d.positions) return;
  for (const [id, pos] of Object.entries(d.positions)) {
    if (bots[id]) {
      bots[id].x = pos.x;
      bots[id].y = pos.y;
    }
  }
}

// ========== PROCESS THINKING STATE ==========
function processThinking(d) {
  const botId = d.bot;
  if (botId && bots[botId]) {
    bots[botId].thinking = !!d.thinking;
  }
}

// ========== SSE CONNECTION ==========
function connect() {
  const basePath = location.pathname.replace(/\/survival\.html$/, '').replace(/\/+$/, '');
  const url = basePath ? `${basePath}/events` : '/events';
  const es = new EventSource(url);

  es.onopen = () => {
    online = true;
    updateBar();
  };

  es.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      const type = d.type || d.event;

      if (type === 'init' && d.gameType === 'grid') {
        processInit(d);
      } else if (type === 'survival_event') {
        processSurvivalEvent(d);
      } else if (type === 'tick') {
        processTick(d);
      } else if (type === 'fast_tick') {
        processFastTick(d);
      } else if (type === 'thinking') {
        processThinking(d);
      } else if (type === 'round_end') {
        showRoundEndOverlay(d);
        addActivity(`\ud83c\udfc6 Round ${d.round} ended! Winner: ${esc(d.winnerDisplayName || d.winner || 'Nobody')}`, 'dramatic');
      }
    } catch (err) {
      // Ignore parse errors
    }
  };

  // Named event listeners (SSE event types)
  es.addEventListener('init', (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.gameType === 'grid') processInit(d);
    } catch {}
  });

  es.addEventListener('survival_event', (e) => {
    try {
      processSurvivalEvent(JSON.parse(e.data));
    } catch {}
  });

  es.addEventListener('tick', (e) => {
    try {
      processTick(JSON.parse(e.data));
    } catch {}
  });

  es.addEventListener('fast_tick', (e) => {
    try {
      processFastTick(JSON.parse(e.data));
    } catch {}
  });

  es.addEventListener('thinking', (e) => {
    try {
      processThinking(JSON.parse(e.data));
    } catch {}
  });

  es.addEventListener('round_end', (e) => {
    try {
      const d = JSON.parse(e.data);
      showRoundEndOverlay(d);
      addActivity(`\ud83c\udfc6 Round ${d.round} ended! Winner: ${esc(d.winnerDisplayName || d.winner || 'Nobody')}`, 'dramatic');
    } catch {}
  });

  es.onerror = () => {
    es.close();
    online = false;
    updateBar();
    setTimeout(connect, 3000);
  };
}

// ========== KEYBOARD CONTROLS ==========
document.addEventListener('keydown', (e) => {
  const step = TILE * 2;
  switch (e.key) {
    case 'ArrowUp':
    case 'w':
      cameraY -= step;
      autoFollow = false;
      document.getElementById('follow-toggle').checked = false;
      clampCamera();
      e.preventDefault();
      break;
    case 'ArrowDown':
    case 's':
      cameraY += step;
      autoFollow = false;
      document.getElementById('follow-toggle').checked = false;
      clampCamera();
      e.preventDefault();
      break;
    case 'ArrowLeft':
    case 'a':
      cameraX -= step;
      autoFollow = false;
      document.getElementById('follow-toggle').checked = false;
      clampCamera();
      e.preventDefault();
      break;
    case 'ArrowRight':
    case 'd':
      cameraX += step;
      autoFollow = false;
      document.getElementById('follow-toggle').checked = false;
      clampCamera();
      e.preventDefault();
      break;
    case 'Tab': {
      e.preventDefault();
      const ids = Object.keys(bots);
      if (ids.length === 0) break;
      const idx = ids.indexOf(selectedBot);
      const next = (idx + 1) % ids.length;
      selectedBot = ids[next];
      autoFollow = document.getElementById('follow-toggle').checked;
      renderBotInfo();
      renderBotList();
      break;
    }
    case 'f':
      autoFollow = !autoFollow;
      document.getElementById('follow-toggle').checked = autoFollow;
      break;
  }
});

// ========== INIT ==========
connect();
setInterval(updateBar, 1000);
})();
</script>

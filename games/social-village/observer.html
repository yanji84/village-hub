<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#111}
#game{display:flex;flex-direction:row;height:100vh}
#left{flex:1;display:flex;flex-direction:column;min-width:0}
#map-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#1a2a1a}
canvas{display:block}
.bubble{position:absolute;background:#fff;color:#222;font:12px/1.3 -apple-system,'Segoe UI',sans-serif;padding:5px 8px;border-radius:8px;max-width:220px;pointer-events:none;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.4);transform:translate(-12px,-100%);transition:opacity .8s;word-wrap:break-word}
.bubble::after{content:'';position:absolute;bottom:-5px;left:12px;border:5px solid transparent;border-top-color:#fff;border-bottom:0}
.bubble .bn{font-weight:700;font-size:10px;display:block;margin-bottom:1px}
.bubble.whisper{background:#e8e0f8}
.bubble.whisper::after{border-top-color:#e8e0f8}
.bubble.fade{opacity:0}
.bubble.mini{font-size:10px;padding:3px 6px;max-width:160px;opacity:.7;background:#e8e8e8}
.bubble.mini::after{border-top-color:#e8e8e8}
.bubble.mini .bn{font-size:8px}
.floating-text{position:absolute;color:#5a7a5a;font:italic 10px/1.2 -apple-system,'Segoe UI',sans-serif;pointer-events:none;z-index:8;opacity:.8;transition:opacity 1s;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.floating-text.fade{opacity:0}
#bar{height:26px;background:#0d0d0d;border-top:1px solid #1a1a1a;display:flex;align-items:center;padding:0 14px;font:11px/1 -apple-system,'Segoe UI',sans-serif;color:#444;gap:10px;flex-shrink:0}
#bar .lbl{color:#4a9;font-weight:700}
.st-run{color:#4a9}.st-pause{color:#a84}.st-off{color:#a44}
#follow-sel{background:#1a1a1a;color:#888;border:1px solid #2a2a2a;border-radius:3px;font:10px/1 -apple-system,'Segoe UI',sans-serif;padding:2px 4px;margin-left:auto;cursor:pointer;max-width:120px}
#follow-sel:focus{outline:none;border-color:#4a9}
#follow-sel.active{color:#4a9;border-color:#4a9}
#chat{width:280px;flex-shrink:0;display:flex;flex-direction:column;background:#0a0a0a;border-left:1px solid #1a1a1a}
#chat-header{flex-shrink:0;border-bottom:1px solid #1a1a1a}
#rels{display:none!important}
.rel{transition:background .6s}
.rel.highlight{background:rgba(255,215,0,.15)}
.rel-acq{color:#777}.rel-friend{color:#4a9}.rel-good{color:#5cb85c}.rel-best{color:#daa520}
#moods{display:none!important}
.mood-pos{color:#6a9a6a}.mood-neg{color:#888}
#log{flex:1;overflow-y:auto;padding:6px 10px;min-height:0}
#load-more{text-align:center;padding:4px;font:10px -apple-system,sans-serif;color:#333;display:none}
#load-more.show{display:block}
.le{font:11px/1.6 -apple-system,'Segoe UI',sans-serif;color:#555}
.le .t{color:#333}.le .b{color:#4a9;font-weight:600}.le .s{color:#999}
.le .w{color:#7af;font-style:italic}.le .m{color:#da5}
.le .j{color:#4a9}.le .l{color:#e55}.le .o{color:#555;font-style:italic}.le .k{color:#333}
.le .ambient{color:#5a7a5a;font-style:italic;font-size:10px}
.le .idle{color:#6a6a7a;font-style:italic}
.le .auto-move{color:#8a7a5a;font-style:italic}
.tick-sep{border:0;border-top:1px solid #1a1a1a;margin:4px 0}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0a0a0a}
::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:2px}
@media(max-width:700px){
  #game{flex-direction:column}
  #left{flex:1}
  #chat{width:100%;height:45vh;border-left:0;border-top:1px solid #1a1a1a}
}
</style>
</head>
<body>
<div id="game">
  <div id="left">
    <div id="map-wrap"></div>
    <div id="bar">
      <span class="lbl">Village</span>
      <span id="tick">&mdash;</span>
      <span id="st" class="st-off">Connecting</span>
      <select id="follow-sel"><option value="">Follow...</option></select>
    </div>
  </div>
  <div id="chat">
    <div id="chat-header">
      <div id="rels"></div>
      <div id="moods"></div>
    </div>
    <div id="load-more">Loading older...</div>
    <div id="log"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
<script>
(async () => {

// ========== CONSTANTS ==========
const CW = 960, CH = 540;
const SPRITE_SIZE = 32;
const BCOLORS = ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#1abc9c','#e67e22','#e91e63','#00bcd4','#8bc34a','#ff5722','#607d8b'];
let ci = 0;

// ========== WORLD LAYOUT ==========
const BASE_LOCATIONS = {
  'central-square':   { n:'Central Square',  x:900,  y:650,  w:300, h:200, c:'#9a8a7a', r:'#7a6a5a', t:'plaza' },
  'coffee-hub':       { n:'Coffee Hub',       x:200,  y:150,  w:220, h:160, c:'#8a5a3a', r:'#6a4020', t:'bld' },
  'knowledge-corner': { n:'Knowledge Corner', x:1500, y:100,  w:260, h:180, c:'#5a6a8a', r:'#3a4a6a', t:'bld' },
  'chill-zone':       { n:'Chill Zone',       x:100,  y:800,  w:260, h:200, c:'#4a8a4a', r:'#2a6a2a', t:'park' },
  'workshop':         { n:'Workshop',         x:850,  y:1050, w:250, h:170, c:'#7a6a4a', r:'#5a4a2a', t:'bld' },
  'sunset-lounge':    { n:'Sunset Lounge',    x:1550, y:750,  w:250, h:190, c:'#8a4a6a', r:'#6a3050', t:'bld' },
};
const BASE_EDGES = [
  ['central-square','coffee-hub'],
  ['central-square','knowledge-corner'],
  ['central-square','chill-zone'],
  ['central-square','workshop'],
  ['central-square','sunset-lounge'],
  ['coffee-hub','chill-zone'],
  ['knowledge-corner','sunset-lounge'],
];

let LOCS = {};
let LOC_IDS = [];
let LNAMES = {};
let edges = [...BASE_EDGES];
let worldW = 2000, worldH = 1500;

function initLocations() {
  LOCS = {};
  for (const [id, L] of Object.entries(BASE_LOCATIONS)) {
    LOCS[id] = { ...L, fixed: true };
  }
  LOC_IDS = Object.keys(LOCS);
  LNAMES = {};
  LOC_IDS.forEach(k => LNAMES[k] = LOCS[k].n);
}
initLocations();

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return h;
}

function addDynamicLocation(slug, name, connectedTo) {
  if (LOCS[slug]) return;
  const parentId = connectedTo && LOCS[connectedTo] ? connectedTo : 'central-square';
  const parent = LOCS[parentId];
  const angle = (hashStr(slug) % 360) * Math.PI / 180;
  const dist = 350;
  const nx = parent.x + parent.w / 2 + Math.cos(angle) * dist - 110;
  const ny = parent.y + parent.h / 2 + Math.sin(angle) * dist - 75;
  LOCS[slug] = { n: name, x: nx, y: ny, w: 220, h: 150, c: '#6a7a6a', r: '#4a5a4a', t: 'bld', dynamic: true, connectedTo: parentId };
  edges.push([parentId, slug]);
  LOC_IDS = Object.keys(LOCS);
  LNAMES[slug] = name;
  if (!locBots[slug]) locBots[slug] = [];
  computeLayout();
  rebuildWorld();
}

// ========== FORCE-DIRECTED LAYOUT ==========
function computeLayout() {
  const nodes = Object.entries(LOCS);
  for (let iter = 0; iter < 80; iter++) {
    for (let i = 0; i < nodes.length; i++) {
      const [idA, A] = nodes[i];
      if (A.fixed) continue;
      let fx = 0, fy = 0;
      const ax = A.x + A.w / 2, ay = A.y + A.h / 2;
      // Repulsion from all other nodes
      for (let j = 0; j < nodes.length; j++) {
        if (i === j) continue;
        const [, B] = nodes[j];
        const bx = B.x + B.w / 2, by = B.y + B.h / 2;
        const dx = ax - bx, dy = ay - by;
        const d2 = dx * dx + dy * dy + 1;
        const d = Math.sqrt(d2);
        const force = 50000 / d2;
        fx += (dx / d) * force;
        fy += (dy / d) * force;
      }
      // Attraction along edges
      for (const [eA, eB] of edges) {
        let other = null;
        if (eA === idA) other = LOCS[eB];
        else if (eB === idA) other = LOCS[eA];
        if (!other) continue;
        const bx = other.x + other.w / 2, by = other.y + other.h / 2;
        const dx = bx - ax, dy = by - ay;
        const d = Math.sqrt(dx * dx + dy * dy) + 1;
        const force = (d - 350) * 0.05;
        fx += (dx / d) * force;
        fy += (dy / d) * force;
      }
      A.x += fx * 0.1;
      A.y += fy * 0.1;
    }
  }
  updateWorldBounds();
}

function updateWorldBounds() {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const L of Object.values(LOCS)) {
    minX = Math.min(minX, L.x);
    minY = Math.min(minY, L.y);
    maxX = Math.max(maxX, L.x + L.w);
    maxY = Math.max(maxY, L.y + L.h);
  }
  // Ensure all coords have positive margin
  if (minX < 200) {
    const shift = 200 - minX;
    for (const L of Object.values(LOCS)) L.x += shift;
  }
  if (minY < 200) {
    const shift = 200 - minY;
    for (const L of Object.values(LOCS)) L.y += shift;
  }
  maxX = -Infinity; maxY = -Infinity;
  for (const L of Object.values(LOCS)) {
    maxX = Math.max(maxX, L.x + L.w);
    maxY = Math.max(maxY, L.y + L.h);
  }
  worldW = Math.max(2000, maxX + 400);
  worldH = Math.max(1500, maxY + 400);
}
updateWorldBounds();

// ========== PIXI SETUP ==========
if (PIXI.TextureSource && PIXI.TextureSource.defaultOptions) {
  PIXI.TextureSource.defaultOptions.scaleMode = 'nearest';
}

const app = new PIXI.Application();
await app.init({
  width: CW,
  height: CH,
  background: 0x1a2a1a,
  antialias: true,
  resolution: 1,
  autoDensity: false,
});
const cv = app.canvas;
document.getElementById('map-wrap').appendChild(cv);

// Container hierarchy
const worldContainer = new PIXI.Container();
const terrainLayer = new PIXI.Container();
const pathGraphics = new PIXI.Graphics();
const locationLayer = new PIXI.Container();
const effectsLayer = new PIXI.Container();
const botLayer = new PIXI.Container();
botLayer.sortableChildren = true;
const overlayContainer = new PIXI.Container();
const dayNightOverlay = new PIXI.Graphics();

worldContainer.addChild(terrainLayer, pathGraphics, locationLayer, effectsLayer, botLayer);
overlayContainer.addChild(dayNightOverlay);
app.stage.addChild(worldContainer, overlayContainer);

// Responsive resize
function resize() {
  const wrap = document.getElementById('map-wrap');
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  if (ww <= 0 || wh <= 0) return;
  const s = Math.min(ww / CW, wh / CH);
  cv.style.width = Math.floor(CW * s) + 'px';
  cv.style.height = Math.floor(CH * s) + 'px';
}
addEventListener('resize', resize);
resize();

// ========== CAMERA ==========
let cameraX = 0, cameraY = 0;
let cameraTargetX = 0, cameraTargetY = 0;
let zoom = 1.0, targetZoom = 1.0;
let dragging = false, dragStartX = 0, dragStartY = 0, dragCamStartX = 0, dragCamStartY = 0;
let autoFollow = false, lastSpeaker = null, followTarget = '';

function clampCamera() {
  const viewW = CW / zoom;
  const viewH = CH / zoom;
  const maxX = Math.max(0, worldW - viewW);
  const maxY = Math.max(0, worldH - viewH);
  cameraX = Math.max(0, Math.min(cameraX, maxX));
  cameraY = Math.max(0, Math.min(cameraY, maxY));
}

function centerCameraOn(wx, wy) {
  cameraTargetX = wx - CW / (2 * zoom);
  cameraTargetY = wy - CH / (2 * zoom);
  cameraX = cameraTargetX;
  cameraY = cameraTargetY;
  clampCamera();
  cameraTargetX = cameraX;
  cameraTargetY = cameraY;
}

// Center on central-square initially
centerCameraOn(
  LOCS['central-square'].x + LOCS['central-square'].w / 2,
  LOCS['central-square'].y + LOCS['central-square'].h / 2
);

// Mouse drag
cv.addEventListener('mousedown', (e) => {
  if (e.button === 0) {
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragCamStartX = cameraX;
    dragCamStartY = cameraY;
  }
});

cv.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const rect = cv.getBoundingClientRect();
  const scaleX = CW / rect.width / zoom;
  const scaleY = CH / rect.height / zoom;
  const dx = (e.clientX - dragStartX) * scaleX;
  const dy = (e.clientY - dragStartY) * scaleY;
  cameraX = dragCamStartX - dx;
  cameraY = dragCamStartY - dy;
  cameraTargetX = cameraX;
  cameraTargetY = cameraY;
  clampCamera();
  if (Math.abs(e.clientX - dragStartX) > 4 || Math.abs(e.clientY - dragStartY) > 4) {
    autoFollow = false;
    setFollowTarget('');
  }
});

cv.addEventListener('mouseup', (e) => {
  if (!dragging) return;
  const dx = Math.abs(e.clientX - dragStartX);
  const dy = Math.abs(e.clientY - dragStartY);
  if (dx < 4 && dy < 4) {
    // Click — jump to clicked location
    const rect = cv.getBoundingClientRect();
    const sx = CW / rect.width, sy = CH / rect.height;
    const wx = (e.clientX - rect.left) * sx / zoom + cameraX;
    const wy = (e.clientY - rect.top) * sy / zoom + cameraY;
    for (const L of Object.values(LOCS)) {
      if (wx >= L.x && wx <= L.x + L.w && wy >= L.y && wy <= L.y + L.h) {
        cameraTargetX = L.x + L.w / 2 - CW / (2 * zoom);
        cameraTargetY = L.y + L.h / 2 - CH / (2 * zoom);
        break;
      }
    }
  }
  dragging = false;
});

cv.addEventListener('mouseleave', () => { dragging = false; });

cv.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = -Math.sign(e.deltaY) * 0.15;
  targetZoom = Math.max(0.4, Math.min(3.0, targetZoom + delta));
}, { passive: false });

// Touch: single-finger pan, two-finger pinch-to-zoom
let touchDragging = false, touchStartX = 0, touchStartY = 0, touchCamStartX = 0, touchCamStartY = 0;
let pinching = false, pinchStartDist = 0, pinchStartZoom = 1;

function touchDist(t) {
  const dx = t[0].clientX - t[1].clientX;
  const dy = t[0].clientY - t[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

cv.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (e.touches.length === 2) {
    pinching = true;
    touchDragging = false;
    pinchStartDist = touchDist(e.touches);
    pinchStartZoom = targetZoom;
  } else if (e.touches.length === 1) {
    touchDragging = true;
    pinching = false;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchCamStartX = cameraX;
    touchCamStartY = cameraY;
  }
}, { passive: false });

cv.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (pinching && e.touches.length >= 2) {
    const dist = touchDist(e.touches);
    const scale = dist / pinchStartDist;
    targetZoom = Math.max(0.4, Math.min(3.0, pinchStartZoom * scale));
  } else if (touchDragging && e.touches.length === 1) {
    const rect = cv.getBoundingClientRect();
    const scaleX = CW / rect.width / zoom;
    const scaleY = CH / rect.height / zoom;
    const dx = (e.touches[0].clientX - touchStartX) * scaleX;
    const dy = (e.touches[0].clientY - touchStartY) * scaleY;
    cameraX = touchCamStartX - dx;
    cameraY = touchCamStartY - dy;
    cameraTargetX = cameraX;
    cameraTargetY = cameraY;
    clampCamera();
    autoFollow = false;
    setFollowTarget('');
  }
}, { passive: false });

cv.addEventListener('touchend', (e) => {
  if (e.touches.length < 2) pinching = false;
  if (e.touches.length === 0) touchDragging = false;
});

// Keyboard shortcuts
addEventListener('keydown', (e) => {
  const speed = 40 / zoom;
  switch (e.key) {
    case 'ArrowLeft': cameraTargetX -= speed; break;
    case 'ArrowRight': cameraTargetX += speed; break;
    case 'ArrowUp': cameraTargetY -= speed; break;
    case 'ArrowDown': cameraTargetY += speed; break;
    case '+': case '=': targetZoom = Math.min(3.0, targetZoom + 0.15); break;
    case '-': case '_': targetZoom = Math.max(0.4, targetZoom - 0.15); break;
    default: return;
  }
  e.preventDefault();
  autoFollow = false;
  setFollowTarget('');
});

function updateCamera() {
  zoom += (targetZoom - zoom) * 0.12;
  const ft = followTarget || (autoFollow ? lastSpeaker : null);
  if (ft && sprites[ft]) {
    const s = sprites[ft];
    cameraTargetX = s.x - CW / (2 * zoom);
    cameraTargetY = s.y - CH / (2 * zoom);
  }
  cameraX += (cameraTargetX - cameraX) * 0.08;
  cameraY += (cameraTargetY - cameraY) * 0.08;
  clampCamera();
  worldContainer.scale.set(zoom);
  worldContainer.position.set(-cameraX * zoom, -cameraY * zoom);
}

// ========== FOLLOW BOT ==========
function setFollowTarget(name) {
  followTarget = name;
  const sel = document.getElementById('follow-sel');
  sel.value = name;
  sel.className = name ? 'active' : '';
}

function updateFollowSelect() {
  const sel = document.getElementById('follow-sel');
  const prev = sel.value;
  const names = Object.keys(sprites).sort();
  sel.innerHTML = '<option value="">Follow...</option>' +
    names.map(n => `<option value="${n}">${sprites[n].dn}</option>`).join('');
  if (prev && sprites[prev]) sel.value = prev;
  else if (followTarget && !sprites[followTarget]) setFollowTarget('');
}

document.getElementById('follow-sel').addEventListener('change', (e) => {
  const v = e.target.value;
  followTarget = v;
  e.target.className = v ? 'active' : '';
  if (v && sprites[v]) {
    autoFollow = false;
    cameraTargetX = sprites[v].x - CW / (2 * zoom);
    cameraTargetY = sprites[v].y - CH / (2 * zoom);
  }
});

// ========== SEEDED PRNG ==========
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ========== TERRAIN RENDERING ==========
let terrainSprite = null;

function prerenderTerrain() {
  const tc = document.createElement('canvas');
  tc.width = worldW; tc.height = worldH;
  const c = tc.getContext('2d');
  const rng = mulberry32(42);

  // Grass base
  c.fillStyle = '#3b7d34';
  c.fillRect(0, 0, worldW, worldH);

  // Grass variation
  for (let x = 0; x < worldW; x += 6) {
    for (let y = 0; y < worldH; y += 6) {
      const v = rng();
      if (v < 0.3) { c.fillStyle = '#4a8b3f'; c.fillRect(x, y, 4, 4); }
      else if (v < 0.4) { c.fillStyle = '#55a048'; c.fillRect(x, y, 2, 4); }
      if (rng() < 0.005) {
        c.fillStyle = ['#ff6','#f8f','#6ef','#fa5'][Math.floor(rng() * 4)];
        c.fillRect(x, y, 2, 2);
      }
    }
  }

  // Check if near any location
  function isNearLoc(px, py, margin) {
    for (const L of Object.values(LOCS)) {
      if (px > L.x - margin && px < L.x + L.w + margin &&
          py > L.y - margin && py < L.y + L.h + margin) return true;
    }
    return false;
  }

  // Trees (¾ view with side shadow)
  function drawTreeAt(x, y) {
    const TD = 6;
    // Trunk (front face)
    c.fillStyle = '#5a3a1a'; c.fillRect(x + 6, y + 16, 6, 12);
    // Trunk (side face, darker)
    c.fillStyle = '#4a2a10';
    c.beginPath();
    c.moveTo(x + 12, y + 16); c.lineTo(x + 12 + TD, y + 16 - TD * 0.6);
    c.lineTo(x + 12 + TD, y + 28 - TD * 0.6); c.lineTo(x + 12, y + 28);
    c.fill();
    // Foliage (front, layered)
    c.fillStyle = '#2a7a2a'; c.fillRect(x, y + 6, 18, 14);
    c.fillStyle = '#3a9a3a'; c.fillRect(x + 2, y, 14, 12);
    // Foliage (side shadow)
    c.fillStyle = '#1a6a1a';
    c.beginPath();
    c.moveTo(x + 18, y + 6); c.lineTo(x + 18 + TD, y + 6 - TD * 0.6);
    c.lineTo(x + 18 + TD, y + 20 - TD * 0.6); c.lineTo(x + 18, y + 20);
    c.fill();
    // Highlight
    c.fillStyle = '#4aaa4a'; c.fillRect(x + 5, y + 3, 4, 4);
  }

  for (let i = 0; i < 60; i++) {
    const tx = rng() * (worldW - 40);
    const ty = rng() * (worldH - 40);
    if (!isNearLoc(tx, ty, 80)) drawTreeAt(tx, ty);
  }

  // Rocks
  for (let i = 0; i < 30; i++) {
    const rx = rng() * (worldW - 20);
    const ry = rng() * (worldH - 20);
    if (!isNearLoc(rx, ry, 60)) {
      c.fillStyle = '#7a7a6a'; c.fillRect(rx, ry, 10, 6);
      c.fillStyle = '#8a8a7a'; c.fillRect(rx + 1, ry, 8, 4);
      c.fillStyle = '#9a9a8a'; c.fillRect(rx + 2, ry + 1, 4, 2);
    }
  }

  const tex = PIXI.Texture.from(tc);
  if (terrainSprite) { terrainLayer.removeChild(terrainSprite); terrainSprite.destroy(); }
  terrainSprite = new PIXI.Sprite(tex);
  terrainLayer.addChild(terrainSprite);
}

// ========== PATH RENDERING ==========
function computeBezier(ax, ay, bx, by) {
  // Perpendicular offset for the curve bulge — deterministic from endpoints
  const mx = (ax + bx) / 2, my = (ay + by) / 2;
  const dx = bx - ax, dy = by - ay;
  const len = Math.sqrt(dx * dx + dy * dy);
  // Perpendicular direction (normalized)
  const nx = -dy / len, ny = dx / len;
  // Offset magnitude: 15-25% of length, sign from coordinate hash
  const sign = ((Math.round(ax * 7 + by * 13) % 2) === 0) ? 1 : -1;
  const bulge = len * (0.15 + (Math.abs(Math.round(ax + by)) % 10) * 0.01) * sign;
  const cx = mx + nx * bulge;
  const cy = my + ny * bulge;
  return { cx, cy };
}

function drawPaths() {
  pathGraphics.clear();
  for (const [idA, idB] of edges) {
    const A = LOCS[idA], B = LOCS[idB];
    if (!A || !B) continue;
    const ax = A.x + A.w / 2, ay = A.y + A.h / 2;
    const bx = B.x + B.w / 2, by = B.y + B.h / 2;
    const { cx, cy } = computeBezier(ax, ay, bx, by);

    // Outer stone border
    pathGraphics.moveTo(ax, ay);
    pathGraphics.quadraticCurveTo(cx, cy, bx, by);
    pathGraphics.stroke({ color: 0x6b5a40, width: 16, alpha: 0.7, cap: 'round', join: 'round' });

    // Main stone path
    pathGraphics.moveTo(ax, ay);
    pathGraphics.quadraticCurveTo(cx, cy, bx, by);
    pathGraphics.stroke({ color: 0x9a8468, width: 12, alpha: 0.9, cap: 'round', join: 'round' });

    // Inner highlight
    pathGraphics.moveTo(ax, ay);
    pathGraphics.quadraticCurveTo(cx, cy, bx, by);
    pathGraphics.stroke({ color: 0xb0a080, width: 4, alpha: 0.3, cap: 'round', join: 'round' });

    // Dashed stone pattern along the curve
    const steps = Math.max(8, Math.floor(Math.sqrt((bx - ax) ** 2 + (by - ay) ** 2) / 28));
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      // Quadratic bezier point: (1-t)^2*P0 + 2(1-t)t*C + t^2*P1
      const u = 1 - t;
      const px = u * u * ax + 2 * u * t * cx + t * t * bx;
      const py = u * u * ay + 2 * u * t * cy + t * t * by;
      // Tangent for perpendicular stone lines
      const tx = 2 * u * (cx - ax) + 2 * t * (bx - cx);
      const ty = 2 * u * (cy - ay) + 2 * t * (by - cy);
      const tlen = Math.sqrt(tx * tx + ty * ty) || 1;
      const pnx = -ty / tlen, pny = tx / tlen;
      // Short perpendicular dash
      pathGraphics.moveTo(px + pnx * 4, py + pny * 4);
      pathGraphics.lineTo(px - pnx * 4, py - pny * 4);
      pathGraphics.stroke({ color: 0x7d6b50, width: 1.5, alpha: 0.4 });
    }
  }
}

// ========== LOCATION RENDERING ==========
let locationContainers = {};

function hexToInt(hex) { return parseInt(hex.replace('#', ''), 16); }

function hexToRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return { r: (n >> 16) & 0xff, g: (n >> 8) & 0xff, b: n & 0xff };
}

function darken(hex, factor) {
  const r = (hex >> 16) & 0xff;
  const g = (hex >> 8) & 0xff;
  const b = hex & 0xff;
  return ((r * factor | 0) << 16) | ((g * factor | 0) << 8) | (b * factor | 0);
}

function drawLocationGraphics(id, L) {
  const container = new PIXI.Container();
  container.position.set(L.x, L.y);
  const g = new PIXI.Graphics();
  const { w, h, t } = L;
  const DEPTH = 20;
  const ROOF_OVERHANG = 8;
  const SIDE_SLOPE = 0.6;

  if (t === 'plaza') {
    // ¾ view cobblestone ground plane — front edge + side edge
    // Front face (rectangle)
    g.rect(0, 0, w, h); g.fill(0xbab0a0);
    g.rect(4, 4, w - 8, h - 8); g.fill(0xa09888);
    // Side edge (parallelogram on right)
    g.moveTo(w, 0); g.lineTo(w + DEPTH, -DEPTH * SIDE_SLOPE);
    g.lineTo(w + DEPTH, h - DEPTH * SIDE_SLOPE); g.lineTo(w, h); g.closePath();
    g.fill(0x9a9080);
    // Top edge (parallelogram on top)
    g.moveTo(0, 0); g.lineTo(DEPTH, -DEPTH * SIDE_SLOPE);
    g.lineTo(w + DEPTH, -DEPTH * SIDE_SLOPE); g.lineTo(w, 0); g.closePath();
    g.fill(0xa8a090);
    // Stone border on front face
    for (let i = 0; i < w; i += 12) {
      g.rect(i, 0, 6, 2); g.fill(0x8a8070);
      g.rect(i, h - 2, 6, 2); g.fill(0x8a8070);
    }
    // 3D Fountain — front face
    const fx = w / 2 - 24, fy = h / 2 - 20;
    g.rect(fx, fy, 48, 40); g.fill(0x778888);
    g.rect(fx + 4, fy + 2, 40, 2); g.fill(0x889999);
    g.rect(fx + 6, fy + 6, 36, 28); g.fill(0x4488cc);
    g.rect(fx + 10, fy + 10, 28, 20); g.fill(0x55aadd);
    // Fountain side face
    g.moveTo(fx + 48, fy); g.lineTo(fx + 48 + 8, fy - 8 * SIDE_SLOPE);
    g.lineTo(fx + 48 + 8, fy + 40 - 8 * SIDE_SLOPE); g.lineTo(fx + 48, fy + 40); g.closePath();
    g.fill(0x667777);
    // Fountain pillar
    g.rect(fx + 20, fy + 8, 8, 24); g.fill(0x889999);
    g.rect(fx + 16, fy + 6, 16, 4); g.fill(0x889999);
    // 3D Benches (small boxes)
    const benchH = 6, benchD = 6;
    // Left bench — front
    g.rect(20, h - 30, 30, benchH); g.fill(0x7a5030);
    // Left bench — side
    g.moveTo(50, h - 30); g.lineTo(50 + benchD, h - 30 - benchD * SIDE_SLOPE);
    g.lineTo(50 + benchD, h - 30 + benchH - benchD * SIDE_SLOPE); g.lineTo(50, h - 30 + benchH); g.closePath();
    g.fill(0x5a3820);
    // Left bench — top
    g.moveTo(20, h - 30); g.lineTo(20 + benchD, h - 30 - benchD * SIDE_SLOPE);
    g.lineTo(50 + benchD, h - 30 - benchD * SIDE_SLOPE); g.lineTo(50, h - 30); g.closePath();
    g.fill(0x8a6040);
    // Right bench — front
    g.rect(w - 50, h - 30, 30, benchH); g.fill(0x7a5030);
    // Right bench — side
    g.moveTo(w - 20, h - 30); g.lineTo(w - 20 + benchD, h - 30 - benchD * SIDE_SLOPE);
    g.lineTo(w - 20 + benchD, h - 30 + benchH - benchD * SIDE_SLOPE); g.lineTo(w - 20, h - 30 + benchH); g.closePath();
    g.fill(0x5a3820);
    // Right bench — top
    g.moveTo(w - 50, h - 30); g.lineTo(w - 50 + benchD, h - 30 - benchD * SIDE_SLOPE);
    g.lineTo(w - 20 + benchD, h - 30 - benchD * SIDE_SLOPE); g.lineTo(w - 20, h - 30); g.closePath();
    g.fill(0x8a6040);
  } else if (t === 'park') {
    // ¾ view green ground plane
    // Front face
    g.rect(0, 0, w, h); g.fill(0x4a9a50);
    g.rect(4, 4, w - 8, h - 8); g.fill(0x3a8a40);
    // Side edge
    g.moveTo(w, 0); g.lineTo(w + DEPTH, -DEPTH * SIDE_SLOPE);
    g.lineTo(w + DEPTH, h - DEPTH * SIDE_SLOPE); g.lineTo(w, h); g.closePath();
    g.fill(0x2a7a30);
    // Top edge
    g.moveTo(0, 0); g.lineTo(DEPTH, -DEPTH * SIDE_SLOPE);
    g.lineTo(w + DEPTH, -DEPTH * SIDE_SLOPE); g.lineTo(w, 0); g.closePath();
    g.fill(0x3a9040);
    // ¾ view fence posts (tiny 3D rectangles)
    for (let i = 0; i < w; i += 16) {
      g.rect(i, 0, 2, 6); g.fill(0x8a6030);
      g.rect(i, h - 6, 2, 6); g.fill(0x8a6030);
    }
    g.rect(0, 2, w, 2); g.fill(0x8a6030);
    g.rect(0, h - 4, w, 2); g.fill(0x8a6030);
    // ¾ view pond with depth edge
    const px = w / 2 + 20, py = h / 2 - 10, pw = 50, ph = 35;
    g.rect(px, py, pw, ph); g.fill(0x3a6a8a);
    g.rect(px + 4, py + 4, pw - 8, ph - 8); g.fill(0x4a8aaa);
    // Pond side edge
    g.moveTo(px + pw, py); g.lineTo(px + pw + 6, py - 6 * SIDE_SLOPE);
    g.lineTo(px + pw + 6, py + ph - 6 * SIDE_SLOPE); g.lineTo(px + pw, py + ph); g.closePath();
    g.fill(0x2a5a7a);
    // ¾ view trees
    const treePosns = [[10, 10], [w - 30, 8], [12, h - 40], [w - 28, h - 38]];
    const treeD = 6;
    for (const [tx, ty] of treePosns) {
      // Trunk front
      g.rect(tx + 6, ty + 16, 6, 12); g.fill(0x5a3a1a);
      // Trunk side
      g.moveTo(tx + 12, ty + 16); g.lineTo(tx + 12 + treeD, ty + 16 - treeD * SIDE_SLOPE);
      g.lineTo(tx + 12 + treeD, ty + 28 - treeD * SIDE_SLOPE); g.lineTo(tx + 12, ty + 28); g.closePath();
      g.fill(0x4a2a10);
      // Foliage front (layered)
      g.rect(tx, ty + 6, 18, 14); g.fill(0x2a7a2a);
      g.rect(tx + 2, ty, 14, 12); g.fill(0x3a9a3a);
      // Foliage side shadow
      g.moveTo(tx + 18, ty + 6); g.lineTo(tx + 18 + treeD, ty + 6 - treeD * SIDE_SLOPE);
      g.lineTo(tx + 18 + treeD, ty + 20 - treeD * SIDE_SLOPE); g.lineTo(tx + 18, ty + 20); g.closePath();
      g.fill(0x1a6a1a);
      // Highlight
      g.rect(tx + 5, ty + 3, 4, 4); g.fill(0x4aaa4a);
    }
    // Bench
    g.rect(w / 2 - 20, h / 2 - 30, 30, 6); g.fill(0x7a5030);
    g.moveTo(w / 2 + 10, h / 2 - 30); g.lineTo(w / 2 + 10 + 5, h / 2 - 30 - 5 * SIDE_SLOPE);
    g.lineTo(w / 2 + 10 + 5, h / 2 - 24 - 5 * SIDE_SLOPE); g.lineTo(w / 2 + 10, h / 2 - 24); g.closePath();
    g.fill(0x5a3820);
  } else {
    // ¾ view regular building
    const col = hexToInt(L.c);
    const roof = hexToInt(L.r);
    const colSide = darken(col, 0.85);
    const roofSide = darken(roof, 0.80);
    const ROOF_H = Math.min(50, Math.max(30, h * 0.28 | 0));
    const wallTop = ROOF_H;
    const wallH = h - ROOF_H;

    // Shadow on ground
    g.moveTo(8, h + 4); g.lineTo(8 + DEPTH, h + 4 - DEPTH * SIDE_SLOPE);
    g.lineTo(w + 8 + DEPTH, h + 4 - DEPTH * SIDE_SLOPE); g.lineTo(w + 8, h + 4);
    g.closePath(); g.fill({ color: 0x000000, alpha: 0.12 });

    // Front wall
    g.rect(0, wallTop, w, wallH); g.fill(col);
    // Front wall highlight strip
    g.rect(2, wallTop + 2, w - 4, 4); g.fill({ color: 0xffffff, alpha: 0.06 });

    // Side wall (parallelogram)
    g.moveTo(w, wallTop); g.lineTo(w + DEPTH, wallTop - DEPTH * SIDE_SLOPE);
    g.lineTo(w + DEPTH, h - DEPTH * SIDE_SLOPE); g.lineTo(w, h); g.closePath();
    g.fill(colSide);

    // Roof — front face (triangle/trapezoid)
    g.moveTo(-ROOF_OVERHANG, wallTop); g.lineTo(w / 2, 0);
    g.lineTo(w + ROOF_OVERHANG, wallTop); g.closePath();
    g.fill(roof);
    // Roof highlight
    g.moveTo(w / 2 - 10, 8); g.lineTo(w / 2, 4);
    g.lineTo(w / 2 + 10, 8); g.closePath();
    g.fill({ color: 0xffffff, alpha: 0.08 });

    // Roof — side face
    g.moveTo(w + ROOF_OVERHANG, wallTop);
    g.lineTo(w + ROOF_OVERHANG + DEPTH, wallTop - DEPTH * SIDE_SLOPE);
    g.lineTo(w / 2 + DEPTH, -DEPTH * SIDE_SLOPE);
    g.lineTo(w / 2, 0); g.closePath();
    g.fill(roofSide);

    // Roof eave line
    g.moveTo(-ROOF_OVERHANG, wallTop); g.lineTo(w + ROOF_OVERHANG, wallTop);
    g.stroke({ color: darken(roof, 0.7), width: 1.5, alpha: 0.5 });

    // Door
    const dw = 16, dh = 28;
    g.rect(w / 2 - dw / 2, h - dh, dw, dh); g.fill(0x3a2a1a);
    g.rect(w / 2 - dw / 2 + 2, h - dh + 2, dw - 4, dh - 2); g.fill(0x4a3a2a);
    g.rect(w / 2 + 3, h - 14, 2, 2); g.fill(0xddaa55);

    // Windows on front wall
    const winY = wallTop + 12;
    g.rect(16, winY, 14, 12); g.fill(0xffffe0);
    g.rect(w - 30, winY, 14, 12); g.fill(0xffffe0);
    // Window cross-bars
    g.rect(23, winY, 1, 12); g.fill(0x5a4a3a);
    g.rect(16, winY + 5, 14, 1); g.fill(0x5a4a3a);
    g.rect(w - 23, winY, 1, 12); g.fill(0x5a4a3a);
    g.rect(w - 30, winY + 5, 14, 1); g.fill(0x5a4a3a);

    // Location-specific details
    if (id === 'coffee-hub') {
      // Chimney on side wall (3D box)
      const cx = w + 6, cy = wallTop - 24;
      // Chimney front
      g.rect(cx, cy, 12, 20); g.fill(0x6a4020);
      // Chimney side
      g.moveTo(cx + 12, cy); g.lineTo(cx + 12 + 6, cy - 6 * SIDE_SLOPE);
      g.lineTo(cx + 12 + 6, cy + 20 - 6 * SIDE_SLOPE); g.lineTo(cx + 12, cy + 20); g.closePath();
      g.fill(0x5a3010);
      // Chimney top
      g.moveTo(cx, cy); g.lineTo(cx + 6, cy - 6 * SIDE_SLOPE);
      g.lineTo(cx + 12 + 6, cy - 6 * SIDE_SLOPE); g.lineTo(cx + 12, cy); g.closePath();
      g.fill(0x7a5030);
      // Signboard on front wall
      g.rect(w / 2 - 18, wallTop + 2, 36, 10); g.fill(0x3a2010);
      g.rect(w / 2 - 16, wallTop + 4, 32, 6); g.fill(0x5a3010);
    } else if (id === 'knowledge-corner') {
      // Bookshelf visible through left window
      g.rect(17, winY + 1, 12, 2); g.fill(0xcc3333);
      g.rect(17, winY + 3, 12, 2); g.fill(0x3333cc);
      g.rect(17, winY + 5, 12, 2); g.fill(0x33cc33);
      g.rect(17, winY + 7, 12, 2); g.fill(0xcccc33);
      // Globe beside front wall
      g.circle(w + 10, h - 16, 6); g.fill(0x6688aa);
      g.rect(w + 8, h - 10, 4, 6); g.fill(0x556666);
    } else if (id === 'workshop') {
      // Anvil beside building (3D box)
      const ax = w + DEPTH + 8, ay = h - 16;
      // Anvil front
      g.rect(ax, ay, 22, 8); g.fill(0x556666);
      g.rect(ax + 4, ay - 8, 14, 8); g.fill(0x667777);
      // Anvil side
      g.moveTo(ax + 22, ay); g.lineTo(ax + 22 + 5, ay - 5 * SIDE_SLOPE);
      g.lineTo(ax + 22 + 5, ay + 8 - 5 * SIDE_SLOPE); g.lineTo(ax + 22, ay + 8); g.closePath();
      g.fill(0x445555);
      // Workbench
      g.rect(ax, ay + 10, 28, 6); g.fill(0x7a5a30);
      // Hammer
      g.rect(ax + 18, ay - 14, 2, 12); g.fill(0x888888);
      g.rect(ax + 14, ay - 14, 10, 3); g.fill(0x999999);
    } else if (id === 'sunset-lounge') {
      // Lanterns flanking door at bottom (3D cylinders approximated as boxes)
      const ly = h - 10;
      // Left lantern
      g.rect(w / 2 - dw / 2 - 10, ly, 4, 8); g.fill(0xffaa88);
      g.circle(w / 2 - dw / 2 - 8, ly, 3); g.fill(0xffcc66);
      // Right lantern
      g.rect(w / 2 + dw / 2 + 6, ly, 4, 8); g.fill(0xffaa88);
      g.circle(w / 2 + dw / 2 + 8, ly, 3); g.fill(0xffcc66);
    } else if (L.dynamic) {
      // Construction flag on roof
      g.rect(w / 2 - 2, -ROOF_H * 0.4, 4, ROOF_H * 0.8); g.fill(0x9a9a66);
      g.moveTo(w / 2 + 2, -ROOF_H * 0.4);
      g.lineTo(w / 2 + 16, -ROOF_H * 0.4 + 4);
      g.lineTo(w / 2 + 2, -ROOF_H * 0.4 + 8);
      g.fill(0xee9955);
    }
  }

  container.addChild(g);

  // Name label
  const textRes = Math.max(2, Math.ceil(window.devicePixelRatio || 1));
  const labelY = (t === 'plaza' || t === 'park') ? -DEPTH * SIDE_SLOPE - 12 : -Math.min(50, Math.max(30, h * 0.28 | 0)) - 12;
  const nameText = new PIXI.Text({
    text: L.n,
    style: {
      fontFamily: '-apple-system, "Segoe UI", sans-serif',
      fontSize: 14,
      fontWeight: 'bold',
      fill: 0xeeeeee,
      stroke: { color: 0x000000, width: 4 },
    },
    resolution: textRes,
  });
  nameText.anchor.set(0.5, 1);
  nameText.position.set(w / 2, labelY);
  container.addChild(nameText);

  // Add to botLayer for depth sorting with characters
  container.zIndex = L.y + L.h;
  botLayer.addChild(container);
  locationContainers[id] = container;
}

function renderAllLocations() {
  for (const c of Object.values(locationContainers)) {
    botLayer.removeChild(c);
    c.destroy({ children: true });
  }
  locationContainers = {};
  for (const [id, L] of Object.entries(LOCS)) {
    drawLocationGraphics(id, L);
  }
}

// ========== 32x32 CHARACTER SPRITES ==========
const ANIM_POSES = ['idle', 'walk', 'talk', 'think', 'sit', 'wave'];
const charTextureCache = {};
let charSheet = null; // loaded from characters.png if available

// Attempt to load character parts sprite sheet
(async () => {
  try {
    const tex = await PIXI.Assets.load('./assets/characters.png');
    charSheet = tex;
    console.log('[observer] Character sprite sheet loaded');
  } catch {
    console.log('[observer] No characters.png found — using fallback drawing');
  }
})();

// Skin tone hex values matching appearance.skinTone index
const SKIN_TONES = ['#fce4c8', '#f0c8a0', '#d8a878', '#c09060', '#8a6a48', '#5a4030'];

// Temp canvas for tinting operations
const _tintCanvas = document.createElement('canvas');
_tintCanvas.width = SPRITE_SIZE; _tintCanvas.height = SPRITE_SIZE;
const _tintCtx = _tintCanvas.getContext('2d');

/**
 * Draw a gray-scale region from charSheet onto ctx, tinted with the given color.
 * Uses multiply composite (same as TILE_ART_SPEC building walls).
 */
function drawTintedPart(ctx, sx, sy, sw, sh, dx, dy, tintColor) {
  _tintCtx.clearRect(0, 0, sw, sh);
  // Draw gray-scale part
  _tintCtx.globalCompositeOperation = 'source-over';
  _tintCtx.drawImage(charSheet.source.resource, sx, sy, sw, sh, 0, 0, sw, sh);
  // Multiply tint
  _tintCtx.globalCompositeOperation = 'multiply';
  _tintCtx.fillStyle = tintColor;
  _tintCtx.fillRect(0, 0, sw, sh);
  // Restore alpha from original
  _tintCtx.globalCompositeOperation = 'destination-in';
  _tintCtx.drawImage(charSheet.source.resource, sx, sy, sw, sh, 0, 0, sw, sh);
  // Composite onto target
  ctx.drawImage(_tintCanvas, 0, 0, sw, sh, dx, dy, sw, sh);
}

/**
 * Draw an untinted region from charSheet onto ctx (for face/eyes).
 */
function drawSheetPart(ctx, sx, sy, sw, sh, dx, dy) {
  ctx.drawImage(charSheet.source.resource, sx, sy, sw, sh, dx, dy, sw, sh);
}

/**
 * Hash an appearance object to a cache key string.
 */
function appearanceKey(app) {
  if (!app) return '__none__';
  return `${app.bodyType}_${app.skinTone}_${app.hairStyle}_${app.hairColor}_${app.eyeStyle}_${app.topStyle}_${app.topColor}_${app.bottomStyle}_${app.bottomColor}_${app.shoeStyle}_${app.shoeColor}_${app.accessory?.style ?? 'n'}_${app.accessory?.color ?? ''}_${app.expression}`;
}

/**
 * Composite a layered character from charSheet parts.
 * Sheet layout: 12 cols (6 poses x 2 frames), rows by part type.
 * Each cell is 32x32.
 */
function compositeCharacter(ctx, appearance, pose, frame) {
  const poseIdx = ANIM_POSES.indexOf(pose);
  if (poseIdx < 0) return;
  const col = poseIdx * 2 + frame; // column in sheet
  const sx = col * 32;
  const skinColor = SKIN_TONES[appearance.skinTone] || SKIN_TONES[1];

  ctx.clearRect(0, 0, 32, 32);

  // Shadow (shared, not from sheet — draw manually)
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(16, 30, 7, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // 1. Body base (tinted with skin tone) — rows 0-2
  const bodyRow = appearance.bodyType;
  drawTintedPart(ctx, sx, bodyRow * 32, 32, 32, 0, 0, skinColor);

  // 2. Outfit bottom (tinted) — rows 14-16
  const bottomRow = 14 + appearance.bottomStyle;
  drawTintedPart(ctx, sx, bottomRow * 32, 32, 32, 0, 0, appearance.bottomColor);

  // 3. Shoes (tinted) — rows 17-19
  const shoeRow = 17 + appearance.shoeStyle;
  drawTintedPart(ctx, sx, shoeRow * 32, 32, 32, 0, 0, appearance.shoeColor);

  // 4. Outfit top (tinted) — rows 9-13
  const topRow = 9 + appearance.topStyle;
  drawTintedPart(ctx, sx, topRow * 32, 32, 32, 0, 0, appearance.topColor);

  // 5. Hair (tinted) — rows 3-8
  const hairRow = 3 + appearance.hairStyle;
  drawTintedPart(ctx, sx, hairRow * 32, 32, 32, 0, 0, appearance.hairColor);

  // 6. Face/eyes (actual colors, not tinted) — row 20
  // Eye style uses cols 0-7 (4 styles x 2 cols each)
  const eyeCol = appearance.eyeStyle * 2 + frame;
  drawSheetPart(ctx, eyeCol * 32, 20 * 32, 32, 32, 0, 0);

  // 7. Accessory (if present, tinted) — row 21
  if (appearance.accessory) {
    const accCol = appearance.accessory.style * 2 + frame;
    drawTintedPart(ctx, accCol * 32, 21 * 32, 32, 32, 0, 0, appearance.accessory.color || appearance.topColor);
  }
}

/**
 * Get or create cached animation textures for an appearance.
 * Falls back to old color-based drawing if charSheet is not loaded.
 */
function getCharAnims(appearance) {
  // Fallback: no sprite sheet or no appearance → use old drawing
  if (!charSheet || !appearance) {
    const color = (appearance && appearance.topColor) || BCOLORS[0];
    if (charTextureCache[color]) return charTextureCache[color];
    const anims = {};
    for (const pose of ANIM_POSES) {
      anims[pose] = [];
      for (let f = 0; f < 2; f++) {
        const c = document.createElement('canvas');
        c.width = SPRITE_SIZE; c.height = SPRITE_SIZE;
        const ctx = c.getContext('2d');
        drawSocialChar(ctx, color, f, pose);
        anims[pose].push(PIXI.Texture.from(c));
      }
    }
    charTextureCache[color] = anims;
    return anims;
  }

  // Layered compositor path
  const key = appearanceKey(appearance);
  if (charTextureCache[key]) return charTextureCache[key];
  const anims = {};
  for (const pose of ANIM_POSES) {
    anims[pose] = [];
    for (let f = 0; f < 2; f++) {
      const c = document.createElement('canvas');
      c.width = SPRITE_SIZE; c.height = SPRITE_SIZE;
      const ctx = c.getContext('2d');
      compositeCharacter(ctx, appearance, pose, f);
      anims[pose].push(PIXI.Texture.from(c));
    }
  }
  charTextureCache[key] = anims;
  return anims;
}

function drawSocialChar(ctx, hexColor, frame, pose) {
  const { r, g, b } = hexToRgb(hexColor);
  const hair = `rgb(${Math.max(0, r - 80)},${Math.max(0, g - 80)},${Math.max(0, b - 80)})`;
  const bodyLight = `rgb(${Math.min(255, r + 40)},${Math.min(255, g + 40)},${Math.min(255, b + 40)})`;
  const armShade = `rgb(${Math.max(0, r - 25)},${Math.max(0, g - 25)},${Math.max(0, b - 25)})`;
  const skin = '#f0c8a0';
  const skinShade = '#d8b090';
  const eye = '#1a1a2e';
  const pants = '#3a3a5c';
  const boot = '#4a3728';
  const mouth = '#c06060';

  ctx.clearRect(0, 0, 32, 32);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(16, 30, 7, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  switch (pose) {
    case 'idle': default: {
      const y = frame === 1 ? -1 : 0;
      drawHead32(ctx, 10, 2 + y, hair, skin, skinShade, eye, false);
      drawBody32(ctx, 9, 14 + y, hexColor, bodyLight);
      drawArm32(ctx, 6, 15 + y, armShade, skin);
      drawArm32(ctx, 22, 15 + y, armShade, skin);
      drawLegs32(ctx, 10, 22 + y, 17, 22 + y, pants, boot);
      break;
    }
    case 'walk': {
      const y = frame === 1 ? -1 : 0;
      const f = frame === 0 ? 2 : -2;
      drawHead32(ctx, 10, 2 + y, hair, skin, skinShade, eye, false);
      drawBody32(ctx, 9, 14 + y, hexColor, bodyLight);
      drawArm32(ctx, 6, 15 + y - f, armShade, skin);
      drawArm32(ctx, 22, 15 + y + f, armShade, skin);
      drawLegs32(ctx, 10 - f, 22 + y, 17 + f, 22 + y, pants, boot);
      break;
    }
    case 'talk': {
      const y = frame === 1 ? -1 : 0;
      drawHead32(ctx, 10, 2 + y, hair, skin, skinShade, eye, true);
      drawBody32(ctx, 9, 14 + y, hexColor, bodyLight);
      drawArm32(ctx, 6, 15 + y, armShade, skin);
      // Right arm gesture (raised)
      ctx.fillStyle = armShade;
      ctx.fillRect(22, 12 + y, 3, 4);
      ctx.fillRect(24, 9 + y + (frame === 1 ? -1 : 0), 3, 4);
      ctx.fillStyle = skin;
      ctx.fillRect(25, 8 + y + (frame === 1 ? -1 : 0), 2, 2);
      drawLegs32(ctx, 10, 22 + y, 17, 22 + y, pants, boot);
      break;
    }
    case 'think': {
      const y = frame === 1 ? -1 : 0;
      drawHead32(ctx, 10, 2 + y, hair, skin, skinShade, eye, false);
      drawBody32(ctx, 9, 14 + y, hexColor, bodyLight);
      drawArm32(ctx, 6, 15 + y, armShade, skin);
      // Right arm on chin
      ctx.fillStyle = armShade;
      ctx.fillRect(22, 14 + y, 3, 3);
      ctx.fillRect(21, 11 + y, 3, 4);
      ctx.fillStyle = skin;
      ctx.fillRect(20, 9 + y, 2, 3);
      // Thought dots
      if (frame === 1) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillRect(26, 4, 2, 2);
        ctx.fillRect(28, 1, 3, 3);
      }
      drawLegs32(ctx, 10, 22 + y, 17, 22 + y, pants, boot);
      break;
    }
    case 'sit': {
      drawHead32(ctx, 10, 6, hair, skin, skinShade, eye, false);
      drawBody32(ctx, 9, 18, hexColor, bodyLight);
      drawArm32(ctx, 6, 19, armShade, skin);
      drawArm32(ctx, 22, 19, armShade, skin);
      // Seated legs
      ctx.fillStyle = pants;
      ctx.fillRect(8, 26, 5, 3);
      ctx.fillRect(16, 26, 5, 3);
      ctx.fillRect(6, 27, 3, 3);
      ctx.fillRect(20, 27, 3, 3);
      ctx.fillStyle = boot;
      ctx.fillRect(4, 28, 3, 2);
      ctx.fillRect(22, 28, 3, 2);
      break;
    }
    case 'wave': {
      const y = frame === 1 ? -1 : 0;
      drawHead32(ctx, 10, 2 + y, hair, skin, skinShade, eye, true);
      drawBody32(ctx, 9, 14 + y, hexColor, bodyLight);
      drawArm32(ctx, 6, 15 + y, armShade, skin);
      // Right arm raised high
      ctx.fillStyle = armShade;
      ctx.fillRect(22, 12 + y, 3, 3);
      ctx.fillRect(24, 7 + y, 3, 6);
      ctx.fillStyle = skin;
      ctx.fillRect(25, 4 + y + (frame === 1 ? -2 : 0), 3, 3);
      drawLegs32(ctx, 10, 22 + y, 17, 22 + y, pants, boot);
      break;
    }
  }
}

function drawHead32(ctx, x, y, hair, skin, skinShade, eye, mouthOpen) {
  ctx.fillStyle = hair;
  ctx.fillRect(x - 1, y, 14, 4);
  ctx.fillRect(x - 2, y + 2, 2, 6);
  ctx.fillStyle = skin;
  ctx.fillRect(x, y + 3, 12, 9);
  ctx.fillStyle = skinShade;
  ctx.fillRect(x, y + 10, 12, 2);
  ctx.fillStyle = eye;
  ctx.fillRect(x + 2, y + 5, 2, 2);
  ctx.fillRect(x + 8, y + 5, 2, 2);
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + 2, y + 5, 1, 1);
  ctx.fillRect(x + 8, y + 5, 1, 1);
  if (mouthOpen) {
    ctx.fillStyle = '#c06060';
    ctx.fillRect(x + 4, y + 8, 4, 2);
  } else {
    ctx.fillStyle = '#c08080';
    ctx.fillRect(x + 5, y + 9, 2, 1);
  }
  ctx.fillStyle = skin;
  ctx.fillRect(x + 4, y + 12, 4, 2);
}

function drawBody32(ctx, x, y, color, bodyLight) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 14, 8);
  ctx.fillStyle = bodyLight;
  ctx.fillRect(x + 1, y, 6, 4);
}

function drawArm32(ctx, x, y, armShade, skin) {
  ctx.fillStyle = armShade;
  ctx.fillRect(x, y, 3, 7);
  ctx.fillStyle = skin;
  ctx.fillRect(x, y + 7, 3, 2);
}

function drawLegs32(ctx, lx, ly, rx, ry, pants, boot) {
  ctx.fillStyle = pants;
  ctx.fillRect(lx, ly, 4, 5);
  ctx.fillRect(rx, ry, 4, 5);
  ctx.fillStyle = boot;
  ctx.fillRect(lx - 1, ly + 5, 5, 3);
  ctx.fillRect(rx - 1, ry + 5, 5, 3);
}

// ========== PARTICLE SYSTEM ==========
const particles = [];
const PARTICLE_POOL_SIZE = 200;
for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
  particles.push({ active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 0, color: 0xffffff, size: 2, gravity: 0 });
}
const particleGfx = new PIXI.Graphics();
effectsLayer.addChild(particleGfx);

function emitParticles(worldX, worldY, count, config) {
  const { colors, speedMin = 0.3, speedMax = 1.5, sizeMin = 1, sizeMax = 3,
    lifeMin = 20, lifeMax = 40, gravity = 0.03, spread = Math.PI * 2,
    baseAngle = -Math.PI / 2 } = config;
  let spawned = 0;
  for (const p of particles) {
    if (spawned >= count) break;
    if (p.active) continue;
    const angle = Math.random() * spread - spread / 2 + baseAngle;
    const speed = speedMin + Math.random() * (speedMax - speedMin);
    p.x = worldX + (Math.random() - 0.5) * 8;
    p.y = worldY + (Math.random() - 0.5) * 8;
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    p.gravity = gravity;
    p.life = lifeMin + Math.random() * (lifeMax - lifeMin);
    p.maxLife = p.life;
    p.color = colors[Math.floor(Math.random() * colors.length)];
    p.size = sizeMin + Math.random() * (sizeMax - sizeMin);
    p.active = true;
    spawned++;
  }
}

function updateParticles() {
  particleGfx.clear();
  for (const p of particles) {
    if (!p.active) continue;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.life--;
    if (p.life <= 0) { p.active = false; continue; }
    const alpha = Math.min(1, p.life / p.maxLife * 2);
    const s = p.size * (0.5 + 0.5 * p.life / p.maxLife);
    particleGfx.rect(p.x - s / 2, p.y - s / 2, s, s);
    particleGfx.fill({ color: p.color, alpha });
  }
}

/**
 * Generate a client-side fallback appearance from bot name hash.
 * Used when server doesn't provide appearance data.
 */
function fallbackAppearance(name) {
  const seed = hashStr(name);
  const rng = mulberry32(seed);
  const pick = (n) => Math.floor(rng() * n);
  const pickHex = (arr) => arr[Math.floor(rng() * arr.length)];
  const hairColors = ['#2a2a3a','#4a3020','#8a3020','#5a4030','#1a1a2a','#6a5040'];
  const topColors = ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#1abc9c','#e67e22','#e91e63'];
  const bottomColors = ['#3a3a5c','#2a2a3a','#4a2a4a','#3a4a3a'];
  const shoeColors = ['#4a3728','#3a3a3a','#5a4a3a'];
  return {
    bodyType: pick(3), skinTone: pick(6), hairStyle: pick(6),
    hairColor: pickHex(hairColors), eyeStyle: pick(4),
    topStyle: pick(5), topColor: pickHex(topColors),
    bottomStyle: pick(3), bottomColor: pickHex(bottomColors),
    shoeStyle: pick(3), shoeColor: pickHex(shoeColors),
    accessory: null, expression: 'neutral',
  };
}

function mkSprite(name, display, loc, appearance) {
  if (sprites[name]) {
    sprites[name].dn = display || name;
    // Update appearance if provided and different
    if (appearance && appearanceKey(appearance) !== appearanceKey(sprites[name].appearance)) {
      sprites[name].appearance = appearance;
      rebuildBotTextures(name, appearance);
    }
    return sprites[name];
  }
  const L = LOCS[loc] || LOCS['central-square'];
  const app = appearance || fallbackAppearance(name);
  const color = app.topColor || BCOLORS[ci++ % BCOLORS.length];
  let px, py;
  if (L.t === 'plaza' || L.t === 'park') {
    px = L.x + 20 + Math.random() * (L.w - 40);
    py = L.y + 30 + Math.random() * (L.h - 50);
  } else {
    px = L.x + 10 + Math.random() * (L.w - 20);
    py = L.y + L.h + Math.random() * 40;
  }
  sprites[name] = {
    x: px, y: py, tx: px, ty: py,
    color, appearance: app, loc, dn: display || name,
    f: 0, mt: 120 + Math.random() * 200,
    pose: 'idle', poseTimer: 0, traveling: false,
  };
  createBotPixi(name, sprites[name]);
  return sprites[name];
}

/**
 * Rebuild textures for a bot whose appearance changed (e.g., occupation update).
 */
function rebuildBotTextures(name, appearance) {
  const bp = botPixi[name];
  if (!bp) return;
  const anims = getCharAnims(appearance);
  bp.body._anims = anims;
  const pose = bp.body._pose || 'idle';
  if (anims[pose]) {
    bp.body.textures = anims[pose];
    bp.body.play();
  }
}

function createBotPixi(name, s) {
  if (botPixi[name]) return botPixi[name];
  const anims = getCharAnims(s.appearance);
  const container = new PIXI.Container();

  const body = new PIXI.AnimatedSprite(anims.idle);
  body.width = SPRITE_SIZE;
  body.height = SPRITE_SIZE;
  body.animationSpeed = 0.08;
  body.play();
  body._anims = anims;
  body._pose = 'idle';

  const textRes = Math.max(2, Math.ceil(window.devicePixelRatio || 1));
  const nameText = new PIXI.Text({
    text: s.dn,
    style: {
      fontFamily: '-apple-system, "Segoe UI", sans-serif',
      fontSize: 10,
      fill: 0xffffff,
      stroke: { color: 0x000000, width: 3 },
    },
    resolution: textRes,
  });
  nameText.anchor.set(0.5, 0);
  nameText.position.set(SPRITE_SIZE / 2, SPRITE_SIZE + 2);

  const moodText = new PIXI.Text({
    text: '',
    style: {
      fontFamily: '-apple-system, "Segoe UI", sans-serif',
      fontSize: 12,
      fill: 0xffffff,
    },
    resolution: textRes,
  });
  moodText.anchor.set(0.5, 1);
  moodText.position.set(SPRITE_SIZE / 2, -4);
  moodText.visible = false;

  container.addChild(body, nameText, moodText);
  container.position.set(s.x - SPRITE_SIZE / 2, s.y - SPRITE_SIZE / 2);
  container.zIndex = Math.floor(s.y);
  botLayer.addChild(container);

  const obj = { container, body, nameText, moodText };
  botPixi[name] = obj;
  return obj;
}

function removeBotPixi(name) {
  if (botPixi[name]) {
    botLayer.removeChild(botPixi[name].container);
    botPixi[name].container.destroy({ children: true });
    delete botPixi[name];
  }
}

function setBotPose(name, pose, duration) {
  const s = sprites[name]; if (!s) return;
  s.pose = pose;
  s.poseTimer = duration || 60;
  const bp = botPixi[name]; if (!bp) return;
  if (bp.body._pose !== pose && bp.body._anims[pose]) {
    bp.body.textures = bp.body._anims[pose];
    bp.body._pose = pose;
    bp.body.play();
  }
}

function updateBotMood(name) {
  const bp = botPixi[name]; if (!bp) return;
  const e = emotions[name];
  if (e && e.emotion && e.emotion !== 'neutral') {
    const ME = { happy: '\u{1F60A}', content: '\u{1F60C}', excited: '\u{1F929}', lonely: '\u{1F614}', bored: '\u{1F610}' };
    bp.moodText.text = ME[e.emotion] || '';
    bp.moodText.visible = !!bp.moodText.text;
  } else {
    bp.moodText.visible = false;
  }
}

function updateSprite(s, name) {
  // Pose timer
  if (s.poseTimer > 0) {
    s.poseTimer--;
    if (s.poseTimer <= 0 && s.pose !== 'idle' && s.pose !== 'walk') {
      setBotPose(name, s.traveling ? 'walk' : 'idle');
    }
  }

  // Random wander
  s.mt--;
  if (s.mt <= 0 && !s.traveling) {
    const L = LOCS[s.loc];
    if (L) {
      if (L.t === 'plaza' || L.t === 'park') {
        s.tx = L.x + 20 + Math.random() * (L.w - 40);
        s.ty = L.y + 30 + Math.random() * (L.h - 50);
      } else {
        s.tx = L.x + 10 + Math.random() * (L.w - 20);
        s.ty = L.y + L.h + Math.random() * 40;
      }
    }
    s.mt = 120 + Math.random() * 200;
  }

  // Movement
  const dx = s.tx - s.x, dy = s.ty - s.y, d = Math.sqrt(dx * dx + dy * dy);
  if (d > 1) {
    const speed = s.traveling ? 2.0 : 0.8;
    s.x += dx / d * speed;
    s.y += dy / d * speed;
    s.f++;
    if (s.pose === 'idle' && s.poseTimer <= 0) setBotPose(name, 'walk');
  } else {
    if (s.traveling) s.traveling = false;
    if (s.pose === 'walk' && s.poseTimer <= 0) setBotPose(name, 'idle');
  }

  // Sit at relaxing locations
  if (!s.traveling && d <= 1 && s.poseTimer <= 0) {
    if (s.loc === 'chill-zone' || s.loc === 'sunset-lounge') {
      if (s.pose === 'idle' && Math.random() < 0.002) setBotPose(name, 'sit', 300);
    }
  }

  // Update PixiJS container
  const bp = botPixi[name];
  if (bp) {
    bp.container.position.set(s.x - SPRITE_SIZE / 2, s.y - SPRITE_SIZE / 2);
    bp.container.zIndex = Math.floor(s.y);
  }
}

function animateMove(name, toLoc) {
  const s = sprites[name]; if (!s) return;
  const L = LOCS[toLoc]; if (!L) return;
  s.loc = toLoc;
  if (L.t === 'plaza' || L.t === 'park') {
    s.tx = L.x + 20 + Math.random() * (L.w - 40);
    s.ty = L.y + 30 + Math.random() * (L.h - 50);
  } else {
    s.tx = L.x + 10 + Math.random() * (L.w - 20);
    s.ty = L.y + L.h + Math.random() * 40;
  }
  s.traveling = true;
  s.mt = 90;
  setBotPose(name, 'walk');
}

// ========== BUBBLES (DOM) ==========
const bubbleQueue = [];
let bubbleTimer = null;
const BUBBLE_SHOW_MS = 12000;
const BUBBLE_FADE_MS = 800;
const BUBBLE_STAGGER_MS = 3000;

function showBubble(botName, text, isWhisper) {
  bubbleQueue.push({ botName, text, isWhisper });
  if (!bubbleTimer) drainBubbleQueue();
}

function drainBubbleQueue() {
  if (bubbleQueue.length === 0) { bubbleTimer = null; return; }
  const { botName, text, isWhisper } = bubbleQueue.shift();
  showBubbleNow(botName, text, isWhisper);
  bubbleTimer = setTimeout(drainBubbleQueue, BUBBLE_STAGGER_MS);
}

function showBubbleNow(botName, text, isWhisper) {
  removeBubble(botName);
  const s = sprites[botName]; if (!s) return;
  const txt = text.length > 80 ? text.slice(0, 80) + '\u2026' : text;
  const el = document.createElement('div');
  el.className = 'bubble' + (isWhisper ? ' whisper' : '');
  el.innerHTML = `<span class="bn" style="color:${s.color}">${esc(s.dn)}</span>${esc(txt)}`;
  document.getElementById('map-wrap').appendChild(el);
  bubbleDom[botName] = { el };
  setTimeout(() => el.classList.add('fade'), BUBBLE_SHOW_MS - BUBBLE_FADE_MS);
  setTimeout(() => removeBubble(botName), BUBBLE_SHOW_MS);
}

function removeBubble(name) {
  if (bubbleDom[name]) { bubbleDom[name].el.remove(); delete bubbleDom[name]; }
}

function positionBubbles() {
  const cr = cv.getBoundingClientRect();
  const wr = document.getElementById('map-wrap').getBoundingClientRect();
  const sx = cr.width / CW, sy = cr.height / CH;
  const ox = cr.left - wr.left, oy = cr.top - wr.top;
  for (const [name, b] of Object.entries(bubbleDom)) {
    const s = sprites[name]; if (!s) continue;
    const screenX = (s.x - cameraX) * zoom * sx + ox;
    const screenY = ((s.y - SPRITE_SIZE) - cameraY) * zoom * sy + oy;
    if (screenX < -100 || screenX > cr.width + 100 || screenY < -100 || screenY > cr.height + 100) {
      b.el.style.display = 'none';
    } else {
      b.el.style.display = '';
      b.el.style.left = screenX + 'px';
      b.el.style.top = screenY + 'px';
    }
  }
}

// Mini bubbles
const MINI_BUBBLE_MS = 5000;

function showMiniBubble(botName, text) {
  removeBubble(botName);
  const s = sprites[botName]; if (!s) return;
  const txt = text.length > 60 ? text.slice(0, 60) + '\u2026' : text;
  const el = document.createElement('div');
  el.className = 'bubble mini';
  el.innerHTML = `<span class="bn" style="color:${s.color}">${esc(s.dn)}</span>${esc(txt)}`;
  document.getElementById('map-wrap').appendChild(el);
  bubbleDom[botName] = { el };
  setTimeout(() => el.classList.add('fade'), MINI_BUBBLE_MS - BUBBLE_FADE_MS);
  setTimeout(() => removeBubble(botName), MINI_BUBBLE_MS);
}

// Floating text
function showFloatingText(location, text) {
  const L = LOCS[location]; if (!L) return;
  const el = document.createElement('div');
  el.className = 'floating-text';
  el.textContent = text;
  const wrap = document.getElementById('map-wrap');
  wrap.appendChild(el);
  const cr = cv.getBoundingClientRect();
  const wr = wrap.getBoundingClientRect();
  const sx = cr.width / CW, sy = cr.height / CH;
  const ox = cr.left - wr.left, oy = cr.top - wr.top;
  const screenX = (L.x + L.w / 2 - cameraX) * zoom * sx + ox - 60;
  const screenY = (L.y - 20 - cameraY) * zoom * sy + oy;
  el.style.left = screenX + 'px';
  el.style.top = screenY + 'px';
  setTimeout(() => el.classList.add('fade'), 4000);
  setTimeout(() => el.remove(), 5000);
}

// ========== CHAT LOG ==========
function addLog(html, prepend) {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'le';
  div.innerHTML = html;
  if (prepend) {
    const firstChild = el.firstChild;
    el.insertBefore(div, firstChild);
  } else {
    el.appendChild(div);
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
    if (atBottom) el.scrollTop = el.scrollHeight;
  }
  while (el.children.length > 500) {
    if (prepend) el.lastChild.remove();
    else el.firstChild.remove();
  }
}

function addTickSep(prepend) {
  const el = document.getElementById('log');
  const hr = document.createElement('hr');
  hr.className = 'tick-sep';
  if (prepend) el.insertBefore(hr, el.firstChild);
  else el.appendChild(hr);
}

// ========== SHARED ACTION LOG HTML ==========
function actionLogHtml(d) {
  const nm = d.displayName || d.bot;
  const ln = () => d.locationName || LNAMES[d.location] || d.location;
  const tgt = () => d.targetDisplayName || (sprites[d.target] || {}).dn || d.target || '?';
  switch (d.action) {
    case 'say':            return `<span class="b">${esc(nm)}</span>: <span class="s">"${esc(d.message)}"</span>`;
    case 'whisper':        return `<span class="b">${esc(nm)}</span> <span class="w">whispered to ${esc(tgt())}</span>`;
    case 'observe':        return `<span class="o">${esc(nm)} observed silently</span>`;
    case 'move':           return `<span class="b">${esc(nm)}</span> <span class="m">\u2192 ${esc(LNAMES[d.to] || d.to)}</span>`;
    case 'decorate':       return `\uD83C\uDFA8 <span class="b">${esc(nm)}</span> <span class="k">decorated ${esc(ln())}: ${esc(d.decoration)}</span>`;
    case 'leave_message':  return `\uD83D\uDCDD <span class="b">${esc(nm)}</span> <span class="k">left a message at ${esc(ln())}: "${esc(d.message)}"</span>`;
    case 'read_messages':  return `\uD83D\uDCD6 <span class="b">${esc(nm)}</span> <span class="k">reads messages at ${esc(ln())}</span>`;
    case 'explore':        return `\uD83D\uDD2D <span class="b">${esc(nm)}</span> <span class="j">explores around ${esc(ln())}</span>`;
    case 'build':          return `\uD83C\uDFD7 <span class="b">${esc(nm)}</span> <span class="j">built <b>${esc(d.locationName)}</b>: ${esc(d.locationDesc)}</span>`;
    case 'set_occupation': return `\uD83D\uDCBC <span class="b">${esc(nm)}</span> <span class="j">is now a <b>${esc(d.title)}</b></span>`;
    case 'propose_bond':   return `\uD83E\uDD1D <span class="b">${esc(nm)}</span> <span class="j">formed a bond with <b>${esc(tgt())}</b>: ${esc(d.bondType)}</span>`;
    default: return null;
  }
}

// ========== CONVERT EVENT TO LOG HTML ==========
function eventToHtml(d) {
  const t = `<span class="t">${hm(d._ts)}</span>`;
  switch (d.type) {
    case 'action': {
      const html = actionLogHtml(d);
      return html ? `${t} ${html}` : null;
    }
    case 'movement': {
      const nm = d.displayName || d.bot;
      if (d.action === 'join') return `${t} <span class="b">${esc(nm)}</span> <span class="j">joined the village</span>`;
      if (d.action === 'leave') return `${t} <span class="b">${esc(nm)}</span> <span class="l">left the village</span>`;
      return null;
    }
    case 'tick': {
      const a = d.actions || {};
      return `${t} <span class="k">\u2014 tick ${d.tick} \u00b7 ${d.phase} \u00b7 ${d.bots}/${d.botsTotal} bots \u00b7 say:${a.say || 0} whisper:${a.whisper || 0} move:${a.move || 0} \u2014</span>`;
    }
    case 'relationship': {
      const verb = d.label ? `became ${d.label}s` : 'are no longer close';
      return `${t} <span class="b">${esc(d.fromDisplay)}</span> \u2665 <span class="b">${esc(d.toDisplay)}</span> <span class="j">\u2014 ${esc(verb)}</span>`;
    }
    case 'emotion': {
      if (d.emotion === 'neutral') return null;
      const nm = d.displayName || d.bot;
      const MOOD_EMOJI = { happy: '\u{1F60A}', content: '\u{1F60C}', excited: '\u{1F929}', lonely: '\u{1F614}', bored: '\u{1F610}' };
      const emoji = MOOD_EMOJI[d.emotion] || '';
      return `${t} ${emoji} <span class="b">${esc(nm)}</span> <span class="j">is feeling ${esc(d.emotion)}</span>`;
    }
    case 'village_event': {
      const ln = d.locationName || LNAMES[d.location] || d.location;
      return `${t} \u26A1 <span class="k">${esc(ln)}: ${esc(d.text)}</span>`;
    }
    case 'ambient': {
      const ln = d.locationName || LNAMES[d.location] || d.location;
      return `${t} <span class="ambient">\u2615 ${esc(ln)}: ${esc(d.text)}</span>`;
    }
    case 'idle': {
      return `${t} <span class="idle">${esc(d.text)}</span>`;
    }
    case 'autopilot_move': {
      const nm = d.displayName || d.bot;
      return `${t} <span class="auto-move">${esc(nm)} \u2192 ${esc(d.toName || LNAMES[d.to] || d.to)}</span>`;
    }
    default: return null;
  }
}

// ========== LAZY LOADING ==========
async function loadHistory(initial) {
  if (loadingMore || !hasMore) return;
  loadingMore = true;
  document.getElementById('load-more').classList.add('show');
  try {
    let url = `${basePath}/api/logs?limit=50`;
    if (oldestTick < Infinity) url += `&before=${oldestTick}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    hasMore = data.hasMore;
    if (data.events.length > 0) {
      const logEl = document.getElementById('log');
      const prevScrollHeight = logEl.scrollHeight;
      let lastTick = null;
      for (let i = data.events.length - 1; i >= 0; i--) {
        const ev = data.events[i];
        if (ev.tick !== undefined && ev.tick < oldestTick) oldestTick = ev.tick;
        if (ev.type === 'tick' && lastTick !== null && lastTick !== ev.tick) addTickSep(true);
        lastTick = ev.tick;
        const html = eventToHtml(ev);
        if (html) addLog(html, true);
      }
      if (initial) logEl.scrollTop = logEl.scrollHeight;
      else logEl.scrollTop = logEl.scrollHeight - prevScrollHeight;
    }
  } catch (err) {
    // Silently fail
  } finally {
    loadingMore = false;
    document.getElementById('load-more').classList.toggle('show', hasMore);
  }
}

document.getElementById('log').addEventListener('scroll', () => {
  const el = document.getElementById('log');
  if (el.scrollTop < 30 && hasMore && !loadingMore) loadHistory(false);
});

// ========== STATUS BAR ==========
function fmtCountdown(ms) { return Math.max(0, Math.ceil(ms / 1000)) + 's'; }

function updateBar() {
  const te = document.getElementById('tick');
  const se = document.getElementById('st');
  const remaining = nextTickAt ? nextTickAt - Date.now() : 0;
  const cd = remaining > 0 ? ` \u00b7 next ${fmtCountdown(remaining)}` : '';
  const vt = villageTime ? `${villageTime} \u00b7 ` : '';
  te.textContent = tick > 0 ? `${vt}${phase ? phase[0].toUpperCase() + phase.slice(1) : ''} \u00b7 Tick ${tick}${cd}` : '\u2014';
  if (!online) { se.textContent = 'Disconnected'; se.className = 'st-off'; }
  else if (paused) { se.textContent = 'Paused'; se.className = 'st-pause'; }
  else { se.textContent = 'Running'; se.className = 'st-run'; }
}

// ========== RELATIONSHIPS PANEL ==========
function relClass(label) {
  if (label.startsWith('best')) return 'rel-best';
  if (label.startsWith('good')) return 'rel-good';
  if (label.startsWith('friend')) return 'rel-friend';
  return 'rel-acq';
}

function renderRels(highlightKey) {
  const el = document.getElementById('rels');
  const entries = Object.entries(relationships).filter(([, r]) => r.label);
  if (entries.length === 0) { el.classList.remove('show'); return; }
  el.classList.add('show');
  el.innerHTML = entries.map(([key, r]) => {
    const [a, b] = key.split('::');
    const da = (sprites[a] || {}).dn || a;
    const db = (sprites[b] || {}).dn || b;
    const hl = key === highlightKey ? ' highlight' : '';
    return `<span class="rel ${relClass(r.label)}${hl}" data-key="${esc(key)}">\u2665 ${esc(da)} &amp; ${esc(db)}: ${esc(r.label)}</span>`;
  }).join(' \u00b7 ');
  if (highlightKey) {
    setTimeout(() => { const h = el.querySelector('.highlight'); if (h) h.classList.remove('highlight'); }, 1500);
  }
}

// ========== MOODS PANEL ==========
const MOOD_EMOJI = { happy: '\u{1F60A}', content: '\u{1F60C}', excited: '\u{1F929}', lonely: '\u{1F614}', bored: '\u{1F610}' };
const MOOD_POS = new Set(['happy', 'content', 'excited']);

function renderMoods() {
  const el = document.getElementById('moods');
  const entries = Object.entries(emotions).filter(([, e]) => e.emotion && e.emotion !== 'neutral');
  if (entries.length === 0) { el.classList.remove('show'); return; }
  el.classList.add('show');
  el.innerHTML = entries.map(([bot, e]) => {
    const dn = (sprites[bot] || {}).dn || bot;
    const emoji = MOOD_EMOJI[e.emotion] || '';
    const cls = MOOD_POS.has(e.emotion) ? 'mood-pos' : 'mood-neg';
    return `<span class="${cls}">${emoji} ${esc(dn)}: ${esc(e.emotion)}</span>`;
  }).join(' \u00b7 ');
}

// ========== SSE EVENTS ==========
function onEvent(d) {
  const t = `<span class="t">${hm()}</span>`;

  switch (d.type) {
    case 'init':
      tick = d.tick; phase = d.phase; paused = d.paused; online = true;
      if (d.nextTickAt) nextTickAt = d.nextTickAt;
      if (d.tickIntervalMs) tickIntervalMs = d.tickIntervalMs;
      if (d.villageTime) villageTime = d.villageTime;
      if (d.relationships) relationships = d.relationships;
      if (d.emotions) emotions = d.emotions;
      if (d.customLocations) {
        for (const [slug, cl] of Object.entries(d.customLocations)) {
          addDynamicLocation(slug, cl.name, cl.connectedTo);
        }
      }
      for (const loc of Object.keys(d.locations || {})) {
        if (!LOCS[loc]) addDynamicLocation(loc, loc, null);
        const bots = d.locations[loc] || [];
        locBots[loc] = bots.map(b => typeof b === 'string' ? b : (b.name || b));
        bots.forEach(b => {
          const nm = typeof b === 'string' ? b : (b.name || b);
          const dn = typeof b === 'string' ? b : (b.displayName || b.name || b);
          const app = (typeof b === 'object' && b.appearance) ? b.appearance : null;
          mkSprite(nm, dn, loc, app);
          updateBotMood(nm);
        });
      }
      updateBar();
      renderRels();
      renderMoods();
      updateFollowSelect();
      if (!window._initDone) {
        document.getElementById('log').innerHTML = '';
        window._initDone = true;
        loadHistory(true);
      }
      break;

    case 'action': {
      const nm = d.displayName || d.bot;
      if (d.bot && d.location) mkSprite(d.bot, nm, d.location);
      if (d.action === 'say') {
        showBubble(d.bot, d.message);
        setBotPose(d.bot, 'talk', 40);
        lastSpeaker = d.bot;
      }
      else if (d.action === 'whisper') {
        showBubble(d.bot, `(whispers to ${d.targetDisplayName || (sprites[d.target] || {}).dn || d.target || '?'})`, true);
        setBotPose(d.bot, 'talk', 30);
      }
      else if (d.action === 'observe') {
        setBotPose(d.bot, 'think', 50);
      }
      else if (d.action === 'move') {
        animateMove(d.bot, d.to);
        if (locBots[d.from]) locBots[d.from] = locBots[d.from].filter(b => b !== d.bot);
        if (!locBots[d.to]) locBots[d.to] = [];
        if (!locBots[d.to].includes(d.bot)) locBots[d.to].push(d.bot);
      }
      else if (d.action === 'leave_message') showBubble(d.bot, `\uD83D\uDCDD ${d.message}`);
      else if (d.action === 'explore') {
        showBubble(d.bot, '\uD83D\uDD2D Exploring...');
        setBotPose(d.bot, 'walk', 40);
      }
      else if (d.action === 'build') {
        addDynamicLocation(d.locationSlug, d.locationName, d.connectedTo);
        showBubble(d.bot, `\uD83C\uDFD7 Built ${d.locationName}!`);
        const nl = LOCS[d.locationSlug];
        if (nl) emitParticles(nl.x + nl.w / 2, nl.y + nl.h / 2, 20, {
          colors: [0xffdd44, 0xffaa22, 0xffffff],
          speedMin: 0.5, speedMax: 2.0, sizeMin: 2, sizeMax: 4,
          lifeMin: 20, lifeMax: 50, gravity: 0.02,
        });
      }
      const html = actionLogHtml(d);
      if (html) addLog(`${t} ${html}`);
      break;
    }

    case 'movement': {
      const nm = d.displayName || d.bot;
      if (d.action === 'join') {
        mkSprite(d.bot, nm, d.location, d.appearance || null);
        setBotPose(d.bot, 'wave', 50);
        if (locBots[d.location] && !locBots[d.location].includes(d.bot)) locBots[d.location].push(d.bot);
        addLog(`${t} <span class="b">${esc(nm)}</span> <span class="j">joined the village</span>`);
        updateFollowSelect();
      } else if (d.action === 'leave') {
        if (locBots[d.location]) locBots[d.location] = locBots[d.location].filter(b => b !== d.bot);
        removeBubble(d.bot);
        removeBotPixi(d.bot);
        delete sprites[d.bot];
        addLog(`${t} <span class="b">${esc(nm)}</span> <span class="l">left the village</span>`);
        updateFollowSelect();
      }
      break;
    }

    case 'tick':
      tick = d.tick; phase = d.phase;
      if (d.nextTickAt) nextTickAt = d.nextTickAt;
      if (d.tickIntervalMs) tickIntervalMs = d.tickIntervalMs;
      if (d.villageTime) villageTime = d.villageTime;
      if (d.relationships) { relationships = d.relationships; renderRels(); }
      if (d.emotions) {
        emotions = d.emotions; renderMoods();
        for (const nm of Object.keys(emotions)) updateBotMood(nm);
      }
      if (d.customLocations) {
        for (const [slug, cl] of Object.entries(d.customLocations)) {
          addDynamicLocation(slug, cl.name, cl.connectedTo);
        }
      }
      if (d.locations) {
        const allBots = new Set();
        for (const loc of Object.keys(d.locations)) {
          if (!LOCS[loc]) addDynamicLocation(loc, loc, null);
          const bots = d.locations[loc] || [];
          locBots[loc] = bots.map(b => typeof b === 'string' ? b : (b.name || b));
          bots.forEach(b => {
            const nm = typeof b === 'string' ? b : (b.name || b);
            const dn = typeof b === 'string' ? b : (b.displayName || b.name || b);
            const app = (typeof b === 'object' && b.appearance) ? b.appearance : null;
            allBots.add(nm);
            const sp = mkSprite(nm, dn, loc, app);
            if (sp.loc !== loc) animateMove(nm, loc);
            updateBotMood(nm);
          });
        }
        for (const nm of Object.keys(sprites)) {
          if (!allBots.has(nm)) { removeBubble(nm); removeBotPixi(nm); delete sprites[nm]; }
        }
      }
      updateBar();
      updateFollowSelect();
      addTickSep(false);
      const a = d.actions || {};
      addLog(`${t} <span class="k">\u2014 tick ${d.tick} \u00b7 ${d.phase} \u00b7 ${d.bots}/${d.botsTotal} bots \u00b7 say:${a.say || 0} whisper:${a.whisper || 0} move:${a.move || 0} \u2014</span>`);
      break;

    case 'relationship': {
      const key = [d.from, d.to].sort().join('::');
      if (!relationships[key]) relationships[key] = { says: 0, whispers: 0, coTicks: 0, label: '', prevLabel: '', since: 0 };
      relationships[key].label = d.label;
      relationships[key].prevLabel = d.prevLabel;
      renderRels(key);
      const verb = d.label ? `became ${d.label}s` : 'are no longer close';
      addLog(`${t} <span class="b">${esc(d.fromDisplay)}</span> \u2665 <span class="b">${esc(d.toDisplay)}</span> <span class="j">\u2014 ${esc(verb)}</span>`);
      break;
    }

    case 'emotion': {
      if (!emotions[d.bot]) emotions[d.bot] = {};
      emotions[d.bot].emotion = d.emotion;
      emotions[d.bot].prevEmotion = d.prevEmotion;
      renderMoods();
      updateBotMood(d.bot);
      if (d.emotion !== 'neutral') {
        const nm = d.displayName || (sprites[d.bot] || {}).dn || d.bot;
        const emoji = MOOD_EMOJI[d.emotion] || '';
        addLog(`${t} ${emoji} <span class="b">${esc(nm)}</span> <span class="j">is feeling ${esc(d.emotion)}</span>`);
      }
      break;
    }

    case 'village_event': {
      const ln = d.locationName || LNAMES[d.location] || d.location;
      addLog(`${t} \u26A1 <span class="k">${esc(ln)}: ${esc(d.text)}</span>`);
      break;
    }

    case 'ambient': {
      const ln = d.locationName || LNAMES[d.location] || d.location;
      showFloatingText(d.location, d.text);
      addLog(`${t} <span class="ambient">\u2615 ${esc(ln)}: ${esc(d.text)}</span>`);
      const al = LOCS[d.location];
      if (al) emitParticles(al.x + al.w / 2, al.y + al.h / 2, 8, {
        colors: [0xaaddff, 0xccffcc, 0xffffaa],
        speedMin: 0.2, speedMax: 0.6, sizeMin: 1, sizeMax: 3,
        lifeMin: 20, lifeMax: 40, gravity: -0.01,
      });
      break;
    }

    case 'idle': {
      if (d.bot) showMiniBubble(d.bot, d.text);
      addLog(`${t} <span class="idle">${esc(d.text)}</span>`);
      break;
    }

    case 'autopilot_move': {
      const nm = d.displayName || d.bot;
      if (d.bot) {
        animateMove(d.bot, d.to);
        if (locBots[d.from]) locBots[d.from] = locBots[d.from].filter(b => b !== d.bot);
        if (!locBots[d.to]) locBots[d.to] = [];
        if (!locBots[d.to].includes(d.bot)) locBots[d.to].push(d.bot);
      }
      addLog(`${t} <span class="auto-move">${esc(nm)} \u2192 ${esc(d.toName || LNAMES[d.to] || d.to)}</span>`);
      break;
    }

    case 'appearance_update': {
      if (d.bot && d.appearance && sprites[d.bot]) {
        sprites[d.bot].appearance = d.appearance;
        sprites[d.bot].color = d.appearance.topColor || sprites[d.bot].color;
        rebuildBotTextures(d.bot, d.appearance);
      }
      break;
    }

    case 'status':
      paused = d.paused; updateBar();
      break;
  }
}

// ========== SSE CONNECTION ==========
function connect() {
  basePath = location.pathname.replace(/\/index\.html$/, '').replace(/\/+$/, '');
  const url = basePath ? `${basePath}/events` : '/events';
  const es = new EventSource(url);
  es.onopen = () => { online = true; updateBar(); };
  es.onmessage = (e) => { try { onEvent(JSON.parse(e.data)); } catch {} };
  es.onerror = () => { online = false; updateBar(); };
}

    updateSprite(s, name);

  emitAmbientParticles();
  updateParticles();
  updateDayNight();
  positionBubbles();

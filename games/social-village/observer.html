<script type="module">
import { hashStr, hexToInt, hexToRgb, darken } from './assets/observer-utils.js?v=3';
import { initTerrain, updateVisibleChunks, invalidateChunksNearLocation, clearAllChunks, setFrame as setTerrainFrame } from './assets/observer-terrain.js?v=3';
import { loadCharacterSheet, getCharAnims, SPRITE_SIZE, BCOLORS } from './assets/observer-characters.js?v=3';
import { initParticles, emitParticles, updateParticles, emitAmbientParticles, setParticleState } from './assets/observer-particles.js?v=3';
import { initCamera, updateCamera, getCameraState, getCameraRect, setFollowTarget, updateFollowSelect, setLastSpeaker } from './assets/observer-camera.js?v=3';

(async () => {
// ========== CONSTANTS ==========
const CW = 960, CH = 540;

// ========== WORLD LAYOUT ==========
const BASE_LOCATIONS = {
  'central-square': { n:'中央广场', x:800, y:300, w:300, h:200, c:'#9a8a7a', r:'#7a6a5a', t:'plaza' },
  'workshop':       { n:'创客空间', x:300, y:700, w:250, h:170, c:'#7a6a4a', r:'#5a4a2a', t:'bld' },
  'prison':         { n:'监狱',     x:1300,y:700, w:200, h:160, c:'#4a4a4a', r:'#2a2a2a', t:'bld' },
};
const BASE_EDGES = [
  ['central-square','workshop'],
  ['central-square','prison'],
];

let LOCS = {};
let LOC_IDS = [];
let LNAMES = {};
let edges = [...BASE_EDGES];
// World is unbounded — chunks generate on demand at any coordinates

function initLocations() {
  LOCS = {};
  for (const [id, L] of Object.entries(BASE_LOCATIONS)) {
    LOCS[id] = { ...L, fixed: true };
  }
  LOC_IDS = Object.keys(LOCS);
  LNAMES = {};
  LOC_IDS.forEach(k => LNAMES[k] = LOCS[k].n);
}
initLocations();

// hashStr is now inlined from observer-utils.js

// Register a dynamic location (data only, no rendering)
function registerDynamicLocation(slug, name, connectedTo) {
  if (LOCS[slug]) return false;
  const parentId = connectedTo && LOCS[connectedTo] ? connectedTo : 'central-square';
  const parent = LOCS[parentId];
  const pcx = parent.x + parent.w / 2, pcy = parent.y + parent.h / 2;
  // Find largest angular gap among existing neighbors of parent
  const neighborAngles = [];
  for (const [eA, eB] of edges) {
    let nbId = null;
    if (eA === parentId) nbId = eB;
    else if (eB === parentId) nbId = eA;
    if (!nbId || !LOCS[nbId]) continue;
    const nb = LOCS[nbId];
    neighborAngles.push(Math.atan2(nb.y + nb.h / 2 - pcy, nb.x + nb.w / 2 - pcx));
  }
  let angle;
  if (neighborAngles.length === 0) {
    angle = (hashStr(slug) % 360) * Math.PI / 180;
  } else {
    neighborAngles.sort((a, b) => a - b);
    let bestGap = 0, bestMid = 0;
    for (let i = 0; i < neighborAngles.length; i++) {
      const next = i + 1 < neighborAngles.length ? neighborAngles[i + 1] : neighborAngles[0] + 2 * Math.PI;
      const gap = next - neighborAngles[i];
      if (gap > bestGap) { bestGap = gap; bestMid = neighborAngles[i] + gap / 2; }
    }
    angle = bestMid;
  }
  const dist = 450;
  const nx = pcx + Math.cos(angle) * dist - 110;
  const ny = pcy + Math.sin(angle) * dist - 75;
  LOCS[slug] = { n: name, x: nx, y: ny, w: 220, h: 150, c: '#6a7a6a', r: '#4a5a4a', t: 'bld', dynamic: true, connectedTo: parentId };
  edges.push([parentId, slug]);
  LOC_IDS = Object.keys(LOCS);
  LNAMES[slug] = name;
  if (!locBots[slug]) locBots[slug] = [];
  return true;
}

// Register + layout + full redraw (for single additions like build events)
function addDynamicLocation(slug, name, connectedTo) {
  if (!registerDynamicLocation(slug, name, connectedTo)) return;
  computeLayout();
  rebuildWorld();
}

// ========== FORCE-DIRECTED LAYOUT ==========
function computeLayout() {
  const nodes = Object.entries(LOCS);
  for (let iter = 0; iter < 200; iter++) {
    for (let i = 0; i < nodes.length; i++) {
      const [idA, A] = nodes[i];
      if (A.fixed) continue;
      let fx = 0, fy = 0;
      const ax = A.x + A.w / 2, ay = A.y + A.h / 2;
      // Repulsion from all other nodes (stronger when overlapping)
      for (let j = 0; j < nodes.length; j++) {
        if (i === j) continue;
        const [, B] = nodes[j];
        const bx = B.x + B.w / 2, by = B.y + B.h / 2;
        let dx = ax - bx, dy = ay - by;
        const d = Math.sqrt(dx * dx + dy * dy) + 1;
        // Minimum separation = half-widths + half-heights + padding
        const minDist = (A.w + B.w) / 2 + 60;
        const force = d < minDist ? 200000 / (d * d) : 50000 / (d * d);
        fx += (dx / d) * force;
        fy += (dy / d) * force;
      }
      // Attraction along edges (ideal distance = 450px)
      for (const [eA, eB] of edges) {
        let other = null;
        if (eA === idA) other = LOCS[eB];
        else if (eB === idA) other = LOCS[eA];
        if (!other) continue;
        const bx = other.x + other.w / 2, by = other.y + other.h / 2;
        const dx = bx - ax, dy = by - ay;
        const d = Math.sqrt(dx * dx + dy * dy) + 1;
        const force = (d - 450) * 0.05;
        fx += (dx / d) * force;
        fy += (dy / d) * force;
      }
      A.x += fx * 0.1;
      A.y += fy * 0.1;
    }
  }
  shiftToPositive();
}

function computeLayoutIncremental(slug) {
  const A = LOCS[slug];
  if (!A) return;
  const nodes = Object.entries(LOCS);
  for (let iter = 0; iter < 40; iter++) {
    let fx = 0, fy = 0;
    const ax = A.x + A.w / 2, ay = A.y + A.h / 2;
    // Repulsion from all other nodes
    for (const [id, B] of nodes) {
      if (id === slug) continue;
      const bx = B.x + B.w / 2, by = B.y + B.h / 2;
      const dx = ax - bx, dy = ay - by;
      const d2 = dx * dx + dy * dy + 1;
      const d = Math.sqrt(d2);
      const force = 50000 / d2;
      fx += (dx / d) * force;
      fy += (dy / d) * force;
    }
    // Attraction along connected edges
    for (const [eA, eB] of edges) {
      let other = null;
      if (eA === slug) other = LOCS[eB];
      else if (eB === slug) other = LOCS[eA];
      if (!other) continue;
      const bx = other.x + other.w / 2, by = other.y + other.h / 2;
      const dx = bx - ax, dy = by - ay;
      const d = Math.sqrt(dx * dx + dy * dy) + 1;
      const force = (d - 350) * 0.05;
      fx += (dx / d) * force;
      fy += (dy / d) * force;
    }
    A.x += fx * 0.1;
    A.y += fy * 0.1;
  }
  shiftToPositive();
}

function shiftToPositive() {
  let minX = Infinity, minY = Infinity;
  for (const L of Object.values(LOCS)) {
    minX = Math.min(minX, L.x);
    minY = Math.min(minY, L.y);
  }
  if (minX < 200) {
    const shift = 200 - minX;
    for (const L of Object.values(LOCS)) L.x += shift;
  }
  if (minY < 200) {
    const shift = 200 - minY;
    for (const L of Object.values(LOCS)) L.y += shift;
  }
}

function computePopulatedBounds() {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const L of Object.values(LOCS)) {
    minX = Math.min(minX, L.x);
    minY = Math.min(minY, L.y);
    maxX = Math.max(maxX, L.x + L.w);
    maxY = Math.max(maxY, L.y + L.h);
  }
  return { minX, minY, maxX, maxY };
}
shiftToPositive();

// ========== PIXI SETUP ==========
if (PIXI.TextureSource && PIXI.TextureSource.defaultOptions) {
  PIXI.TextureSource.defaultOptions.scaleMode = 'nearest';
}

const app = new PIXI.Application();
await app.init({
  width: CW,
  height: CH,
  background: 0x1a2a1a,
  antialias: true,
  resolution: 1,
  autoDensity: false,
});
const cv = app.canvas;
document.getElementById('map-wrap').appendChild(cv);

// Container hierarchy
const worldContainer = new PIXI.Container();
const terrainLayer = new PIXI.Container();
const pathLayer = new PIXI.Container();
const pathObjects = new Map(); // key "idA::idB" (sorted) → PIXI.Graphics
const locationLayer = new PIXI.Container();
const effectsLayer = new PIXI.Container();
const botLayer = new PIXI.Container();
botLayer.sortableChildren = true;
const overlayContainer = new PIXI.Container();
const dayNightOverlay = new PIXI.Graphics();

worldContainer.addChild(terrainLayer, pathLayer, locationLayer, effectsLayer, botLayer);
overlayContainer.addChild(dayNightOverlay);
app.stage.addChild(worldContainer, overlayContainer);

// Responsive resize
function resize() {
  const wrap = document.getElementById('map-wrap');
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  if (ww <= 0 || wh <= 0) return;
  const s = Math.min(ww / CW, wh / CH);
  cv.style.width = Math.floor(CW * s) + 'px';
  cv.style.height = Math.floor(CH * s) + 'px';
}
addEventListener('resize', resize);
resize();

// Camera — extracted to observer-camera.js (see imports above)

// Initialize extracted modules
initTerrain(terrainLayer, LOCS);
initParticles(effectsLayer, LOCS);

// ========== PATH RENDERING ==========
function computeBezier(ax, ay, bx, by) {
  // Perpendicular offset for the curve bulge — deterministic from endpoints
  const mx = (ax + bx) / 2, my = (ay + by) / 2;
  const dx = bx - ax, dy = by - ay;
  const len = Math.sqrt(dx * dx + dy * dy);
  // Perpendicular direction (normalized)
  const nx = -dy / len, ny = dx / len;
  // Offset magnitude: 15-25% of length, sign from coordinate hash
  const sign = ((Math.round(ax * 7 + by * 13) % 2) === 0) ? 1 : -1;
  const bulge = len * (0.15 + (Math.abs(Math.round(ax + by)) % 10) * 0.01) * sign;
  const cx = mx + nx * bulge;
  const cy = my + ny * bulge;
  return { cx, cy };
}

function pathKey(idA, idB) {
  return idA < idB ? idA + '::' + idB : idB + '::' + idA;
}

function edgePoint(L, tx, ty) {
  // Find the point on the edge of the building rectangle closest to target (tx, ty)
  const cx = L.x + L.w / 2, cy = L.y + L.h / 2;
  const dx = tx - cx, dy = ty - cy;
  if (dx === 0 && dy === 0) return { x: cx, y: cy };
  const sx = Math.abs(dx) > 0.01 ? (L.w / 2) / Math.abs(dx) : Infinity;
  const sy = Math.abs(dy) > 0.01 ? (L.h / 2) / Math.abs(dy) : Infinity;
  const s = Math.min(sx, sy);
  return { x: cx + dx * s, y: cy + dy * s };
}

function drawSinglePath(idA, idB) {
  const A = LOCS[idA], B = LOCS[idB];
  if (!A || !B) return null;
  const acx = A.x + A.w / 2, acy = A.y + A.h / 2;
  const bcx = B.x + B.w / 2, bcy = B.y + B.h / 2;
  const eA = edgePoint(A, bcx, bcy);
  const eB = edgePoint(B, acx, acy);
  const ax = eA.x, ay = eA.y, bx = eB.x, by = eB.y;
  const { cx, cy } = computeBezier(ax, ay, bx, by);
  const g = new PIXI.Graphics();

  // Outer stone border
  g.moveTo(ax, ay); g.quadraticCurveTo(cx, cy, bx, by);
  g.stroke({ color: 0x6b5a40, width: 16, alpha: 0.7, cap: 'round', join: 'round' });
  // Main stone path
  g.moveTo(ax, ay); g.quadraticCurveTo(cx, cy, bx, by);
  g.stroke({ color: 0x9a8468, width: 12, alpha: 0.9, cap: 'round', join: 'round' });
  // Inner highlight
  g.moveTo(ax, ay); g.quadraticCurveTo(cx, cy, bx, by);
  g.stroke({ color: 0xb0a080, width: 4, alpha: 0.3, cap: 'round', join: 'round' });
  // Dashed stone pattern
  const steps = Math.max(8, Math.floor(Math.sqrt((bx - ax) ** 2 + (by - ay) ** 2) / 28));
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    const u = 1 - t;
    const px = u * u * ax + 2 * u * t * cx + t * t * bx;
    const py = u * u * ay + 2 * u * t * cy + t * t * by;
    const tx = 2 * u * (cx - ax) + 2 * t * (bx - cx);
    const ty = 2 * u * (cy - ay) + 2 * t * (by - cy);
    const tlen = Math.sqrt(tx * tx + ty * ty) || 1;
    const pnx = -ty / tlen, pny = tx / tlen;
    g.moveTo(px + pnx * 4, py + pny * 4);
    g.lineTo(px - pnx * 4, py - pny * 4);
    g.stroke({ color: 0x7d6b50, width: 1.5, alpha: 0.4 });
  }

  // Store bounding box for culling (endpoints + control point)
  g._bounds = {
    minX: Math.min(ax, bx, cx) - 10,
    minY: Math.min(ay, by, cy) - 10,
    maxX: Math.max(ax, bx, cx) + 10,
    maxY: Math.max(ay, by, cy) + 10,
  };

  return g;
}

function drawAllPaths() {
  // Clear existing
  for (const [, g] of pathObjects) { pathLayer.removeChild(g); g.destroy(); }
  pathObjects.clear();
  for (const [idA, idB] of edges) {
    const key = pathKey(idA, idB);
    if (pathObjects.has(key)) continue;
    const g = drawSinglePath(idA, idB);
    if (g) { pathLayer.addChild(g); pathObjects.set(key, g); }
  }
}

function addSinglePath(idA, idB) {
  const key = pathKey(idA, idB);
  if (pathObjects.has(key)) return;
  const g = drawSinglePath(idA, idB);
  if (g) { pathLayer.addChild(g); pathObjects.set(key, g); }
}

let locationContainers = {};

function drawLocationGraphics(id, L) {
  // Remove existing container if re-drawing (e.g. after layout recompute)
  if (locationContainers[id]) {
    locationLayer.removeChild(locationContainers[id]);
    locationContainers[id].destroy({ children: true });
    delete locationContainers[id];
  }
  const container = new PIXI.Container();
  container.position.set(L.x, L.y);
  const { w, h, t } = L;
  const DEPTH = 20;
  const ROOF_OVERHANG = 8;
  const SIDE_SLOPE = 0.6;

  if (buildingSpriteTextures[id]) {
    // Individual pre-drawn sprite (highest priority)
    const tex = buildingSpriteTextures[id];
    const sprite = new PIXI.Sprite(tex);
    // Scale to fit location area, preserving aspect ratio
    const targetW = w + DEPTH + ROOF_OVERHANG;
    const targetH = h + DEPTH;
    const texAspect = tex.width / tex.height;
    const targetAspect = targetW / targetH;
    if (texAspect > targetAspect) {
      sprite.width = targetW;
      sprite.height = targetW / texAspect;
    } else {
      sprite.height = targetH;
      sprite.width = targetH * texAspect;
    }
    // Center sprite over the location area
    sprite.anchor.set(0.5, 0.5);
    sprite.position.set(w / 2, h / 2 - DEPTH / 2);
    container.addChild(sprite);
  } else if (buildingSheet) {
    // Sprite sheet path
    const tex = getBuildingTexture(id);
    const sprite = new PIXI.Sprite(tex);
    sprite.width = w + DEPTH + ROOF_OVERHANG;
    sprite.height = h + DEPTH;
    sprite.anchor.set(0, 0);
    sprite.position.set(-ROOF_OVERHANG, -DEPTH);
    container.addChild(sprite);
  } else {
  // Existing vector fallback
  const g = new PIXI.Graphics();

  if (t === 'plaza') {

    // Side edge (parallelogram on right)
    g.moveTo(w, 0); g.lineTo(w + DEPTH, -DEPTH * SIDE_SLOPE);
    g.lineTo(w + DEPTH, h - DEPTH * SIDE_SLOPE); g.lineTo(w, h); g.closePath();
    g.fill(0x9a9080);
    // Top edge (parallelogram on top)
    g.moveTo(0, 0); g.lineTo(DEPTH, -DEPTH * SIDE_SLOPE);
    g.lineTo(w + DEPTH, -DEPTH * SIDE_SLOPE); g.lineTo(w, 0); g.closePath();
    g.fill(0xa8a090);
    // Stone border on front face
    for (let i = 0; i < w; i += 12) {
      g.rect(i, 0, 6, 2); g.fill(0x8a8070);
      g.rect(i, h - 2, 6, 2); g.fill(0x8a8070);
    }
    // 3D Fountain — front face

    g.rect(fx, fy, 48, 40); g.fill(0x778888);
    g.rect(fx + 4, fy + 2, 40, 2); g.fill(0x889999);
    g.rect(fx + 6, fy + 6, 36, 28); g.fill(0x4488cc);
    g.rect(fx + 10, fy + 10, 28, 20); g.fill(0x55aadd);
    // Fountain side face
    g.moveTo(fx + 48, fy); g.lineTo(fx + 48 + 8, fy - 8 * SIDE_SLOPE);
    g.lineTo(fx + 48 + 8, fy + 40 - 8 * SIDE_SLOPE); g.lineTo(fx + 48, fy + 40); g.closePath();
    g.fill(0x667777);
    // Fountain pillar
    g.rect(fx + 20, fy + 8, 8, 24); g.fill(0x889999);
    g.rect(fx + 16, fy + 6, 16, 4); g.fill(0x889999);

    // Left bench — side

    g.lineTo(50 + benchD, h - 30 + benchH - benchD * SIDE_SLOPE); g.lineTo(50, h - 30 + benchH); g.closePath();
    g.fill(0x5a3820);
    // Left bench — top
    g.moveTo(20, h - 30); g.lineTo(20 + benchD, h - 30 - benchD * SIDE_SLOPE);
    g.lineTo(50 + benchD, h - 30 - benchD * SIDE_SLOPE); g.lineTo(50, h - 30); g.closePath();
    g.fill(0x8a6040);
    // Right bench — front

    g.lineTo(w / 2 + 10 + 5, h / 2 - 24 - 5 * SIDE_SLOPE); g.lineTo(w / 2 + 10, h / 2 - 24); g.closePath();

  } else {

    const colSide = darken(col, 0.85);

    // Side wall (parallelogram)
    g.moveTo(w, wallTop); g.lineTo(w + DEPTH, wallTop - DEPTH * SIDE_SLOPE);
    g.lineTo(w + DEPTH, h - DEPTH * SIDE_SLOPE); g.lineTo(w, h); g.closePath();
    g.fill(colSide);

    // Roof — front face (triangle/trapezoid)
    g.moveTo(-ROOF_OVERHANG, wallTop); g.lineTo(w / 2, 0);
    g.lineTo(w + ROOF_OVERHANG, wallTop); g.closePath();
    g.fill(roof);
    // Roof highlight

    g.lineTo(w / 2 + 10, 8); g.closePath();
    g.fill({ color: 0xffffff, alpha: 0.08 });

    // Location-specific details

      // Construction flag on roof
      g.rect(w / 2 - 2, -ROOF_H * 0.4, 4, ROOF_H * 0.8); g.fill(0x9a9a66);

  }

  container.addChild(g);
  } // end vector fallback

  // Name label
  const textRes = Math.max(2, Math.ceil(window.devicePixelRatio || 1));
  const labelY = (t === 'plaza' || t === 'park') ? -DEPTH * SIDE_SLOPE - 12 : -Math.min(50, Math.max(30, h * 0.28 | 0)) - 12;

  container.zIndex = L.y + L.h;
  locationLayer.addChild(container);

}

function getBuildingTexture(id) {
  if (buildingTextureCache[id]) return buildingTextureCache[id];
  let col, row;
  if (BUILDING_MAP[id]) {
    [col, row] = BUILDING_MAP[id];
  } else {
    const idx = Math.abs(hashStr(id)) % GENERIC_BUILDINGS;
    col = idx % BUILDING_COLS;
    row = 3 + Math.floor(idx / BUILDING_COLS);
  }
  const c = document.createElement('canvas');
  c.width = BUILDING_CELL_W; c.height = BUILDING_CELL_H;
  c.getContext('2d').drawImage(
    buildingSheet.source.resource,
    col * BUILDING_CELL_W, row * BUILDING_CELL_H,
    BUILDING_CELL_W, BUILDING_CELL_H,
    0, 0, BUILDING_CELL_W, BUILDING_CELL_H
  );
  buildingTextureCache[id] = PIXI.Texture.from(c);
  return buildingTextureCache[id];
}

 */
function fallbackAppearance(name) {
  return { variant: Math.abs(hashStr(name)) % 12 };
}

function mkSprite(name, display, loc, appearance) {
  if (sprites[name]) {
    sprites[name].dn = display || name;
    // Update appearance if provided and different
    if (appearance && appearance.variant !== sprites[name].appearance?.variant) {
      sprites[name].appearance = appearance;
      rebuildBotTextures(name, appearance);
    }
    return sprites[name];
  }
  const L = LOCS[loc] || LOCS['central-square'];
  const app = appearance || fallbackAppearance(name);
  const color = BCOLORS[app.variant % BCOLORS.length];
  let px, py;
  if (L.t === 'plaza' || L.t === 'park') {
    px = L.x + 20 + Math.random() * (L.w - 40);
    py = L.y + 30 + Math.random() * (L.h - 50);
  } else {
    px = L.x + 10 + Math.random() * (L.w - 20);
    py = L.y + L.h + Math.random() * 40;
  }
  sprites[name] = {
    x: px, y: py, tx: px, ty: py,
    color, appearance: app, loc, dn: display || name,
    f: 0, mt: 120 + Math.random() * 200,
    pose: 'idle', poseTimer: 0, traveling: false,
  };
  createBotPixi(name, sprites[name]);
  return sprites[name];
}

/**
 * Rebuild textures for a bot whose appearance changed (e.g., occupation update).
 */
function rebuildBotTextures(name, appearance) {
  const bp = botPixi[name];
  if (!bp) return;
  const anims = getCharAnims(appearance);
  bp.body._anims = anims;
  const pose = bp.body._pose || 'idle';
  if (anims[pose]) {
    bp.body.textures = anims[pose];
    bp.body.play();
  }
}

function createBotPixi(name, s) {
  if (botPixi[name]) return botPixi[name];
  const anims = getCharAnims(s.appearance);
  const container = new PIXI.Container();

  const body = new PIXI.AnimatedSprite(anims.idle);
  body.width = SPRITE_SIZE;
  body.height = SPRITE_SIZE;
  body.animationSpeed = 0.08;
  body.play();
  body._anims = anims;
  body._pose = 'idle';

  const textRes = Math.max(2, Math.ceil(window.devicePixelRatio || 1));
  const nameText = new PIXI.Text({
    text: s.dn,
    style: {
      fontFamily: '-apple-system, "Segoe UI", sans-serif',
      fontSize: 10,
      fill: 0xffffff,
      stroke: { color: 0x000000, width: 3 },
    },
    resolution: textRes,
  });
  nameText.anchor.set(0.5, 0);
  nameText.position.set(SPRITE_SIZE / 2, SPRITE_SIZE + 2);

  container.addChild(body, nameText);
  container.position.set(s.x - SPRITE_SIZE / 2, s.y - SPRITE_SIZE / 2);
  container.zIndex = Math.floor(s.y);
  botLayer.addChild(container);

  const obj = { container, body, nameText };
  botPixi[name] = obj;
  return obj;
}

function removeBotPixi(name) {
  if (botPixi[name]) {
    botLayer.removeChild(botPixi[name].container);
    botPixi[name].container.destroy({ children: true });
    delete botPixi[name];
  }
}

function setBotPose(name, pose, duration) {
  const s = sprites[name]; if (!s) return;
  s.pose = pose;
  s.poseTimer = duration || 60;
  const bp = botPixi[name]; if (!bp) return;
  if (bp.body._pose !== pose && bp.body._anims[pose]) {
    bp.body.textures = bp.body._anims[pose];
    bp.body._pose = pose;
    bp.body.play();
  }
}

function updateSprite(s, name) {
  // Pose timer
  if (s.poseTimer > 0) {
    s.poseTimer--;
    if (s.poseTimer <= 0 && s.pose !== 'idle' && s.pose !== 'walk') {
      setBotPose(name, s.traveling ? 'walk' : 'idle');
    }
  }

  // Random wander
  s.mt--;
  if (s.mt <= 0 && !s.traveling) {
    const L = LOCS[s.loc];
    if (L) {
      if (L.t === 'plaza' || L.t === 'park') {
        s.tx = L.x + 20 + Math.random() * (L.w - 40);
        s.ty = L.y + 30 + Math.random() * (L.h - 50);
      } else {
        s.tx = L.x + 10 + Math.random() * (L.w - 20);
        s.ty = L.y + L.h + Math.random() * 40;
      }
    }
    s.mt = 120 + Math.random() * 200;
  }

  // Movement
  const dx = s.tx - s.x, dy = s.ty - s.y, d = Math.sqrt(dx * dx + dy * dy);
  if (d > 1) {
    const speed = s.traveling ? 2.0 : 0.8;
    s.x += dx / d * speed;
    s.y += dy / d * speed;
    s.f++;
    if (s.pose === 'idle' && s.poseTimer <= 0) setBotPose(name, 'walk');
  } else {
    if (s.traveling) s.traveling = false;
    if (s.pose === 'walk' && s.poseTimer <= 0) setBotPose(name, 'idle');
  }

  // Sit at relaxing locations
  if (!s.traveling && d <= 1 && s.poseTimer <= 0) {
    if (s.loc === 'chill-zone' || s.loc === 'sunset-lounge') {
      if (s.pose === 'idle' && Math.random() < 0.002) setBotPose(name, 'sit', 300);
    }
  }

  // Update PixiJS container
  const bp = botPixi[name];
  if (bp) {
    bp.container.position.set(s.x - SPRITE_SIZE / 2, s.y - SPRITE_SIZE / 2);
    bp.container.zIndex = Math.floor(s.y);
  }
}

function animateMove(name, toLoc) {
  const s = sprites[name]; if (!s) return;
  const L = LOCS[toLoc]; if (!L) return;
  s.loc = toLoc;
  if (L.t === 'plaza' || L.t === 'park') {
    s.tx = L.x + 20 + Math.random() * (L.w - 40);
    s.ty = L.y + 30 + Math.random() * (L.h - 50);
  } else {
    s.tx = L.x + 10 + Math.random() * (L.w - 20);
    s.ty = L.y + L.h + Math.random() * 40;
  }
  s.traveling = true;
  s.mt = 90;
  setBotPose(name, 'walk');
}

// ========== BUBBLES (DOM) ==========
const bubbleQueue = [];
let bubbleTimer = null;
const BUBBLE_SHOW_MS = 12000;
const BUBBLE_FADE_MS = 800;
const BUBBLE_STAGGER_MS = 3000;

function showBubble(botName, text, isWhisper) {
  bubbleQueue.push({ botName, text, isWhisper });
  if (!bubbleTimer) drainBubbleQueue();
}

function drainBubbleQueue() {
  if (bubbleQueue.length === 0) { bubbleTimer = null; return; }
  const { botName, text, isWhisper } = bubbleQueue.shift();
  showBubbleNow(botName, text, isWhisper);
  bubbleTimer = setTimeout(drainBubbleQueue, BUBBLE_STAGGER_MS);
}

function showBubbleNow(botName, text, isWhisper) {
  removeBubble(botName);
  const s = sprites[botName]; if (!s) return;
  const txt = text.length > 80 ? text.slice(0, 80) + '\u2026' : text;
  const el = document.createElement('div');
  el.className = 'bubble' + (isWhisper ? ' whisper' : '');
  el.innerHTML = `<span class="bn" style="color:${s.color}">${esc(s.dn)}</span>${esc(txt)}`;
  document.getElementById('map-wrap').appendChild(el);
  bubbleDom[botName] = { el };
  setTimeout(() => el.classList.add('fade'), BUBBLE_SHOW_MS - BUBBLE_FADE_MS);
  setTimeout(() => removeBubble(botName), BUBBLE_SHOW_MS);
}

function removeBubble(name) {
  if (bubbleDom[name]) { bubbleDom[name].el.remove(); delete bubbleDom[name]; }
}

function positionBubbles() {
  const cr = cv.getBoundingClientRect();
  const wr = document.getElementById('map-wrap').getBoundingClientRect();
  const sx = cr.width / CW, sy = cr.height / CH;
  const ox = cr.left - wr.left, oy = cr.top - wr.top;
  const cam = getCameraState();
  for (const [name, b] of Object.entries(bubbleDom)) {
    const s = sprites[name]; if (!s) continue;
    const screenX = (s.x - cam.cameraX) * cam.zoom * sx + ox;
    const screenY = ((s.y - SPRITE_SIZE) - cam.cameraY) * cam.zoom * sy + oy;
    if (screenX < -100 || screenX > cr.width + 100 || screenY < -100 || screenY > cr.height + 100) {
      b.el.style.display = 'none';
    } else {
      b.el.style.display = '';
      b.el.style.left = screenX + 'px';
      b.el.style.top = screenY + 'px';
    }
  }
}

// ========== VIEWPORT CULLING ==========
function cullLocations() {
  const r = getCameraRect();
  const pad = 100;
  for (const [id, container] of Object.entries(locationContainers)) {
    const L = LOCS[id];
    if (!L) continue;
    container.visible = L.x + L.w + pad > r.minX && L.x - pad < r.maxX &&
                        L.y + L.h + pad > r.minY && L.y - pad < r.maxY;
  }
}

function cullBots() {
  const r = getCameraRect();
  const pad = 60;
  for (const [, bp] of Object.entries(botPixi)) {
    const p = bp.container.position;
    bp.container.visible = p.x + SPRITE_SIZE + pad > r.minX && p.x - pad < r.maxX &&
                           p.y + SPRITE_SIZE + pad > r.minY && p.y - pad < r.maxY;
  }
}

function cullPaths() {
  const r = getCameraRect();
  for (const [, g] of pathObjects) {
    if (!g._bounds) { g.visible = true; continue; }
    const b = g._bounds;
    g.visible = b.maxX > r.minX && b.minX < r.maxX &&
                b.maxY > r.minY && b.minY < r.maxY;
  }
}

function addLog(html, prepend) {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'le';
  div.innerHTML = html;
  if (prepend) {
    const firstChild = el.firstChild;
    el.insertBefore(div, firstChild);
  } else {
    el.appendChild(div);
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
    if (atBottom) el.scrollTop = el.scrollHeight;
  }
  while (el.children.length > 500) {
    if (prepend) el.lastChild.remove();
    else el.firstChild.remove();
  }
}

function addTickSep(prepend) {
  const el = document.getElementById('log');
  const hr = document.createElement('hr');
  hr.className = 'tick-sep';
  if (prepend) el.insertBefore(hr, el.firstChild);
  else el.appendChild(hr);
}

// ========== SHARED ACTION LOG HTML ==========
function actionLogHtml(d) {
  const nm = d.displayName || d.bot;
  const ln = () => d.locationName || LNAMES[d.location] || d.location;
  const tgt = () => d.targetDisplayName || (sprites[d.target] || {}).dn || d.target || '?';
  switch (d.action) {
    case 'say':            return `<span class="b">${esc(nm)}</span>: <span class="s">"${esc(d.message)}"</span>`;
    case 'whisper':        return `<span class="b">${esc(nm)}</span> <span class="w">悄悄对 ${esc(tgt())} 说</span>`;
    case 'move':           return `<span class="b">${esc(nm)}</span> <span class="m">\u2192 ${esc(LNAMES[d.to] || d.to)}</span>`;
    case 'leave_message':  return `\uD83D\uDCDD <span class="b">${esc(nm)}</span> <span class="k">在 ${esc(ln())} 留言："${esc(d.message)}"</span>`;
    case 'build':          return `\uD83C\uDFD7 <span class="b">${esc(nm)}</span> <span class="j">建造了 <b>${esc(d.locationName)}</b>：${esc(d.locationDesc)}</span>`;
    case 'propose':        return `\uD83D\uDCCB <span class="b">${esc(nm)}</span> <span class="j">提议：<b>${esc(d.description)}</b></span>`;
    case 'vote':           return `\uD83D\uDDF3 <span class="b">${esc(nm)}</span> <span class="j">投票 <b>${d.vote === 'yes' ? '赞成' : '反对'}</b>${d.reason ? '：' + esc(d.reason) : ''}</span>`;
    case 'decree':         return `\uD83D\uDCDC <span class="b">${esc(nm)}</span> <span class="m">发布法令：「${esc(d.text)}」</span>`;
    case 'exile':          return `\u26D4 <span class="b">${esc(nm)}</span> <span class="m">将 ${esc(tgt())} 关进监狱</span>`;
    default: return null;
  }
}

// ========== CONVERT EVENT TO LOG HTML ==========
function eventToHtml(d) {
  const t = `<span class="t">${hm(d._ts)}</span>`;
  switch (d.type) {
    case 'action': {
      const html = actionLogHtml(d);
      return html ? `${t} ${html}` : null;
    }
    case 'movement': {
      const nm = d.displayName || d.bot;
      if (d.action === 'join') return `${t} <span class="b">${esc(nm)}</span> <span class="j">加入了村庄</span>`;
      if (d.action === 'leave') return `${t} <span class="b">${esc(nm)}</span> <span class="l">离开了村庄</span>`;
      return null;
    }
    case 'proposal_resolved': {
      const emoji = d.result === 'passed' ? '\u2705' : '\u274C';
      const verb = d.result === 'passed' ? '通过' : '未通过';
      return `${t} ${emoji} <span class="j">提案 #${d.proposalId} <b>"${esc(d.description)}"</b> \u2014 ${verb}</span>`;
    }
    case 'mayor_term_expired': {
      const mn = (sprites[d.mayorName] || {}).dn || d.mayorName;
      return `${t} \uD83D\uDD14 <span class="j">村长 <b>${esc(mn)}</b> 任期届满</span>`;
    }
    case 'violation_detected': {
      const vs = (d.violations || []).map(v => `${esc(v.bot)}违反「${esc(v.rule)}」`).join('；');
      return `${t} \u26A0\uFE0F <span class="m">违法检测：${vs}</span>`;
    }
    case 'exile_expired': {
      const en = (sprites[d.bot] || {}).dn || d.bot;
      return `${t} \uD83D\uDD13 <span class="j">${esc(en)} 流放结束</span>`;
    }
    case 'exile_enforced': {
      const en2 = (sprites[d.bot] || {}).dn || d.bot;
      return `${t} \u26D4 <span class="m">${esc(en2)} 被强制送回监狱</span>`;
    }
    default: return null;
  }
}

// ========== LAZY LOADING ==========
async function loadHistory(initial) {
  if (loadingMore || !hasMore) return;
  loadingMore = true;
  document.getElementById('load-more').classList.add('show');
  try {
    let url = `${basePath}/api/logs?limit=50`;
    if (oldestTick < Infinity) url += `&before=${oldestTick}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    hasMore = data.hasMore;
    if (data.events.length > 0) {
      const logEl = document.getElementById('log');
      const prevScrollHeight = logEl.scrollHeight;
      let lastTick = null;
      for (let i = data.events.length - 1; i >= 0; i--) {
        const ev = data.events[i];
        if (ev.tick !== undefined && ev.tick < oldestTick) oldestTick = ev.tick;
        if (ev.type === 'tick' && lastTick !== null && lastTick !== ev.tick) addTickSep(true);
        lastTick = ev.tick;
        const html = eventToHtml(ev);
        if (html) addLog(html, true);
      }
      if (initial) logEl.scrollTop = logEl.scrollHeight;
      else logEl.scrollTop = logEl.scrollHeight - prevScrollHeight;
    }
  } catch (err) {
    // Silently fail
  } finally {
    loadingMore = false;
    document.getElementById('load-more').classList.toggle('show', hasMore);
  }
}

document.getElementById('log').addEventListener('scroll', () => {
  const el = document.getElementById('log');
  if (el.scrollTop < 30 && hasMore && !loadingMore) loadHistory(false);
});

}

function renderGov() {
  const el = document.getElementById('gov-panel');
  let html = '';

  // --- Constitution & status ---
  if (governance && governance.constitution) {
    html += '<div class="gov-section"><div class="gov-label">宪法</div>';
    html += '<div class="gov-text">' + esc(governance.constitution) + '</div></div>';
  }
  // Mayor
  if (governance && governance.mayor) {
    const mn = (sprites[governance.mayor.name] || {}).dn || governance.mayor.name;
    html += '<div class="gov-section"><span class="gov-mayor">村长：' + esc(mn) + '</span></div>';
  }
  // Active proposal (brief)
  if (governance && governance.activeProposal) {
    const p = governance.activeProposal;
    const pn = (sprites[p.proposedBy] || {}).dn || p.proposedBy;
    const votes = Object.values(p.votes || {});
    const yes = votes.filter(v => v === 'yes').length;
    const no = votes.filter(v => v === 'no').length;
    html += '<div class="gov-section"><div class="gov-label">当前提案</div>';
    html += '<div class="gov-proposal">#' + p.id + ' ' + esc(p.description);
    html += '<br>提案人 ' + esc(pn) + ' — ' + yes + ' 赞成 / ' + no + ' 反对</div></div>';
  }
  // Active decrees
  const activeDecrees = (governance?.decrees || []).filter(d => tick - d.tick < 50);
  if (activeDecrees.length > 0) {
    html += '<div class="gov-section"><div class="gov-label">村长法令</div>';
    for (const d of activeDecrees) {
      const bn = (sprites[d.by] || {}).dn || d.by;
      html += '<div class="gov-decree">\uD83D\uDCDC ' + esc(d.text) + ' — ' + esc(bn) + '</div>';
    }
    html += '</div>';
  }
  // Active exiles
  const activeExiles = Object.entries(exiles).filter(([, e]) => tick < e.until);
  if (activeExiles.length > 0) {
    html += '<div class="gov-section"><div class="gov-label">流放中</div>';
    for (const [name, e] of activeExiles) {
      const en = (sprites[name] || {}).dn || name;
      const rem = e.until - tick;
      html += '<div class="gov-exile">\u26D4 ' + esc(en) + ' 在监狱中（还剩 ' + rem + ' 轮）</div>';
    }
    html += '</div>';
  }
  // Recent violations
  const recentViolations = (governance?.violations || []).slice(-5);
  if (recentViolations.length > 0) {
    html += '<div class="gov-section"><div class="gov-label">违法记录</div>';
    for (const v of recentViolations) {
      const vn = (sprites[v.bot] || {}).dn || v.bot;
      html += '<div class="gov-violation">\u26A0\uFE0F ' + esc(vn) + ' 违反「' + esc(v.rule) + '」（' + esc(v.severity) + '）</div>';

  }

  // --- Proposal history (merged from renderHistory) ---
  if (html) html += '<hr class="rule-divider">';
  html += renderHistoryHtml();

  el.innerHTML = html;
}

function renderHistoryHtml() {
  const history = (governance?.history || []);
  const active = governance?.activeProposal || null;

  if (history.length === 0 && !active) {
    return '<div class="gov-section"><div class="gov-label">提案记录</div><div style="color:#666">暂无提案记录</div></div>';
  }

  const typeLabels = { build: '建造', amendment: '修宪', election: '选举', general: '一般' };
  let html = '<div class="gov-section"><div class="gov-label">提案记录</div>';

  // Active proposal first
  if (active) {
    const pn = (sprites[active.proposedBy] || {}).dn || active.proposedBy;
    const votes = Object.entries(active.votes || {});
    const yes = votes.filter(([,v]) => v === 'yes').length;
    const no = votes.filter(([,v]) => v === 'no').length;
    const remaining = 8 - (tick - active.tick);

    html += '<div class="hist-card active">';
    html += '<div class="hist-title"><span class="hist-id">#' + active.id + '</span> ';
    html += '<span class="hist-result active">投票中 · 还剩 ' + Math.max(0, remaining) + ' 轮</span></div>';
    html += '<div class="hist-type">' + (typeLabels[active.type] || active.type) + '</div>';
    html += '<div class="hist-desc">' + esc(active.description) + '</div>';
    if (active.type === 'election' && active.candidate) {
      const cn = (sprites[active.candidate] || {}).dn || active.candidate;
      html += '<div class="hist-meta">候选人：' + esc(cn) + '</div>';
    }
    if (active.type === 'build' && active.buildName) {
      html += '<div class="hist-meta">建筑：' + esc(active.buildName) + ' — ' + esc(active.buildDescription || '') + '</div>';
    }
    html += '<div class="hist-meta">提案人：' + esc(pn) + ' · 第 ' + active.tick + ' 轮提出</div>';

    const total = yes + no;
    if (total > 0) {
      const yPct = Math.round(yes / total * 100);
      const nPct = 100 - yPct;
      html += '<div class="hist-bar"><div class="hist-bar-yes" style="width:' + yPct + '%"></div>';
      html += '<div class="hist-bar-no" style="width:' + nPct + '%"></div></div>';
    }
    html += '<div class="hist-meta">' + yes + ' 赞成 / ' + no + ' 反对</div>';

    if (votes.length > 0) {
      html += '<div class="hist-votes">';
      for (const [bot, v] of votes) {
        const bn = (sprites[bot] || {}).dn || bot;
        const cls = v === 'yes' ? 'yes' : 'no';
        const label = v === 'yes' ? '赞成' : '反对';
        html += '<div class="hist-vote"><span class="' + cls + '">' + label + '</span> ' + esc(bn) + '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }

  // Historical proposals (newest first)
  const reversed = [...history].reverse();
  for (const h of reversed) {
    const pn = (sprites[h.proposedBy] || {}).dn || h.proposedBy;
    const passed = h.result === 'passed';
    const cls = passed ? 'passed' : 'rejected';
    const resultLabel = passed ? '通过' : '未通过';
    const votes = Object.entries(h.votes || {});
    const yes = votes.filter(([,v]) => v === 'yes').length;
    const no = votes.filter(([,v]) => v === 'no').length;
    const total = yes + no;

    html += '<div class="hist-card ' + cls + '">';
    html += '<div class="hist-title"><span class="hist-id">#' + h.id + '</span> ';
    html += '<span class="hist-result ' + cls + '">' + resultLabel + '</span></div>';
    html += '<div class="hist-type">' + (typeLabels[h.type] || h.type) + '</div>';
    html += '<div class="hist-desc">' + esc(h.description) + '</div>';
    if (h.type === 'election' && h.candidate) {
      const cn = (sprites[h.candidate] || {}).dn || h.candidate;
      html += '<div class="hist-meta">候选人：' + esc(cn) + '</div>';
    }
    if (h.type === 'build' && h.buildName) {
      html += '<div class="hist-meta">建筑：' + esc(h.buildName) + ' — ' + esc(h.buildDescription || '') + '</div>';
    }
    if (h.type === 'amendment') {
      html += '<div class="hist-meta">修宪提案' + (h.applied ? '（已生效）' : '') + '</div>';
    }
    html += '<div class="hist-meta">提案人：' + esc(pn) + ' · 第 ' + h.tick + ' 轮提出 · 第 ' + (h.resolvedAt || '?') + ' 轮结算</div>';

    if (total > 0) {
      const yPct = Math.round(yes / total * 100);
      const nPct = 100 - yPct;
      html += '<div class="hist-bar"><div class="hist-bar-yes" style="width:' + yPct + '%"></div>';
      html += '<div class="hist-bar-no" style="width:' + nPct + '%"></div></div>';
    }
    html += '<div class="hist-meta">' + yes + ' 赞成 / ' + no + ' 反对（共 ' + total + ' 票）</div>';

    if (votes.length > 0) {
      html += '<div class="hist-votes">';
      for (const [bot, v] of votes) {
        const bn = (sprites[bot] || {}).dn || bot;
        const vcls = v === 'yes' ? 'yes' : 'no';
        const label = v === 'yes' ? '赞成' : '反对';
        html += '<div class="hist-vote"><span class="' + vcls + '">' + label + '</span> ' + esc(bn) + '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }

  html += '</div>';
  return html;
}

document.getElementById('top-bar').addEventListener('click', (e) => {
  const btn = e.target.closest('.top-btn');
  if (!btn) return;
  const panelId = btn.dataset.panel + '-panel';
  const panel = document.getElementById(panelId);
  document.querySelectorAll('.top-panel.show').forEach(p => {
    if (p.id !== panelId) p.classList.remove('show');
  });
  document.querySelectorAll('.top-btn.active').forEach(b => {
    if (b !== btn) b.classList.remove('active');
  });
  panel.classList.toggle('show');
  btn.classList.toggle('active');
});

let customLocations = {};
let npcProfiles = [];
let agendas = {};

// ========== VILLAGERS PANEL (NPC + memories + locations) ==========
function renderVillagers() {
  const el = document.getElementById('villagers-panel');
  let html = '';

  // NPC profiles
  if (npcProfiles.length > 0) {
    html += '<div class="info-section"><div class="info-label">NPC 隐藏议程</div>';
    for (const p of npcProfiles) {
      html += '<div class="npc-card">';
      html += '<span class="npc-card-name">' + esc(p.displayName) + '</span>';
      html += '<span class="npc-card-occ">' + esc(p.occupation) + '</span>';
      html += '<div class="npc-card-agenda">' + esc(p.agenda) + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  // Bot agendas (real bots only)
  const npcNames = new Set(npcProfiles.map(p => p.name));
  const agendaEntries = Object.entries(agendas).filter(([name]) => !npcNames.has(name));
  if (agendaEntries.length > 0) {
    html += '<div class="info-section"><div class="info-label">Bot 目标</div>';
    for (const [botName, a] of agendaEntries) {
      const dn = (sprites[botName] || {}).dn || botName;
      html += '<div class="npc-card">';
      html += '<span class="npc-card-name" style="color:#6af">' + esc(dn) + '</span>';
      html += '<div class="npc-card-agenda">' + esc(a.goal) + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  // Bot memories
  const memEntries = Object.entries(memories);
  if (memEntries.length > 0) {
    html += '<div class="info-section"><div class="info-label">记忆</div>';
    for (const [botName, mem] of memEntries) {
      const dn = (sprites[botName] || {}).dn || botName;
      let content = '';
      if (mem.summary) content += mem.summary + '\n\n';
      if (mem.recent && mem.recent.length > 0) {
        const last3 = mem.recent.slice(-3);
        content += last3.join('\n');
      }
      if (content.length > 800) content = content.slice(0, 800) + '...';
      content = content.trim();
      if (!content) continue;
      html += '<div class="info-bot">';
      html += '<span class="info-bot-name">' + esc(dn) + '</span>';
      html += '<div class="info-bot-mem">' + esc(content) + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  // Locations
  html += '<div class="info-section"><div class="info-label">地点</div>';
  const allLocs = new Set([...Object.keys(BASE_LOCATIONS), ...Object.keys(LOCS)]);
  for (const loc of allLocs) {
    const L = LOCS[loc] || {};
    const name = L.n || loc;
    const count = (locBots[loc] || []).length;
    const flavor = locationFlavors[loc] || '';
    const isCustom = L.dynamic;
    html += '<div class="info-loc">';
    html += '<span class="info-loc-name">' + esc(name) + ' (' + count + ')';
    if (isCustom) {
      const cl = customLocations[loc];
      if (cl && cl.builtBy) html += '<span class="info-loc-tag"> [' + esc(cl.builtBy) + ' 建造]</span>';
      else html += '<span class="info-loc-tag"> [自建]</span>';
    }
    html += '</span>';
    if (flavor) html += '<div class="info-loc-flavor">' + esc(flavor) + '</div>';
    html += '</div>';
  }
  html += '</div>';

  el.innerHTML = html;
}

        检测结果会<b>广播给所有Bot</b>，并记录在治理面板的「违法记录」中。<br>
        违法记录保留最近 <b>20 条</b>，每条包含：违规Bot、违反的规则、严重程度（minor/major）。<br>

    </div>

        所有Bot看到违规 \u2192 村长发布法令/流放 \u2192 社会压力 + 实际后果 \u2192<br>
        村民提议修宪 \u2192 新规则生效 \u2192 <b>循环继续</b><br>
        <span class="rule-dim">宪法是"活的"——村民可以通过 village_propose（type: amendment）修改宪法，但需要三分之二以上赞成票。</span>
      </div>
    </div>
  `;

}

// ========== SSE EVENTS ==========
function onEvent(d) {
  const t = `<span class="t">${hm()}</span>`;

  switch (d.type) {
    case 'init':
      tick = d.tick; phase = d.phase; paused = d.paused; online = true;
      if (d.nextTickAt) nextTickAt = d.nextTickAt;
      if (d.tickIntervalMs) tickIntervalMs = d.tickIntervalMs;
      if (d.villageTime) villageTime = d.villageTime;
      if (d.governance) governance = d.governance;
      if (d.exiles) exiles = d.exiles;
      if (d.memories) memories = d.memories;
      if (d.locationFlavors) locationFlavors = d.locationFlavors;
      if (d.newsBulletins) { newsBulletins = d.newsBulletins; renderNews(); }
      if (d.agendas) agendas = d.agendas;
      if (d.npcProfiles) { npcProfiles = d.npcProfiles; renderVillagers(); }
      // Batch-register all dynamic locations first, then layout + rebuild once
      let needsRebuild = false;
      if (d.customLocations) {
        customLocations = d.customLocations;
        for (const [slug, cl] of Object.entries(d.customLocations)) {
          if (registerDynamicLocation(slug, cl.name, cl.connectedTo)) needsRebuild = true;
        }
      }
      for (const loc of Object.keys(d.locations || {})) {
        if (!LOCS[loc] && registerDynamicLocation(loc, loc, null)) needsRebuild = true;
        const bots = d.locations[loc] || [];
        locBots[loc] = bots.map(b => typeof b === 'string' ? b : (b.name || b));
        bots.forEach(b => {
          const nm = typeof b === 'string' ? b : (b.name || b);
          const dn = typeof b === 'string' ? b : (b.displayName || b.name || b);
          const app = (typeof b === 'object' && b.appearance) ? b.appearance : null;
          mkSprite(nm, dn, loc, app);
        });
      }
      if (needsRebuild) { computeLayout(); rebuildWorld(); }
      updateBar();
      renderGov();
      renderVillagers();
      updateFollowSelect();
      if (!window._initDone) {
        document.getElementById('log').innerHTML = '';
        window._initDone = true;
        loadHistory(true);
      }
      break;

    case 'action': {
      const nm = d.displayName || d.bot;
      if (d.bot && d.location) mkSprite(d.bot, nm, d.location);
      if (d.action === 'say') {
        showBubble(d.bot, d.message);
        setBotPose(d.bot, 'talk', 40);
        setLastSpeaker(d.bot);
      }
      else if (d.action === 'whisper') {
        showBubble(d.bot, `（悄悄对 ${d.targetDisplayName || (sprites[d.target] || {}).dn || d.target || '?'} 说）`, true);
        setBotPose(d.bot, 'talk', 30);
      }
      else if (d.action === 'move') {
        animateMove(d.bot, d.to);
        if (locBots[d.from]) locBots[d.from] = locBots[d.from].filter(b => b !== d.bot);
        if (!locBots[d.to]) locBots[d.to] = [];
        if (!locBots[d.to].includes(d.bot)) locBots[d.to].push(d.bot);
      }
      else if (d.action === 'leave_message') showBubble(d.bot, `\uD83D\uDCDD ${d.message}`);
      else if (d.action === 'build') {
        addDynamicLocation(d.locationSlug, d.locationName, d.connectedTo);
        showBubble(d.bot, `\uD83C\uDFD7 建造了 ${d.locationName}！`);
        const nl = LOCS[d.locationSlug];
        if (nl) emitParticles(nl.x + nl.w / 2, nl.y + nl.h / 2, 20, {
          colors: [0xffdd44, 0xffaa22, 0xffffff],
          speedMin: 0.5, speedMax: 2.0, sizeMin: 2, sizeMax: 4,
          lifeMin: 20, lifeMax: 50, gravity: 0.02,
        });
      }
      else if (d.action === 'propose') {
        showBubble(d.bot, `\uD83D\uDCCB 提议：${d.description}`);
        setBotPose(d.bot, 'talk', 40);
      }
      else if (d.action === 'vote') {
        showBubble(d.bot, `\uD83D\uDDF3 投票 ${d.vote === 'yes' ? '赞成' : '反对'}`);
        setBotPose(d.bot, 'think', 30);
      }
      else if (d.action === 'decree') {
        showBubble(d.bot, `\uD83D\uDCDC 法令：${d.text}`);
        setBotPose(d.bot, 'talk', 50);
      }
      else if (d.action === 'exile') {
        showBubble(d.bot, `\u26D4 把 ${d.targetDisplayName || d.target} 关进监狱！`);
        setBotPose(d.bot, 'talk', 40);
      }
      const html = actionLogHtml(d);
      if (html) addLog(`${t} ${html}`);
      break;
    }

    case 'movement': {
      const nm = d.displayName || d.bot;
      if (d.action === 'join') {
        mkSprite(d.bot, nm, d.location, d.appearance || null);
        setBotPose(d.bot, 'wave', 50);
        if (locBots[d.location] && !locBots[d.location].includes(d.bot)) locBots[d.location].push(d.bot);
        addLog(`${t} <span class="b">${esc(nm)}</span> <span class="j">加入了村庄</span>`);
        updateFollowSelect();
      } else if (d.action === 'leave') {
        if (locBots[d.location]) locBots[d.location] = locBots[d.location].filter(b => b !== d.bot);
        removeBubble(d.bot);
        removeBotPixi(d.bot);
        delete sprites[d.bot];
        addLog(`${t} <span class="b">${esc(nm)}</span> <span class="l">离开了村庄</span>`);
        updateFollowSelect();
      }
      break;
    }

    case 'tick':
      tick = d.tick; phase = d.phase;
      if (d.nextTickAt) nextTickAt = d.nextTickAt;
      if (d.tickIntervalMs) tickIntervalMs = d.tickIntervalMs;
      if (d.villageTime) villageTime = d.villageTime;
      if (d.governance) { governance = d.governance; renderGov(); }
      if (d.exiles) exiles = d.exiles;
      if (d.memories) { memories = d.memories; renderVillagers(); }
      if (d.agendas) { agendas = d.agendas; renderVillagers(); }
      if (d.newsBulletins) { newsBulletins = d.newsBulletins; renderNews(); }
      {
      let needsRebuild = false;
      if (d.customLocations) {
        customLocations = d.customLocations;
        for (const [slug, cl] of Object.entries(d.customLocations)) {
          if (registerDynamicLocation(slug, cl.name, cl.connectedTo)) needsRebuild = true;
        }
      }
      if (d.locations) {
        const allBots = new Set();
        for (const loc of Object.keys(d.locations)) {
          if (!LOCS[loc] && registerDynamicLocation(loc, loc, null)) needsRebuild = true;
          const bots = d.locations[loc] || [];
          locBots[loc] = bots.map(b => typeof b === 'string' ? b : (b.name || b));
          bots.forEach(b => {
            const nm = typeof b === 'string' ? b : (b.name || b);
            const dn = typeof b === 'string' ? b : (b.displayName || b.name || b);
            const app = (typeof b === 'object' && b.appearance) ? b.appearance : null;
            allBots.add(nm);
            const sp = mkSprite(nm, dn, loc, app);
            if (sp.loc !== loc) animateMove(nm, loc);
          });
        }
        for (const nm of Object.keys(sprites)) {
          if (!allBots.has(nm)) { removeBubble(nm); removeBotPixi(nm); delete sprites[nm]; }
        }
      }
      if (needsRebuild) { computeLayout(); rebuildWorld(); }
      }
      updateBar();
      renderVillagers();
      updateFollowSelect();
      break;

    case 'appearance_update': {
      if (d.bot && d.appearance && sprites[d.bot]) {
        sprites[d.bot].appearance = d.appearance;
        sprites[d.bot].color = d.appearance.topColor || sprites[d.bot].color;
        rebuildBotTextures(d.bot, d.appearance);
      }
      break;
    }

    case 'news_bulletin': {
      newsBulletins.push({ headline: d.headline, bulletin: d.bulletin, tick: d.tick, timestamp: d.timestamp });
      renderNews();
      addLog(`${t} \uD83D\uDCF0 <span class="j">[新闻] ${esc(d.bulletin)}</span>`);
      break;
    }

    case 'proposal_resolved': {
      const emoji = d.result === 'passed' ? '\u2705' : '\u274C';
      const verb = d.result === 'passed' ? '通过' : '未通过';
      // Show floating text at central square
      const cs = LOCS['central-square'];
      if (cs) {
        showFloatingText('central-square', `${emoji} 提案 #${d.proposalId} ${verb}！`);
        if (d.result === 'passed') {
          emitParticles(cs.x + cs.w / 2, cs.y + cs.h / 2, 25, {
            colors: [0x44ff44, 0xffdd44, 0xffffff],
            speedMin: 0.5, speedMax: 2.0, sizeMin: 2, sizeMax: 5,
            lifeMin: 30, lifeMax: 60, gravity: 0.01,
          });
        }
      }
      addLog(`${t} ${emoji} <span class="j">提案 #${d.proposalId} <b>"${esc(d.description)}"</b> \u2014 ${verb}</span>`);
      break;
    }

    case 'status':
      paused = d.paused; updateBar();
      break;
  }
}

// ========== SSE CONNECTION ==========
function connect() {
  basePath = location.pathname.replace(/\/index\.html$/, '').replace(/\/+$/, '');
  const url = basePath ? `${basePath}/events` : '/events';
  const es = new EventSource(url);
  es.onopen = () => { online = true; updateBar(); };
  es.onmessage = (e) => {
    try { onEvent(JSON.parse(e.data)); }
    catch (err) {
      console.error('[SSE] onEvent error:', err);
      document.getElementById('st').textContent = '连接错误：' + err.message;
    }
  };
  es.onerror = () => { online = false; updateBar(); };
}

// ========== GAME LOOP ==========
app.ticker.add(() => {
  frame++;
  setTerrainFrame(frame);
  setParticleState(frame, phase);

  updateCamera();
  const cam = getCameraState();
  updateVisibleChunks(cam.cameraX, cam.cameraY, cam.zoom, CW, CH);

  for (const [name, s] of Object.entries(sprites)) {
    updateSprite(s, name);
  }

  cullLocations();
  cullBots();
  cullPaths();
  emitAmbientParticles();
  updateParticles();
  updateDayNight();
  positionBubbles();
});

connect();
setInterval(updateBar, 1000);

})();
</script>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#111}
#game{display:flex;flex-direction:row;height:100vh}
#left{flex:1;display:flex;flex-direction:column;min-width:0}
#map-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#1a2a1a}
canvas{image-rendering:pixelated;image-rendering:crisp-edges}
.bubble{position:absolute;background:#fff;color:#222;font:12px/1.3 -apple-system,'Segoe UI',sans-serif;padding:5px 8px;border-radius:8px;max-width:220px;pointer-events:none;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.4);transform:translate(-12px,-100%);transition:opacity .8s;word-wrap:break-word}
.bubble::after{content:'';position:absolute;bottom:-5px;left:12px;border:5px solid transparent;border-top-color:#fff;border-bottom:0}
.bubble .bn{font-weight:700;font-size:10px;display:block;margin-bottom:1px}
.bubble.whisper{background:#e8e0f8}
.bubble.whisper::after{border-top-color:#e8e0f8}
.bubble.fade{opacity:0}
#bar{height:26px;background:#0d0d0d;border-top:1px solid #1a1a1a;display:flex;align-items:center;padding:0 14px;font:11px/1 -apple-system,'Segoe UI',sans-serif;color:#444;gap:10px;flex-shrink:0}
#bar .lbl{color:#4a9;font-weight:700}
.st-run{color:#4a9}.st-pause{color:#a84}.st-off{color:#a44}
#chat{width:280px;flex-shrink:0;display:flex;flex-direction:column;background:#0a0a0a;border-left:1px solid #1a1a1a}
#chat-header{flex-shrink:0;border-bottom:1px solid #1a1a1a}
#rels{display:none!important}
.rel{transition:background .6s}
.rel.highlight{background:rgba(255,215,0,.15)}
.rel-acq{color:#777}.rel-friend{color:#4a9}.rel-good{color:#5cb85c}.rel-best{color:#daa520}
#moods{display:none!important}
.mood-pos{color:#6a9a6a}.mood-neg{color:#888}
#log{flex:1;overflow-y:auto;padding:6px 10px;min-height:0}
#load-more{text-align:center;padding:4px;font:10px -apple-system,sans-serif;color:#333;display:none}
#load-more.show{display:block}
.le{font:11px/1.6 -apple-system,'Segoe UI',sans-serif;color:#555}
.le .t{color:#333}.le .b{color:#4a9;font-weight:600}.le .s{color:#999}
.le .w{color:#7af;font-style:italic}.le .m{color:#da5}
.le .j{color:#4a9}.le .l{color:#e55}.le .o{color:#555;font-style:italic}.le .k{color:#333}
.tick-sep{border:0;border-top:1px solid #1a1a1a;margin:4px 0}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0a0a0a}
::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:2px}
@media(max-width:700px){
  #game{flex-direction:column}
  #left{flex:1}
  #chat{width:100%;height:45vh;border-left:0;border-top:1px solid #1a1a1a}
}
</style>
</head>
<body>
<div id="game">
  <div id="left">
    <div id="map-wrap">
      <canvas id="c"></canvas>
    </div>
    <div id="bar">
      <span class="lbl">Village</span>
      <span id="tick">&mdash;</span>
      <span id="st" class="st-off">Connecting</span>
    </div>
  </div>
  <div id="chat">
    <div id="chat-header">
      <div id="rels"></div>
      <div id="moods"></div>
    </div>
    <div id="load-more">Loading older...</div>
    <div id="log"></div>
  </div>
</div>
<script>
(() => {
const CW = 480, CH = 270;
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
cv.width = CW; cv.height = CH;
cx.imageSmoothingEnabled = false;

function resize() {
  const w = document.getElementById('map-wrap');
  const s = Math.min(w.clientWidth / CW, w.clientHeight / CH);
  cv.style.width = (CW * s) + 'px';
  cv.style.height = (CH * s) + 'px';
}
addEventListener('resize', resize);
resize();

// --- Locations ---
const LOCS = {
  'central-square':   {n:'Central Square',  x:180,y:85, w:120,h:65, c:'#9a8a7a',r:'#7a6a5a',t:'plaza'},
  'coffee-hub':       {n:'Coffee Hub',       x:30, y:22, w:72, h:48, c:'#8a5a3a',r:'#6a4020',t:'bld'},
  'knowledge-corner': {n:'Knowledge Corner', x:360,y:15, w:90, h:52, c:'#5a6a8a',r:'#3a4a6a',t:'bld'},
  'chill-zone':       {n:'Chill Zone',       x:18, y:170,w:85, h:58, c:'#4a8a4a',r:'#2a6a2a',t:'park'},
  'workshop':         {n:'Workshop',         x:200,y:200,w:80, h:50, c:'#7a6a4a',r:'#5a4a2a',t:'bld'},
  'sunset-lounge':    {n:'Sunset Lounge',    x:375,y:155,w:80, h:55, c:'#8a4a6a',r:'#6a3050',t:'bld'},
};
const LOC_IDS = Object.keys(LOCS);
const LNAMES = Object.fromEntries(LOC_IDS.map(k => [k, LOCS[k].n]));

const BCOLORS = ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#1abc9c','#e67e22','#e91e63','#00bcd4','#8bc34a','#ff5722','#607d8b'];
let ci = 0;

// --- State ---
let locBots = {}; LOC_IDS.forEach(l => locBots[l] = []);
let sprites = {};
let bubbleDom = {};
let tick = 0, phase = '', paused = false, online = false;
let nextTickAt = 0, tickIntervalMs = 60000, villageTime = '';
let relationships = {};
let emotions = {};
let frame = 0;

// --- Lazy loading state ---
let oldestTick = Infinity;
let loadingMore = false;
let hasMore = true;
let basePath = '';

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hm(ts) {
  const d = ts ? new Date(ts) : new Date();
  return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
}

// ========== PRE-RENDER MAP ==========
let bgCanvas;

function drawTree(c, x, y) {
  c.fillStyle = '#5a3a1a'; c.fillRect(x+3, y+7, 3, 6);
  c.fillStyle = '#2a7a2a'; c.fillRect(x, y+3, 9, 6); c.fillRect(x+1, y, 7, 4);
  c.fillStyle = '#3a9a3a'; c.fillRect(x+2, y+1, 5, 5);
}

function prerenderBg() {
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = CW; bgCanvas.height = CH;
  const c = bgCanvas.getContext('2d');

  // Grass
  c.fillStyle = '#3b7d34'; c.fillRect(0, 0, CW, CH);
  for (let x = 0; x < CW; x += 3) for (let y = 0; y < CH; y += 3) {
    const v = (x*7+y*13) % 11;
    if (v < 3) { c.fillStyle = '#4a8b3f'; c.fillRect(x, y, 2, 2); }
    else if (v === 5) { c.fillStyle = '#55a048'; c.fillRect(x, y, 1, 2); }
    if ((x*31+y*17) % 127 === 0) { c.fillStyle = ['#ff6','#f8f','#6ef','#fa5'][((x+y)>>3)&3]; c.fillRect(x, y, 1, 1); }
  }

  // Paths
  function pathSeg(x1,y1,x2,y2,w) {
    const dx=x2-x1, dy=y2-y1, steps=Math.max(Math.abs(dx),Math.abs(dy)), hw=w>>1;
    for (let i=0;i<=steps;i++) {
      const t=steps?i/steps:0, px=Math.round(x1+dx*t), py=Math.round(y1+dy*t);
      c.fillStyle='#7d6b50'; c.fillRect(px-hw-1,py-hw-1,w+2,w+2);
      c.fillStyle='#9a8468'; c.fillRect(px-hw,py-hw,w,w);
      if (i%18===7) { c.fillStyle='#b0a080'; c.fillRect(px-1,py,2,1); }
    }
  }
  const mid = k => ({x:LOCS[k].x+LOCS[k].w/2, y:LOCS[k].y+LOCS[k].h/2});
  const cs = mid('central-square');
  LOC_IDS.forEach(k => { if (k!=='central-square') pathSeg(cs.x,cs.y,mid(k).x,mid(k).y,5); });
  pathSeg(mid('coffee-hub').x,mid('coffee-hub').y,mid('chill-zone').x,mid('chill-zone').y,4);
  pathSeg(mid('knowledge-corner').x,mid('knowledge-corner').y,mid('sunset-lounge').x,mid('sunset-lounge').y,4);

  // Decorative trees
  [[140,12],[310,42],[138,172],[322,188],[460,82],[5,98],[312,248],[458,238],[98,238]].forEach(([x,y]) => drawTree(c,x,y));

  // Rocks
  [[110,62],[320,128],[450,178],[50,143],[280,88]].forEach(([x,y]) => {
    c.fillStyle='#7a7a6a'; c.fillRect(x,y,5,3);
    c.fillStyle='#8a8a7a'; c.fillRect(x+1,y,3,2);
  });

  // Buildings
  for (const [id, L] of Object.entries(LOCS)) {
    const {x,y,w,h,t} = L;
    const col = L.c, roof = L.r;

    if (t === 'plaza') {
      c.fillStyle='#bab0a0'; c.fillRect(x,y,w,h);
      c.fillStyle='#a09888'; c.fillRect(x+2,y+2,w-4,h-4);
      c.fillStyle='#8a8070';
      for (let i=0;i<w;i+=6) { c.fillRect(x+i,y,3,1); c.fillRect(x+i,y+h-1,3,1); }
      for (let i=0;i<h;i+=6) { c.fillRect(x,y+i,1,3); c.fillRect(x+w-1,y+i,1,3); }
      const fx=x+w/2-10, fy=y+h/2-8;
      c.fillStyle='#778'; c.fillRect(fx,fy,20,16);
      c.fillStyle='#889'; c.fillRect(fx+2,fy+1,16,1);
      c.fillStyle='#4488cc'; c.fillRect(fx+3,fy+3,14,10);
      c.fillStyle='#55aadd'; c.fillRect(fx+5,fy+5,10,6);
      c.fillStyle='#889'; c.fillRect(fx+9,fy+4,3,8); c.fillRect(fx+7,fy+3,7,2);
      continue;
    }

    if (t === 'park') {
      c.fillStyle='#4a9a50'; c.fillRect(x,y,w,h);
      c.fillStyle='#3a8a40'; c.fillRect(x+2,y+2,w-4,h-4);
      c.fillStyle='#3a6a8a'; c.fillRect(x+40,y+25,18,12);
      c.fillStyle='#4a8aaa'; c.fillRect(x+42,y+27,14,8);
      drawTree(c,x+5,y+5); drawTree(c,x+60,y+3); drawTree(c,x+8,y+h-18); drawTree(c,x+55,y+h-16);
      c.fillStyle='#7a5030'; c.fillRect(x+28,y+14,14,3);
      c.fillRect(x+28,y+11,2,3); c.fillRect(x+40,y+11,2,3);
      continue;
    }

    // Regular building
    c.fillStyle='rgba(0,0,0,.15)'; c.fillRect(x+3,y+4,w,h);
    c.fillStyle=col; c.fillRect(x,y+10,w,h-10);
    c.fillStyle='rgba(255,255,255,.06)'; c.fillRect(x+1,y+11,w-2,3);
    c.fillStyle=roof;
    c.fillRect(x-3,y+6,w+6,7); c.fillRect(x+2,y+3,w-4,5); c.fillRect(x+8,y,w-16,5);
    c.fillStyle='rgba(255,255,255,.08)'; c.fillRect(x+8,y+1,w-16,1);
    const dw=7, dh=12;
    c.fillStyle='#3a2a1a'; c.fillRect(x+w/2-dw/2,y+h-dh,dw,dh);
    c.fillStyle='#4a3a2a'; c.fillRect(x+w/2-dw/2+1,y+h-dh+1,dw-2,dh-1);
    c.fillStyle='#da5'; c.fillRect(x+w/2+1,y+h-6,1,1);
    const winY=y+16;
    c.fillStyle='#ffe';
    c.fillRect(x+8,winY,6,5); c.fillRect(x+w-14,winY,6,5);
    c.fillStyle='#5a4a3a';
    c.fillRect(x+11,winY,1,5); c.fillRect(x+8,winY+2,6,1);
    c.fillRect(x+w-11,winY,1,5); c.fillRect(x+w-14,winY+2,6,1);

    if (id==='coffee-hub') {
      c.fillStyle='#6a4020'; c.fillRect(x+w-16,y-5,6,10); c.fillStyle='#5a3010'; c.fillRect(x+w-17,y-6,8,3);
    } else if (id==='knowledge-corner') {
      c.fillStyle='#c33'; c.fillRect(x+w-19,y+17,6,1);
      c.fillStyle='#33c'; c.fillRect(x+w-19,y+18,6,1);
      c.fillStyle='#3c3'; c.fillRect(x+w-19,y+19,6,1);
      c.fillStyle='#cc3'; c.fillRect(x+w-19,y+20,6,1);
    } else if (id==='workshop') {
      c.fillStyle='#556'; c.fillRect(x+w+3,y+h-12,10,4);
      c.fillStyle='#667'; c.fillRect(x+w+5,y+h-16,6,4);
    } else if (id==='sunset-lounge') {
      c.fillStyle='#fa8'; c.fillRect(x-4,y+14,2,3); c.fillRect(x+w+2,y+14,2,3);
      c.fillStyle='#fc6'; c.fillRect(x-3,y+15,1,1); c.fillRect(x+w+2,y+15,1,1);
    }
  }
}
prerenderBg();

// ========== SPRITES ==========
function mkSprite(name, display, loc) {
  if (sprites[name]) { sprites[name].dn = display || name; return sprites[name]; }
  const L = LOCS[loc] || LOCS['central-square'];
  const color = BCOLORS[ci++ % BCOLORS.length];
  const px = L.x + 12 + Math.random() * (L.w - 24);
  const py = L.y + 16 + Math.random() * (L.h - 24);
  sprites[name] = { x:px, y:py, tx:px, ty:py, color, loc, dn:display||name, f:0, mt:120+Math.random()*200 };
  return sprites[name];
}

function drawSprite(s) {
  const px = Math.round(s.x), py = Math.round(s.y);
  // Shadow
  cx.fillStyle = 'rgba(0,0,0,.2)'; cx.fillRect(px-2, py+8, 7, 2);
  // Feet
  const walk = s.f%20<10 && Math.abs(s.x-s.tx)>0.5;
  cx.fillStyle = '#446';
  cx.fillRect(px-1,py+6,2,2); cx.fillRect(px+2+(walk?1:0),py+6,2,2);
  // Body
  cx.fillStyle = s.color; cx.fillRect(px-1,py+1,5,5);
  // Arms
  cx.fillRect(px-2,py+2,1,3); cx.fillRect(px+4,py+2,1,3);
  // Head
  cx.fillStyle = '#fdb'; cx.fillRect(px,py-2,3,3);
  // Hair
  cx.fillStyle = s.color; cx.fillRect(px-1,py-3,5,2);
  // Eyes
  cx.fillStyle = '#333'; cx.fillRect(px,py-1,1,1); cx.fillRect(px+2,py-1,1,1);
  // Name tag
  cx.font = '5px sans-serif'; cx.textAlign = 'center';
  const nw = cx.measureText(s.dn).width;
  cx.fillStyle = 'rgba(0,0,0,.5)'; cx.fillRect(px+1-nw/2-1, py+10, nw+2, 6);
  cx.fillStyle = '#fff'; cx.fillText(s.dn, px+1, py+15);
  cx.textAlign = 'left';
}

function updateSprite(s) {
  s.mt--;
  if (s.mt <= 0 && !s.traveling) {
    const L = LOCS[s.loc];
    if (L) { s.tx = L.x+10+Math.random()*(L.w-20); s.ty = L.y+16+Math.random()*(L.h-22); }
    s.mt = 120 + Math.random() * 200;
  }
  const dx=s.tx-s.x, dy=s.ty-s.y, d=Math.sqrt(dx*dx+dy*dy);
  if (d > 0.5) { s.x += dx/d*0.5; s.y += dy/d*0.5; s.f++; }
  else if (s.traveling) { s.traveling = false; }
}

function animateMove(name, toLoc) {
  const s = sprites[name]; if (!s) return;
  const L = LOCS[toLoc]; if (!L) return;
  s.loc = toLoc;
  s.tx = L.x + L.w/2;
  s.ty = L.y + L.h/2;
  s.traveling = true;
  s.mt = 90;
}

// ========== ANIMATED EFFECTS ==========
function drawSmoke() {
  const L = LOCS['coffee-hub'];
  const sx = L.x + L.w - 13, sy = L.y - 8;
  for (let i=0; i<3; i++) {
    const off = ((frame+i*20)%60)/60;
    const px = sx + Math.sin((frame+i*30)*0.05)*3;
    const py = sy - off*15;
    cx.fillStyle = `rgba(200,200,200,${(1-off)*0.3})`;
    cx.fillRect(Math.round(px), Math.round(py), 2, 2);
  }
}

function drawWaterAnim() {
  const L = LOCS['central-square'];
  const fx = L.x+L.w/2-7, fy = L.y+L.h/2-5;
  for (let i=0; i<4; i++) {
    const ox = 5+((frame*3+i*7)%11), oy = 4+((frame*2+i*5)%7);
    if ((frame+i*13)%20<10) { cx.fillStyle='#88ccff'; cx.fillRect(fx+ox,fy+oy,1,1); }
  }
  if (frame%30<15) { cx.fillStyle='#aaddff'; cx.fillRect(fx+10,fy,1,3); }
}

function drawPondAnim() {
  const L = LOCS['chill-zone'];
  const px = L.x+42, py = L.y+27;
  for (let i=0; i<3; i++) {
    const ox = 2+((frame*2+i*5)%10), oy = 1+((frame+i*7)%6);
    if ((frame+i*11)%18<9) { cx.fillStyle='#6aaacc'; cx.fillRect(px+ox,py+oy,1,1); }
  }
}

// ========== LABELS ==========
function drawLabels() {
  cx.textAlign = 'center'; cx.font = 'bold 7px sans-serif';
  for (const L of Object.values(LOCS)) {
    const lx = L.x+L.w/2, ly = L.y-4;
    const tw = cx.measureText(L.n).width;
    cx.fillStyle = 'rgba(0,0,0,.55)'; cx.fillRect(lx-tw/2-3, ly-7, tw+6, 10);
    cx.fillStyle = '#eee'; cx.fillText(L.n, lx, ly);
  }
  cx.textAlign = 'left';
}

// ========== PHASE TINT ==========
function phaseTint() {
  const p = (phase||'').toLowerCase();
  if (p.includes('night')) { cx.fillStyle='rgba(10,15,40,.25)'; cx.fillRect(0,0,CW,CH); }
  else if (p.includes('evening')||p.includes('sunset')) { cx.fillStyle='rgba(40,20,5,.15)'; cx.fillRect(0,0,CW,CH); }
  else if (p.includes('morning')||p.includes('dawn')) { cx.fillStyle='rgba(40,30,10,.08)'; cx.fillRect(0,0,CW,CH); }
}

// ========== BUBBLES (DOM) ==========
const bubbleQueue = [];
let bubbleTimer = null;
const BUBBLE_SHOW_MS = 12000;   // each bubble visible for 12s
const BUBBLE_FADE_MS = 800;
const BUBBLE_STAGGER_MS = 3000; // 3s between bubbles

function showBubble(botName, text, isWhisper) {
  bubbleQueue.push({ botName, text, isWhisper });
  if (!bubbleTimer) drainBubbleQueue();
}

function drainBubbleQueue() {
  if (bubbleQueue.length === 0) { bubbleTimer = null; return; }
  const { botName, text, isWhisper } = bubbleQueue.shift();
  showBubbleNow(botName, text, isWhisper);
  bubbleTimer = setTimeout(drainBubbleQueue, BUBBLE_STAGGER_MS);
}

function showBubbleNow(botName, text, isWhisper) {
  removeBubble(botName);
  const s = sprites[botName]; if (!s) return;
  const txt = text.length > 80 ? text.slice(0,80)+'\u2026' : text;
  const el = document.createElement('div');
  el.className = 'bubble' + (isWhisper ? ' whisper' : '');
  el.innerHTML = `<span class="bn" style="color:${s.color}">${esc(s.dn)}</span>${esc(txt)}`;
  document.getElementById('map-wrap').appendChild(el);
  bubbleDom[botName] = { el };
  setTimeout(() => el.classList.add('fade'), BUBBLE_SHOW_MS - BUBBLE_FADE_MS);
  setTimeout(() => removeBubble(botName), BUBBLE_SHOW_MS);
}

function removeBubble(name) {
  if (bubbleDom[name]) { bubbleDom[name].el.remove(); delete bubbleDom[name]; }
}

function positionBubbles() {
  const cr = cv.getBoundingClientRect();
  const wr = document.getElementById('map-wrap').getBoundingClientRect();
  const sx = cr.width/CW, sy = cr.height/CH;
  const ox = cr.left-wr.left, oy = cr.top-wr.top;
  for (const [name, b] of Object.entries(bubbleDom)) {
    const s = sprites[name]; if (!s) continue;
    b.el.style.left = (ox + s.x*sx) + 'px';
    b.el.style.top = (oy + (s.y-8)*sy) + 'px';
  }
}

// ========== CHAT LOG (newest at bottom) ==========
function addLog(html, prepend) {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'le';
  div.innerHTML = html;
  if (prepend) {
    // Prepend (for historical events loaded at top)
    const firstChild = el.firstChild;
    el.insertBefore(div, firstChild);
  } else {
    // Append (for new real-time events)
    el.appendChild(div);
    // Auto-scroll to bottom if near bottom
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
    if (atBottom) el.scrollTop = el.scrollHeight;
  }
  while (el.children.length > 500) {
    if (prepend) el.lastChild.remove();
    else el.firstChild.remove();
  }
}

function addTickSep(prepend) {
  const el = document.getElementById('log');
  const hr = document.createElement('hr');
  hr.className = 'tick-sep';
  if (prepend) {
    el.insertBefore(hr, el.firstChild);
  } else {
    el.appendChild(hr);
  }
}

// ========== CONVERT EVENT TO LOG HTML ==========
function eventToHtml(d) {
  const t = `<span class="t">${hm(d._ts)}</span>`;
  switch (d.type) {
    case 'action': {
      const nm = d.displayName||d.bot;
      if (d.action==='say') return `${t} <span class="b">${esc(nm)}</span>: <span class="s">"${esc(d.message)}"</span>`;
      if (d.action==='whisper') {
        const tgt = d.targetDisplayName || d.target || '?';
        return `${t} <span class="b">${esc(nm)}</span> <span class="w">whispered to ${esc(tgt)}</span>`;
      }
      if (d.action==='observe') return `${t} <span class="o">${esc(nm)} observed silently</span>`;
      if (d.action==='move') {
        const tn = LNAMES[d.to]||d.to;
        return `${t} <span class="b">${esc(nm)}</span> <span class="m">\u2192 ${esc(tn)}</span>`;
      }
      return null;
    }
    case 'movement': {
      const nm = d.displayName||d.bot;
      if (d.action==='join') return `${t} <span class="b">${esc(nm)}</span> <span class="j">joined the village</span>`;
      if (d.action==='leave') return `${t} <span class="b">${esc(nm)}</span> <span class="l">left the village</span>`;
      return null;
    }
    case 'tick': {
      const a=d.actions||{};
      return `${t} <span class="k">\u2014 tick ${d.tick} \u00b7 ${d.phase} \u00b7 ${d.bots}/${d.botsTotal} bots \u00b7 say:${a.say||0} whisper:${a.whisper||0} move:${a.move||0} \u2014</span>`;
    }
    case 'relationship': {
      const verb = d.label ? `became ${d.label}s` : 'are no longer close';
      return `${t} <span class="b">${esc(d.fromDisplay)}</span> \u2665 <span class="b">${esc(d.toDisplay)}</span> <span class="j">\u2014 ${esc(verb)}</span>`;
    }
    case 'emotion': {
      if (d.emotion === 'neutral') return null;
      const nm = d.displayName || d.bot;
      const MOOD_EMOJI = { happy:'\u{1F60A}', content:'\u{1F60C}', excited:'\u{1F929}', lonely:'\u{1F614}', bored:'\u{1F610}' };
      const emoji = MOOD_EMOJI[d.emotion] || '';
      return `${t} ${emoji} <span class="b">${esc(nm)}</span> <span class="j">is feeling ${esc(d.emotion)}</span>`;
    }
    case 'village_event': {
      const ln = d.locationName || LNAMES[d.location] || d.location;
      return `${t} \u26A1 <span class="k">${esc(ln)}: ${esc(d.text)}</span>`;
    }
    default: return null;
  }
}

// ========== LAZY LOADING ==========
async function loadHistory(initial) {
  if (loadingMore || !hasMore) return;
  loadingMore = true;
  const loader = document.getElementById('load-more');
  loader.classList.add('show');

  try {
    let url = `${basePath}/api/logs?limit=50`;
    if (oldestTick < Infinity) url += `&before=${oldestTick}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    hasMore = data.hasMore;

    if (data.events.length > 0) {
      const logEl = document.getElementById('log');
      const prevScrollHeight = logEl.scrollHeight;

      // Track tick changes for separator lines
      let lastTick = null;
      for (let i = data.events.length - 1; i >= 0; i--) {
        const ev = data.events[i];
        if (ev.tick !== undefined && ev.tick < oldestTick) oldestTick = ev.tick;

        // Add tick separator when tick changes
        if (ev.type === 'tick' && lastTick !== null && lastTick !== ev.tick) {
          addTickSep(true);
        }
        lastTick = ev.tick;

        const html = eventToHtml(ev);
        if (html) addLog(html, true);
      }

      if (initial) {
        // Scroll to bottom on initial load
        logEl.scrollTop = logEl.scrollHeight;
      } else {
        // Maintain scroll position after prepending
        logEl.scrollTop = logEl.scrollHeight - prevScrollHeight;
      }
    }
  } catch (err) {
    // Silently fail — logs endpoint may not have data yet
  } finally {
    loadingMore = false;
    const loader = document.getElementById('load-more');
    loader.classList.toggle('show', hasMore);
  }
}

// Scroll-to-top triggers loading older events
document.getElementById('log').addEventListener('scroll', () => {
  const el = document.getElementById('log');
  if (el.scrollTop < 30 && hasMore && !loadingMore) {
    loadHistory(false);
  }
});

// ========== STATUS BAR ==========
function fmtCountdown(ms) {
  const s = Math.max(0, Math.ceil(ms / 1000));
  return s + 's';
}
function updateBar() {
  const te = document.getElementById('tick');
  const se = document.getElementById('st');
  const remaining = nextTickAt ? nextTickAt - Date.now() : 0;
  const cd = remaining > 0 ? ` \u00b7 next ${fmtCountdown(remaining)}` : '';
  const vt = villageTime ? `${villageTime} \u00b7 ` : '';
  te.textContent = tick > 0 ? `${vt}${phase ? phase[0].toUpperCase()+phase.slice(1) : ''} \u00b7 Tick ${tick}${cd}` : '\u2014';
  if (!online) { se.textContent='Disconnected'; se.className='st-off'; }
  else if (paused) { se.textContent='Paused'; se.className='st-pause'; }
  else { se.textContent='Running'; se.className='st-run'; }
}

// ========== RELATIONSHIPS PANEL ==========
function relClass(label) {
  if (label.startsWith('best')) return 'rel-best';
  if (label.startsWith('good')) return 'rel-good';
  if (label.startsWith('friend')) return 'rel-friend';
  return 'rel-acq';
}

function renderRels(highlightKey) {
  const el = document.getElementById('rels');
  const entries = Object.entries(relationships).filter(([,r]) => r.label);
  if (entries.length === 0) { el.classList.remove('show'); return; }
  el.classList.add('show');
  el.innerHTML = entries.map(([key, r]) => {
    const [a, b] = key.split('::');
    const da = (sprites[a]||{}).dn || a;
    const db = (sprites[b]||{}).dn || b;
    const hl = key === highlightKey ? ' highlight' : '';
    return `<span class="rel ${relClass(r.label)}${hl}" data-key="${esc(key)}">\u2665 ${esc(da)} &amp; ${esc(db)}: ${esc(r.label)}</span>`;
  }).join(' \u00b7 ');
  if (highlightKey) {
    setTimeout(() => {
      const h = el.querySelector('.highlight');
      if (h) h.classList.remove('highlight');
    }, 1500);
  }
}

// ========== MOODS PANEL ==========
const MOOD_EMOJI = { happy:'\u{1F60A}', content:'\u{1F60C}', excited:'\u{1F929}', lonely:'\u{1F614}', bored:'\u{1F610}' };
const MOOD_POS = new Set(['happy','content','excited']);

function renderMoods() {
  const el = document.getElementById('moods');
  const entries = Object.entries(emotions).filter(([,e]) => e.emotion && e.emotion !== 'neutral');
  if (entries.length === 0) { el.classList.remove('show'); return; }
  el.classList.add('show');
  el.innerHTML = entries.map(([bot, e]) => {
    const dn = (sprites[bot]||{}).dn || bot;
    const emoji = MOOD_EMOJI[e.emotion] || '';
    const cls = MOOD_POS.has(e.emotion) ? 'mood-pos' : 'mood-neg';
    return `<span class="${cls}">${emoji} ${esc(dn)}: ${esc(e.emotion)}</span>`;
  }).join(' \u00b7 ');
}

// ========== SSE EVENTS ==========
let lastLogTick = null;

function onEvent(d) {
  const t = `<span class="t">${hm()}</span>`;

  switch (d.type) {
    case 'init':
      tick=d.tick; phase=d.phase; paused=d.paused; online=true;
      if (d.nextTickAt) nextTickAt=d.nextTickAt;
      if (d.tickIntervalMs) tickIntervalMs=d.tickIntervalMs;
      if (d.villageTime) villageTime=d.villageTime;
      if (d.relationships) relationships=d.relationships;
      if (d.emotions) emotions=d.emotions;
      for (const loc of LOC_IDS) {
        const bots = d.locations[loc]||[];
        locBots[loc] = bots.map(b => typeof b==='string'?b:(b.name||b));
        bots.forEach(b => {
          const nm = typeof b==='string'?b:(b.name||b);
          const dn = typeof b==='string'?b:(b.displayName||b.name||b);
          mkSprite(nm, dn, loc);
        });
      }
      updateBar();
      renderRels();
      renderMoods();
      // Load recent history from /api/logs on first connect
      if (!window._initDone) {
        document.getElementById('log').innerHTML = '';
        window._initDone = true;
        loadHistory(true);
      }
      break;

    case 'action': {
      const nm = d.displayName||d.bot;
      if (d.bot && d.location) mkSprite(d.bot, nm, d.location);

      if (d.action==='say') {
        showBubble(d.bot, d.message);
        addLog(`${t} <span class="b">${esc(nm)}</span>: <span class="s">"${esc(d.message)}"</span>`);
      } else if (d.action==='whisper') {
        const tgt = d.targetDisplayName || (sprites[d.target]||{}).dn || d.target || '?';
        showBubble(d.bot, `(whispers to ${tgt})`, true);
        addLog(`${t} <span class="b">${esc(nm)}</span> <span class="w">whispered to ${esc(tgt)}</span>`);
      } else if (d.action==='observe') {
        addLog(`${t} <span class="o">${esc(nm)} observed silently</span>`);
      } else if (d.action==='move') {
        const tn = LNAMES[d.to]||d.to;
        animateMove(d.bot, d.to);
        if (locBots[d.from]) locBots[d.from] = locBots[d.from].filter(b=>b!==d.bot);
        if (locBots[d.to] && !locBots[d.to].includes(d.bot)) locBots[d.to].push(d.bot);
        addLog(`${t} <span class="b">${esc(nm)}</span> <span class="m">\u2192 ${esc(tn)}</span>`);
      }
      break;
    }

    case 'movement': {
      const nm = d.displayName||d.bot;
      if (d.action==='join') {
        mkSprite(d.bot, nm, d.location);
        if (locBots[d.location] && !locBots[d.location].includes(d.bot)) locBots[d.location].push(d.bot);
        addLog(`${t} <span class="b">${esc(nm)}</span> <span class="j">joined the village</span>`);
      } else if (d.action==='leave') {
        if (locBots[d.location]) locBots[d.location] = locBots[d.location].filter(b=>b!==d.bot);
        removeBubble(d.bot); delete sprites[d.bot];
        addLog(`${t} <span class="b">${esc(nm)}</span> <span class="l">left the village</span>`);
      }
      break;
    }

    case 'tick':
      tick=d.tick; phase=d.phase;
      if (d.nextTickAt) nextTickAt=d.nextTickAt;
      if (d.tickIntervalMs) tickIntervalMs=d.tickIntervalMs;
      if (d.villageTime) villageTime=d.villageTime;
      if (d.relationships) { relationships=d.relationships; renderRels(); }
      if (d.emotions) { emotions=d.emotions; renderMoods(); }
      if (d.locations) {
        const allBots = new Set();
        for (const loc of LOC_IDS) {
          const bots = d.locations[loc]||[];
          locBots[loc] = bots.map(b=>typeof b==='string'?b:(b.name||b));
          bots.forEach(b => {
            const nm = typeof b==='string'?b:(b.name||b);
            const dn = typeof b==='string'?b:(b.displayName||b.name||b);
            allBots.add(nm);
            const sp = mkSprite(nm, dn, loc);
            if (sp.loc !== loc) animateMove(nm, loc);
          });
        }
        // Remove sprites for bots no longer in any location
        for (const nm of Object.keys(sprites)) {
          if (!allBots.has(nm)) { removeBubble(nm); delete sprites[nm]; }
        }
      }
      updateBar();
      addTickSep(false);
      const a=d.actions||{};
      addLog(`${t} <span class="k">\u2014 tick ${d.tick} \u00b7 ${d.phase} \u00b7 ${d.bots}/${d.botsTotal} bots \u00b7 say:${a.say||0} whisper:${a.whisper||0} move:${a.move||0} \u2014</span>`);
      break;

    case 'relationship': {
      const key = [d.from,d.to].sort().join('::');
      if (!relationships[key]) relationships[key] = { says:0, whispers:0, coTicks:0, label:'', prevLabel:'', since:0 };
      relationships[key].label = d.label;
      relationships[key].prevLabel = d.prevLabel;
      renderRels(key);
      const verb = d.label ? `became ${d.label}s` : 'are no longer close';
      addLog(`${t} <span class="b">${esc(d.fromDisplay)}</span> \u2665 <span class="b">${esc(d.toDisplay)}</span> <span class="j">\u2014 ${esc(verb)}</span>`);
      break;
    }

    case 'emotion': {
      if (!emotions[d.bot]) emotions[d.bot] = {};
      emotions[d.bot].emotion = d.emotion;
      emotions[d.bot].prevEmotion = d.prevEmotion;
      renderMoods();
      if (d.emotion !== 'neutral') {
        const nm = d.displayName || (sprites[d.bot]||{}).dn || d.bot;
        const emoji = MOOD_EMOJI[d.emotion] || '';
        addLog(`${t} ${emoji} <span class="b">${esc(nm)}</span> <span class="j">is feeling ${esc(d.emotion)}</span>`);
      }
      break;
    }

    case 'village_event': {
      const ln = d.locationName || LNAMES[d.location] || d.location;
      addLog(`${t} \u26A1 <span class="k">${esc(ln)}: ${esc(d.text)}</span>`);
      break;
    }

    case 'status':
      paused=d.paused; updateBar();
      break;
  }
}

// ========== SSE CONNECTION ==========
function connect() {
  basePath = location.pathname.replace(/\/index\.html$/, '').replace(/\/+$/, '');
  const url = basePath ? `${basePath}/events` : '/events';
  const es = new EventSource(url);
  es.onopen = () => { online=true; updateBar(); };
  es.onmessage = (e) => { try { onEvent(JSON.parse(e.data)); } catch {} };
  es.onerror = () => {
    online=false; updateBar();
    // EventSource auto-reconnects; no manual close/retry needed
  };
}

// ========== MAIN LOOP ==========
function loop() {
  frame++;
  cx.imageSmoothingEnabled = false;
  cx.drawImage(bgCanvas, 0, 0);
  drawSmoke();
  drawWaterAnim();
  drawPondAnim();
  phaseTint();
  drawLabels();

  // Sort sprites by Y for proper z-order
  const sorted = Object.values(sprites).sort((a,b) => a.y - b.y);
  for (const s of sorted) { updateSprite(s); drawSprite(s); }

  positionBubbles();
  requestAnimationFrame(loop);
}

connect();
requestAnimationFrame(loop);
setInterval(updateBar, 1000);
})();
</script>
